<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Practice (B1 Level) - New Set of 25 (Set 5)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    .quiz-container {
      max-width: 750px;
      margin: auto;
      background-color: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2, h3 {
      text-align: center;
    }
    #start-screen, #quiz-screen, #result-screen {
      margin-bottom: 20px;
    }
    #quiz-screen, #result-screen {
      display: none;
    }
    #timer {
      font-size: 1.2em;
      text-align: right;
      margin-bottom: 10px;
    }
    #score-display {
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: right;
    }
    .question {
      font-weight: bold;
      margin-bottom: 15px;
    }
    .option {
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .option:hover {
      background-color: #eee;
    }
    .option.correct {
      background-color: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }
    .option.incorrect {
      background-color: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }
    .disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    #feedback {
      margin-top: 10px;
      font-style: italic;
    }
    #next-btn {
      margin-top: 20px;
      display: none;
      width: 100%;
      padding: 10px;
      font-size: 1em;
    }
    .error-item {
      margin-bottom: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Vocabulary Practice (B1 Level) - New Set of 25 (Set 5)</h2>

    <!-- Start Screen -->
    <div id="start-screen">
      <label for="username">Enter your name:</label>
      <input type="text" id="username" required>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen">
      <div id="timer">Time Left: 10:00</div>
      <div id="score-display">Score: 100%</div>
      <div id="question-container"></div>
      <div id="feedback"></div>
      <button id="next-btn">Next Question</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen">
      <h3>Quiz Report</h3>
      <div id="final-score"></div>
      <div id="error-report"></div>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "Every morning, I always ____ my breakfast to start the day.",
        options: ["prepare", "dispose", "fix", "avoid"],
        correct: 0,
        explanation: "Prepare means to make something ready for use.",
        detailedExplanation: "When you prepare your breakfast, you gather ingredients, cook, and arrange your meal to ensure you have a nutritious start."
      },
      {
        question: "At the meeting, my boss ____ the day's targets so we understood what to do.",
        options: ["explains", "ignores", "shouts", "cancels"],
        correct: 0,
        explanation: "Explains means to describe something clearly.",
        detailedExplanation: "A clear explanation gives everyone details about their responsibilities and helps the team work together efficiently."
      },
      {
        question: "Last weekend, I ____ a new recipe for a delicious cake.",
        options: ["tried", "watched", "kept", "lost"],
        correct: 0,
        explanation: "Tried means to make an effort to use or do something.",
        detailedExplanation: "When you try a new recipe, you test it out to see if the dish tastes good, which is an important part of improving your cooking skills."
      },
      {
        question: "Our teacher ____ extra exercises to help us understand the lesson better.",
        options: ["gives", "takes", "ignores", "breaks"],
        correct: 0,
        explanation: "Gives means to provide something.",
        detailedExplanation: "When your teacher gives additional exercises, it helps you practice the material and reinforces your learning."
      },
      {
        question: "My brother ____ his bicycle to school every day.",
        options: ["rides", "carries", "repairs", "throws"],
        correct: 0,
        explanation: "Rides means to travel on a bicycle.",
        detailedExplanation: "Riding a bicycle is a common and eco-friendly way to commute, and it also helps keep him active."
      },
      {
        question: "I often ____ my camera to capture moments during outings.",
        options: ["use", "sell", "lose", "assemble"],
        correct: 0,
        explanation: "Use means to operate something for a purpose.",
        detailedExplanation: "Using your camera allows you to take photographs and preserve memories from special events."
      },
      {
        question: "At the concert, the band ____ a new song that excited everyone.",
        options: ["performed", "ignored", "changed", "destroyed"],
        correct: 0,
        explanation: "Performed means to present a live act.",
        detailedExplanation: "When a band performs a song, they play it live, showcasing their music and engaging the audience."
      },
      {
        question: "In the supermarket, I ____ the best apples and bananas for a healthy snack.",
        options: ["select", "hang", "throw", "misplace"],
        correct: 0,
        explanation: "Select means to choose carefully.",
        detailedExplanation: "Selecting the best fruits ensures you have quality produce for a nutritious snack, rather than picking by chance."
      },
      {
        question: "On rainy days, I prefer to ____ a mystery novel in the comfort of my home.",
        options: ["read", "write", "cook", "shock"],
        correct: 0,
        explanation: "Read means to look at written words and understand them.",
        detailedExplanation: "Reading a mystery novel is a great way to relax indoors and become absorbed in an engaging story."
      },
      {
        question: "Every evening, I ____ a walk to clear my mind and relax.",
        options: ["take", "declare", "dismiss", "drive"],
        correct: 0,
        explanation: "Take means to go on or have an activity.",
        detailedExplanation: "Taking a walk gives you time to think, exercise, and unwind after a busy day."
      },
      {
        question: "I always ____ a birthday card to show I care about my loved ones.",
        options: ["send", "destroy", "hide", "avoid"],
        correct: 0,
        explanation: "Send means to dispatch a message or item to someone.",
        detailedExplanation: "Sending a birthday card is a thoughtful gesture that communicates your best wishes and care."
      },
      {
        question: "Before starting a new job, I ____ my old habits and adopt new routines.",
        options: ["change", "maintain", "ignore", "repeat"],
        correct: 0,
        explanation: "Change means to make or become different.",
        detailedExplanation: "Changing your habits is essential in adapting to a new work environment and adopting more effective routines."
      },
      {
        question: "In spring, many flowers ____ and add vibrant color to the garden.",
        options: ["bloom", "wither", "fade", "shrink"],
        correct: 0,
        explanation: "Bloom means to produce flowers and open up.",
        detailedExplanation: "When flowers bloom, they display their beauty and add life to the garden, marking the season's renewal."
      },
      {
        question: "At the café, I ____ a latte with extra foam for a delicious treat.",
        options: ["order", "cancel", "drop", "dodge"],
        correct: 0,
        explanation: "Order means to request food or drink.",
        detailedExplanation: "When you order a latte, you ensure you get your preferred coffee prepared by the barista, exactly the way you like it."
      },
      {
        question: "In the evenings, I ____ with my friend on the phone to catch up on our day.",
        options: ["chat", "ignore", "mimic", "rush"],
        correct: 0,
        explanation: "Chat means to converse casually and friendly.",
        detailedExplanation: "Chatting on the phone helps you share experiences, exchange news, and strengthen your friendship."
      },
      {
        question: "During the storm, the windows ____ from the strong gusts of wind.",
        options: ["shake", "sleep", "whisper", "sing"],
        correct: 0,
        explanation: "Shake means to move back and forth quickly.",
        detailedExplanation: "When the wind is strong, it causes the windows to shake, demonstrating the force of the storm."
      },
      {
        question: "Whenever I need help understanding something, I ____ my teacher for clarification.",
        options: ["ask", "push", "run", "hide"],
        correct: 0,
        explanation: "Ask means to request information or assistance.",
        detailedExplanation: "Asking questions ensures that you learn and understand the material, and it shows that you are proactive in your studies."
      },
      {
        question: "After upgrading my smartphone, I ____ my old one by selling it online.",
        options: ["sell", "keep", "break", "toss"],
        correct: 0,
        explanation: "Sell means to exchange something for money.",
        detailedExplanation: "Selling your old smartphone is a practical way to recycle it and earn money to help pay for a newer model."
      },
      {
        question: "After exercising, I ____ water immediately to rehydrate my body.",
        options: ["drink", "push", "leave", "call"],
        correct: 0,
        explanation: "Drink means to consume a liquid.",
        detailedExplanation: "Drinking water after a workout is important to restore fluids lost through sweat and to maintain energy levels."
      },
      {
        question: "At the party, I ____ energetically on the dance floor with my friends.",
        options: ["danced", "sat", "laughed", "rested"],
        correct: 0,
        explanation: "Danced means to move rhythmically to music.",
        detailedExplanation: "Dancing is a fun and active way to celebrate and enjoy the atmosphere at a party."
      },
      {
        question: "Before beginning a new project, I always ____ my notes to review the key points.",
        options: ["review", "discard", "ignore", "rush"],
        correct: 0,
        explanation: "Review means to examine or study again.",
        detailedExplanation: "Reviewing your notes refreshes your memory and ensures that you are well-prepared to start the project."
      },
      {
        question: "When I feel tired during the day, I ____ a short nap to regain energy.",
        options: ["take", "skip", "end", "build"],
        correct: 0,
        explanation: "Take means to have or use a short period of rest.",
        detailedExplanation: "Taking a brief nap helps you re-energize and improves your concentration for the rest of the day."
      },
      {
        question: "I always ____ my homework carefully to catch any mistakes before submission.",
        options: ["check", "ignore", "erase", "sketch"],
        correct: 0,
        explanation: "Check means to examine for errors.",
        detailedExplanation: "Checking your homework ensures that you submit it correctly and helps you learn from any mistakes you may have made."
      },
      {
        question: "At the sale, I was able to ____ a great discount on a new jacket.",
        options: ["get", "lose", "break", "wait"],
        correct: 0,
        explanation: "Get means to receive or obtain something.",
        detailedExplanation: "Getting a discount means you pay less for the jacket, allowing you to save money while still obtaining what you want."
      },
      {
        question: "Before the movie starts, I always ____ a good seat in the theater.",
        options: ["find", "lose", "sell", "dismiss"],
        correct: 0,
        explanation: "Find means to locate or discover.",
        detailedExplanation: "Finding a seat where you have a clear view ensures that you enjoy the movie without any inconvenience."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 100;
    const penalty = 100 / questions.length;
    let timerValue = 10 * 60;
    let timerInterval;
    const incorrectAnswers = [];
    let username = "";
    let currentShuffledOptions = [];
    let currentCorrectIndex = -1;

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const startBtn = document.getElementById("start-btn");
    const nextBtn = document.getElementById("next-btn");
    const questionContainer = document.getElementById("question-container");
    const feedbackDiv = document.getElementById("feedback");
    const scoreDisplay = document.getElementById("score-display");
    const timerDisplay = document.getElementById("timer");
    const finalScoreDiv = document.getElementById("final-score");
    const errorReportDiv = document.getElementById("error-report");

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startQuiz() {
      username = document.getElementById("username").value.trim() || "Student";
      startScreen.style.display = "none";
      quizScreen.style.display = "block";
      timerInterval = setInterval(updateTimer, 1000);
      displayQuestion();
    }

    function updateTimer() {
      let minutes = Math.floor(timerValue / 60);
      let seconds = timerValue % 60;
      timerDisplay.innerText = `Time Left: ${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
      if (timerValue <= 0) {
        clearInterval(timerInterval);
        finishQuiz();
      } else {
        timerValue--;
      }
    }

    function displayQuestion() {
      feedbackDiv.innerText = "";
      nextBtn.style.display = "none";
      questionContainer.innerHTML = "";

      const currentQ = questions[currentQuestionIndex];
      let optionsArray = currentQ.options.map((text, idx) => ({ text, origIndex: idx }));
      currentShuffledOptions = shuffleArray(optionsArray);
      currentCorrectIndex = currentShuffledOptions.findIndex(option => option.origIndex === currentQ.correct);

      const questionEl = document.createElement("div");
      questionEl.className = "question";
      questionEl.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.question}`;
      questionContainer.appendChild(questionEl);

      currentShuffledOptions.forEach((optionObj, index) => {
        const optionEl = document.createElement("div");
        optionEl.className = "option";
        optionEl.innerText = optionObj.text;
        optionEl.addEventListener("click", () => selectOption(optionEl, index));
        questionContainer.appendChild(optionEl);
      });
    }

    function selectOption(selectedEl, selectedIndex) {
      const currentQ = questions[currentQuestionIndex];
      const optionEls = document.querySelectorAll(".option");
      optionEls.forEach(el => el.classList.add("disabled"));

      if (selectedIndex === currentCorrectIndex) {
        selectedEl.classList.add("correct");
        feedbackDiv.innerHTML = "<strong>Correct!</strong>";
      } else {
        selectedEl.classList.add("incorrect");
        feedbackDiv.innerHTML = "<strong>Incorrect.</strong> " 
          + currentQ.explanation + "<br><br>" + currentQ.detailedExplanation;
        score -= penalty;
        incorrectAnswers.push({
          question: currentQ.question,
          chosen: currentShuffledOptions[selectedIndex].text,
          correct: currentQ.options[currentQ.correct],
          explanation: currentQ.explanation,
          detailedExplanation: currentQ.detailedExplanation
        });
        optionEls.forEach(el => {
          if (el.innerText === currentQ.options[currentQ.correct]) {
            el.classList.add("correct");
          }
        });
      }

      score = Math.max(score, 0);
      scoreDisplay.innerText = `Score: ${Math.round(score)}%`;
      nextBtn.style.display = "block";
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        displayQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScoreDiv.innerText = `${username}, your final score is ${Math.round(score)}%`;
      
      if (incorrectAnswers.length > 0) {
        let errorHtml = "<h4>Review your incorrect answers:</h4>";
        incorrectAnswers.forEach(item => {
          errorHtml += `<div class="error-item">
                          <strong>Question:</strong> ${item.question}<br>
                          <strong>Your answer:</strong> ${item.chosen}<br>
                          <strong>Correct answer:</strong> ${item.correct}<br>
                          <strong>Short note:</strong> ${item.explanation}<br>
                          <strong>More details:</strong> ${item.detailedExplanation}
                        </div>`;
        });
        errorReportDiv.innerHTML = errorHtml;
      } else {
        errorReportDiv.innerHTML = "<h4>Great job! You answered all questions correctly.</h4>";
      }
    }
  </script>
</body>
</html>
