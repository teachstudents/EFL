<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Practice (B1 Level) - Gap Fill Quiz Set of 25</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    .quiz-container {
      max-width: 750px;
      margin: auto;
      background-color: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2, h3 {
      text-align: center;
    }
    #start-screen, #quiz-screen, #result-screen {
      margin-bottom: 20px;
    }
    #quiz-screen, #result-screen {
      display: none;
    }
    #timer {
      font-size: 1.2em;
      text-align: right;
      margin-bottom: 10px;
    }
    #score-display {
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: right;
    }
    .question {
      font-weight: bold;
      margin-bottom: 15px;
    }
    .feedback {
      margin-top: 10px;
      font-style: italic;
    }
    input[type="text"] {
      font-size: 1em;
      padding: 6px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      padding: 10px;
      font-size: 1em;
      width: 100%;
      margin-top: 5px;
    }
    .error-item {
      margin-bottom: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }
    .disabled {
      background-color: #eee;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Vocabulary Practice (B1 Level) - Gap Fill Quiz</h2>

    <!-- Start Screen -->
    <div id="start-screen">
      <label for="username">Enter your name:</label>
      <input type="text" id="username" required>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen">
      <div id="timer">Time Left: 10:00</div>
      <div id="score-display">Score: 100%</div>
      <div id="question-container"></div>
      <div id="feedback" class="feedback"></div>
      <button id="submit-btn">Submit Answer</button>
      <button id="next-btn" style="display: none;">Next Question</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen">
      <h3>Quiz Report</h3>
      <div id="final-score"></div>
      <div id="error-report"></div>
    </div>
  </div>

  <script>
    // Array of 25 gap-fill questions.
    const questions = [
      {
        question: "Every weekend, I always ____ my room to keep it neat and organized.",
        answer: "clean",
        explanation: "Clean means to remove dirt.",
        detailedExplanation: "Cleaning involves dusting, vacuuming, and tidying up your space so that it remains orderly and pleasant."
      },
      {
        question: "Before breakfast, I always ____ my teeth to start the day fresh.",
        answer: "brush",
        explanation: "Brush means to clean your teeth with a toothbrush.",
        detailedExplanation: "Regular brushing removes plaque and keeps your mouth healthy."
      },
      {
        question: "I ____ my homework every evening to keep up with my studies.",
        answer: "do",
        explanation: "Do means to complete your work.",
        detailedExplanation: "Doing your homework on time shows you are responsible and helps reinforce what you learn."
      },
      {
        question: "During the cold winter, I ____ a coat to stay warm.",
        answer: "wear",
        explanation: "Wear means to put on clothing.",
        detailedExplanation: "Wearing a coat provides insulation, which helps protect you from the cold weather."
      },
      {
        question: "My sister ____ a delicious cake for my birthday last year.",
        answer: "baked",
        explanation: "Baked means cooked in an oven.",
        detailedExplanation: "Baking is a method of preparing food, and in this case, your sister made a cake from scratch."
      },
      {
        question: "I always ____ a book before sleeping to relax my mind.",
        answer: "read",
        explanation: "Read means to look at and understand written text.",
        detailedExplanation: "Reading helps you wind down and can prepare your brain for a restful night’s sleep."
      },
      {
        question: "Every afternoon, I ____ a walk in the park for exercise.",
        answer: "take",
        explanation: "Take means to go on or have an activity.",
        detailedExplanation: "Taking a walk improves your health and helps clear your mind, making it a great daily habit."
      },
      {
        question: "I ____ my lunch at school in the cafeteria.",
        answer: "eat",
        explanation: "Eat means to consume food.",
        detailedExplanation: "Eating provides energy and nutrients, which are essential for staying active during the day."
      },
      {
        question: "During summer, we ____ to the beach for a fun day.",
        answer: "go",
        explanation: "Go means to travel or move from one place to another.",
        detailedExplanation: "Going to the beach is a popular way to enjoy the sunshine, relax, and have recreational fun."
      },
      {
        question: "My parents ____ a new car last month.",
        answer: "bought",
        explanation: "Bought means purchased.",
        detailedExplanation: "When you buy something, you exchange money for it. In this case, your parents invested in a new car."
      },
      {
        question: "When I am happy, I ____ with laughter.",
        answer: "laugh",
        explanation: "Laugh means to express joy by making sounds.",
        detailedExplanation: "Laughter is a natural response to happiness and helps create a positive atmosphere."
      },
      {
        question: "I ____ a letter to my friend every week to keep in touch.",
        answer: "write",
        explanation: "Write means to compose text.",
        detailedExplanation: "Writing letters is a thoughtful way to communicate and share news with friends."
      },
      {
        question: "At the park, children ____ on the swings with delight.",
        answer: "play",
        explanation: "Play means to engage in fun activities.",
        detailedExplanation: "Playing is an important way for children to build social skills and expend energy in a healthy way."
      },
      {
        question: "During the movie, I ____ quietly in my seat so as not to disturb others.",
        answer: "sit",
        explanation: "Sit means to rest by taking a seat.",
        detailedExplanation: "Sitting quietly in a movie theater shows respect for others and helps everyone enjoy the film."
      },
      {
        question: "When I visit a museum, I ____ the exhibits carefully.",
        answer: "view",
        explanation: "View means to look at something attentively.",
        detailedExplanation: "Viewing an exhibit allows you to appreciate art and history, gaining useful insights as you observe closely."
      },
      {
        question: "I ____ my favorite songs on my music player to relax.",
        answer: "listen",
        explanation: "Listen means to pay attention to sounds.",
        detailedExplanation: "Listening to music can soothe your mind and brighten your mood, especially during stressful times."
      },
      {
        question: "Before a big test, I ____ my notes to prepare thoroughly.",
        answer: "review",
        explanation: "Review means to study or examine again.",
        detailedExplanation: "Reviewing your notes reinforces your understanding of the material and helps keep important details fresh in your mind."
      },
      {
        question: "When traveling, I always ____ a passport to verify my identity.",
        answer: "carry",
        explanation: "Carry means to have something with you.",
        detailedExplanation: "Carrying your passport is essential when traveling internationally, as it serves as a proof of identity."
      },
      {
        question: "At home, I ____ the lights off before going to sleep.",
        answer: "turn",
        explanation: "Turn means to change the state of a device.",
        detailedExplanation: "Turning off the lights not only conserves energy but also creates a calm setting conducive to sleep."
      },
      {
        question: "During exercise, I make sure to ____ plenty of water.",
        answer: "drink",
        explanation: "Drink means to consume liquids.",
        detailedExplanation: "Drinking water during exercise keeps you hydrated and helps maintain your energy levels."
      },
      {
        question: "When in a rush, I ____ quickly to catch the bus.",
        answer: "run",
        explanation: "Run means to move swiftly on foot.",
        detailedExplanation: "Running helps you reach your destination faster, especially when you’re pressed for time."
      },
      {
        question: "I ____ really love trying new recipes to improve my cooking skills.",
        answer: "really",
        explanation: "Really means very much.",
        detailedExplanation: "Using the word 'really' emphasizes the strength of your feeling toward trying and experimenting with new recipes."
      },
      {
        question: "My teacher always ____ me to work hard and never give up.",
        answer: "encourages",
        explanation: "Encourages means to inspire or support.",
        detailedExplanation: "Encouragement from a teacher boosts your confidence and motivates you to overcome challenges."
      },
      {
        question: "When it rains, I prefer to ____ indoors with a good book.",
        answer: "stay",
        explanation: "Stay means to remain in one place.",
        detailedExplanation: "Staying indoors during rainy weather is cozy and gives you a chance to enjoy activities like reading."
      },
      {
        question: "After finishing a project, I ____ my work to see if there are any mistakes.",
        answer: "check",
        explanation: "Check means to examine carefully.",
        detailedExplanation: "Checking your work allows you to identify and correct errors, ensuring that your final product is accurate."
      }
    ];
    
    let currentQuestionIndex = 0;
    let score = 100;
    // Deduct this percentage for each wrong answer.
    const penalty = 100 / questions.length;
    let timerValue = 10 * 60; // 10 minutes in seconds
    let timerInterval;
    const incorrectAnswers = [];
    let username = "";
    
    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const startBtn = document.getElementById("start-btn");
    const submitBtn = document.getElementById("submit-btn");
    const nextBtn = document.getElementById("next-btn");
    const questionContainer = document.getElementById("question-container");
    const feedbackDiv = document.getElementById("feedback");
    const scoreDisplay = document.getElementById("score-display");
    const timerDisplay = document.getElementById("timer");
    const finalScoreDiv = document.getElementById("final-score");
    const errorReportDiv = document.getElementById("error-report");
    
    startBtn.addEventListener("click", startQuiz);
    submitBtn.addEventListener("click", submitAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    
    function startQuiz() {
      username = document.getElementById("username").value.trim() || "Student";
      startScreen.style.display = "none";
      quizScreen.style.display = "block";
      timerInterval = setInterval(updateTimer, 1000);
      displayQuestion();
    }
    
    function updateTimer() {
      let minutes = Math.floor(timerValue / 60);
      let seconds = timerValue % 60;
      timerDisplay.innerText = `Time Left: ${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
      if (timerValue <= 0) {
        clearInterval(timerInterval);
        finishQuiz();
      } else {
        timerValue--;
      }
    }
    
    function displayQuestion() {
      feedbackDiv.innerHTML = "";
      nextBtn.style.display = "none";
      submitBtn.style.display = "inline-block";
      questionContainer.innerHTML = "";
      
      const currentQ = questions[currentQuestionIndex];
      // Display question with gap
      const questionEl = document.createElement("div");
      questionEl.className = "question";
      questionEl.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.question}`;
      questionContainer.appendChild(questionEl);
      
      // Create input field for answer
      const inputField = document.createElement("input");
      inputField.type = "text";
      inputField.id = "answer-input";
      inputField.placeholder = "Type your answer here...";
      questionContainer.appendChild(inputField);
    }
    
    function submitAnswer() {
      const currentQ = questions[currentQuestionIndex];
      const userAnswer = document.getElementById("answer-input").value.trim().toLowerCase();
      const correctAnswer = currentQ.answer.toLowerCase();
      // Disable the input so the user cannot change the answer.
      document.getElementById("answer-input").disabled = true;
      // Hide the submit button after answer is submitted.
      submitBtn.style.display = "none";
      
      if (userAnswer === correctAnswer) {
        feedbackDiv.innerHTML = "<strong>Correct!</strong>";
      } else {
        feedbackDiv.innerHTML = "<strong>Incorrect.</strong> " 
          + currentQ.explanation 
          + "<br><br>" + currentQ.detailedExplanation;
        score -= penalty;
        incorrectAnswers.push({
          question: currentQ.question,
          yourAnswer: document.getElementById("answer-input").value,
          correctAnswer: currentQ.answer,
          explanation: currentQ.explanation,
          detailedExplanation: currentQ.detailedExplanation
        });
      }
    
      score = Math.max(score, 0);
      scoreDisplay.innerText = `Score: ${Math.round(score)}%`;
      nextBtn.style.display = "inline-block";
    }
    
    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        displayQuestion();
        // Reset the feedback and show the submit button again.
        feedbackDiv.innerHTML = "";
        submitBtn.style.display = "inline-block";
        nextBtn.style.display = "none";
      } else {
        finishQuiz();
      }
    }
    
    function finishQuiz() {
      clearInterval(timerInterval);
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScoreDiv.innerText = `${username}, your final score is ${Math.round(score)}%`;
    
      if (incorrectAnswers.length > 0) {
        let errorHtml = "<h4>Review your incorrect answers:</h4>";
        incorrectAnswers.forEach(item => {
          errorHtml += `<div class="error-item">
                          <strong>Question:</strong> ${item.question}<br>
                          <strong>Your answer:</strong> ${item.yourAnswer}<br>
                          <strong>Correct answer:</strong> ${item.correctAnswer}<br>
                          <strong>Short note:</strong> ${item.explanation}<br>
                          <strong>More details:</strong> ${item.detailedExplanation}
                        </div>`;
        });
        errorReportDiv.innerHTML = errorHtml;
      } else {
        errorReportDiv.innerHTML = "<h4>Great job! You answered all questions correctly.</h4>";
      }
    }
  </script>
</body>
</html>
