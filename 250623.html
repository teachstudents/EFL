<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parts of Speech Sort - Rebuilt</title>
    
    <style>
        /* --- CSS STYLES (New "Synthwave" Theme) --- */
        :root {
            --bg-main: #23212c;
            --bg-container: #2c2a3b;
            --primary-color: #ff79c6; /* Pink */
            --primary-dark: #e06ab0;
            --text-light: #f8f8f2;
            --text-dark: #6272a4;
            --border-color: #44475a;
            --correct-color: #50fa7b;  /* Bright Green */
            --incorrect-color: #ff5555; /* Bright Red */
            --gold-color: #f1fa8c;     /* Bright Yellow */
            --accent-cyan: #8be9fd;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: var(--bg-main); color: var(--text-light);
            margin: 0; font-size: 16px;
        }

        #game-container {
            width: 100%; height: 100%; max-width: 1200px; max-height: 850px;
            border: 1px solid var(--border-color); border-radius: 15px; background-color: var(--bg-container);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #hud {
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            padding: 0.75em 1.5em; font-size: 1em; font-weight: bold;
            background-color: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color); gap: 15px;
        }

        .screen {
            flex-grow: 1; display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 2em; box-sizing: border-box;
            overflow-y: auto;
        }

        .screen.active { display: flex; }
        
        #word-bank { 
            background-color: rgba(0,0,0,0.2); 
            padding: 1em; border-radius: 10px; margin-bottom: 2em; 
            width: 100%; max-width: 500px;
            min-height: 100px; display: flex; align-items: center; justify-content: center;
            border: 2px dashed var(--border-color);
            transition: background-color 0.3s;
        }
        .word {
            background-color: var(--primary-color); color: var(--bg-main); padding: 0.8em 1.5em;
            border-radius: 8px; cursor: grab; font-size: 1.8em; font-weight: bold;
            user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: opacity 0.2s, transform 0.2s;
        }
        .word.dragging { opacity: 0.4; cursor: grabbing; transform: scale(0.95); }
        
        #feedback-display {
            font-size: 1.8em; font-weight: bold;
            transition: opacity 0.3s ease;
        }
        .feedback-correct { color: var(--correct-color); }
        .feedback-incorrect { color: var(--incorrect-color); }

        .drop-zones {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 700px;
        }
        .zone {
            min-height: 80px; border: 2px solid var(--border-color); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.3em; font-weight: bold; transition: all 0.2s ease-in-out;
            padding: 1em; background-color: var(--bg-main);
            color: var(--text-dark);
        }
        
        .zone.drag-over { border-color: var(--primary-color); color: var(--text-light); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        button {
            background-color: var(--primary-color); color: #23212c; border: none;
            padding: 1em 2em; font-size: 1.1em; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease; margin: 5px;
        }
        button:hover { background-color: var(--primary-dark); transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        button:active { transform: translateY(-1px); }
        
        h1 { font-size: 3em; margin-bottom: 0.2em; color: var(--text-light); }
        h2 { font-size: 2em; }
        #error-list { list-style-type: none; padding: 0; max-height: 200px; overflow-y: auto; width: 90%; background-color: rgba(0,0,0,0.2); border-radius: 8px; }
        #error-list li { padding: 12px; margin: 8px; border-radius: 5px; border-left: 4px solid var(--incorrect-color); background-color: var(--bg-container); }
        #error-list li b { color: var(--accent-cyan); }

        #achievement-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background-color: var(--gold-color); color: black; padding: 15px 25px;
            border-radius: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-size: 1.2em; font-weight: bold; transition: top 0.5s ease-in-out;
            z-index: 1000;
        }
        #achievement-toast.show { top: 20px; }
        #rewards-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; width: 100%; max-width: 900px;
        }
        .reward-card {
            border: 2px solid var(--border-color); border-radius: 10px; padding: 15px; opacity: 0.5;
            background-color: var(--bg-main);
        }
        .reward-card.unlocked { opacity: 1; border-color: var(--gold-color); background-color: #44475a; }
        .reward-card h3 { margin: 0 0 5px 0; font-size: 1.1em; color: var(--gold-color) }
        .reward-card p { margin: 0; font-size: 0.9em; }

        @media (min-width: 768px) {
            .drop-zones { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

            <button id="start-game-btn">Start Game</button>
        </div>

            <div class="drop-zones"></div>
        </div>

            <h3>Words to Review:</h3>
            <ul id="error-list"></ul>
            <div>

            <button id="back-to-score-btn">Back to Score</button>

    </div>

            {word:"weekly",pos:["adjective"]},{word:"weird",pos:["adjective"]},{word:"welfare",pos:["noun"]},
            {word:"wheat",pos:["noun"]},{word:"whoever",pos:["pronoun"]},{word:"widespread",pos:["adjective"]},
            {word:"wisdom",pos:["noun"]},{word:"withdraw",pos:["verb"]},{word:"workforce",pos:["noun"]},
            {word:"workplace",pos:["noun"]},{word:"workshop",pos:["noun"]}
        ];

        const Game = {
            // --- Game Data & Configuration ---
            partsOfSpeech: ["noun", "verb", "adjective", "adverb"],
            masterWordList: [],
            gameConfig: { wordsPerRound: 20, timePerRound: 240 },
            achievements: {
                streak10: { title: 'Great Streak!', description: 'Get 10 correct answers in a row.', unlocked: false },
                streak25: { title: 'Grammar Genius!', description: 'Get 25 correct answers in a row.', unlocked: false },
                perfectRound: { title: 'Perfect Round', description: 'Complete a round with no mistakes.', unlocked: false },
                perfectionist: { title: 'Linguistic Legend', description: 'Complete the entire game with no mistakes.', unlocked: false },
                firstVictory: { title: 'Word Sorter', description: 'Complete the game for the first time.', unlocked: false }
            },

            // --- Game State (resets every game) ---
            state: {},
            
            // --- DOM Element Cache ---
            dom: {},

            // --- INITIALIZATION: Runs once when the page loads ---
            init() {
                this.cacheDom();
                this.bindEvents();
                this.filterWordList();
                console.log("Game Engine Initialized and Ready.");
            },

            cacheDom() {
                this.dom.screens = document.querySelectorAll('.screen');
                this.dom.hud = {
                    name: document.getElementById('player-name-display'),
                    round: document.getElementById('round-display'),
                    score: document.getElementById('score'),
                    timer: document.getElementById('timer'),
                    wordBank: document.getElementById('word-bank'),
                    dropZones: document.querySelector('.drop-zones')
                };
                this.dom.buttons = {
                    start: document.getElementById('start-game-btn'),
                    playAgain: document.getElementById('play-again-btn'),
                    viewRewards: document.getElementById('view-rewards-btn'),
                    backToScore: document.getElementById('back-to-score-btn')
                };
                this.dom.toast = document.getElementById('achievement-toast');
                this.dom.rewardsContainer = document.getElementById('rewards-container');
            },

            bindEvents() {
                this.dom.buttons.start.addEventListener('click', () => this.startGame());
                this.dom.buttons.playAgain.addEventListener('click', () => this.startGame());
                this.dom.buttons.viewRewards.addEventListener('click', () => this.showScreen('rewards-screen'));
                this.dom.buttons.backToScore.addEventListener('click', () => this.showScreen('end-screen'));
            },

            filterWordList() {
                this.masterWordList = fullWordList.filter(word => 
                    word.pos.some(p => this.partsOfSpeech.includes(p))
                );
            },

            // --- CORE GAME FLOW ---
            startGame() {
                this.state = {
                    score: 0,
                    errors: [],
                    currentRound: 0,
                    consecutiveCorrect: 0,
                    wordIndex: 0,
                    gameTimer: null,
                    timeLeft: 0,
                    playerName: document.getElementById('player-name-input').value.trim() || 'Explorer',
                    achievements: JSON.parse(JSON.stringify(this.achievements)),
                    wordListWithIDs: this.masterWordList.map((word, index) => ({ ...word, id: `word-${index}` })),
                    totalRounds: Math.ceil(this.masterWordList.length / this.gameConfig.wordsPerRound)
                };
                this.createDropZones();
                this.startNewRound();
            },

            startNewRound() {
                if (this.state.currentRound > 0 && this.state.roundErrors === 0) this.unlockAchievement('perfectRound');

                this.state.currentRound++;
                if (this.state.wordIndex >= this.state.wordListWithIDs.length) {
                    this.endGame(true);
                    return;
                }

                this.state.roundErrors = 0;
                const roundMessage = this.state.currentRound > 1 ? `Current Score: ${this.state.score}` : 'The first round begins now!';
                document.getElementById('round-interstitial-title').textContent = `Round ${this.state.currentRound} of ${this.state.totalRounds}`;
                document.getElementById('round-interstitial-message').textContent = roundMessage;
                this.showScreen('round-interstitial-screen');

                setTimeout(() => {
                    this.state.timeLeft = this.gameConfig.timePerRound;
                    this.updateHUD(); 
                    this.startTimer();
                    this.presentNextWord();
                    this.showScreen('sorting-screen');
                }, 2500);
            },

            endGame(completed) {
                clearInterval(this.state.gameTimer);
                const title = document.getElementById('end-screen-title');
                const heading = document.getElementById('final-score-heading');

                if (completed) {
                    this.unlockAchievement('firstVictory');
                    if (this.state.errors.length === 0) this.unlockAchievement('perfectionist');
                    title.textContent = "Game Complete!";
                    heading.textContent = `Congratulations, ${this.state.playerName}!`;
                } else {
                    title.textContent = "Time's Up!";
                    heading.textContent = `Good effort, ${this.state.playerName}!`;
                }

                document.getElementById('final-score').textContent = `Your Final Score: ${this.state.score}`;
                
                const errorList = document.getElementById('error-list');
                errorList.innerHTML = '';
                if (this.state.errors.length === 0) {
                    errorList.innerHTML = "<li>No mistakes made. Incredible!</li>";
                } else {
                    this.state.errors.forEach(err => errorList.innerHTML += `<li><b>${err.word}</b> (is a ${err.pos.join('/')})</li>`);
                }
                this.updateRewardsScreen();
                this.showScreen('end-screen');
            },
            
            // --- WORD & UI MANAGEMENT ---
            presentNextWord() {
                if (this.state.wordIndex > 0 && (this.state.wordIndex % this.gameConfig.wordsPerRound === 0)) {
                    this.startNewRound();
                    return;
                }
                
                if (this.state.wordIndex >= this.state.wordListWithIDs.length) {
                    this.endGame(true);
                    return;
                }
                
                const wordObj = this.state.wordListWithIDs[this.state.wordIndex];
                
                const wordDiv = document.createElement('div');
                wordDiv.textContent = wordObj.word;
                wordDiv.id = wordObj.id;
                wordDiv.className = 'word';
                wordDiv.draggable = true;
                wordDiv.addEventListener('dragstart', this.handleDragStart.bind(this));
                wordDiv.addEventListener('dragend', this.handleDragEnd.bind(this)); 
                
                this.dom.hud.wordBank.innerHTML = '';
                this.dom.hud.wordBank.appendChild(wordDiv);

                this.state.wordIndex++;
            },
            
            createDropZones() {
                this.dom.hud.dropZones.innerHTML = '';
                this.partsOfSpeech.forEach(pos => {
                    const zone = document.createElement('div');
                    zone.id = `zone-${pos}`;
                    zone.className = 'zone';
                    zone.textContent = pos.charAt(0).toUpperCase() + pos.slice(1);
                    zone.addEventListener('dragover', this.handleDragOver.bind(this));
                    zone.addEventListener('dragenter', this.handleDragEnter.bind(this));
                    zone.addEventListener('dragleave', this.handleDragLeave.bind(this));
                    zone.addEventListener('drop', this.handleDrop.bind(this));
                    this.dom.hud.dropZones.appendChild(zone);
                });
            },
            
            updateHUD() {
                this.dom.hud.name.textContent = this.state.playerName;
                this.dom.hud.score.textContent = `Score: ${this.state.score}`;
                this.dom.hud.round.textContent = this.state.currentRound > 0 ? `Round: ${this.state.currentRound}/${this.state.totalRounds}` : '';
                const minutes = Math.floor(this.state.timeLeft / 60) || 0;
                const seconds = this.state.timeLeft % 60 || 0;
                this.dom.hud.timer.textContent = `Time: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            },

            showScreen(screenId) {
                this.dom.screens.forEach(s => s.classList.toggle('active', s.id === screenId));
            },

            // --- EVENT HANDLERS ---
            handleGuess(isCorrect, wordInfo) {
                this.dom.hud.wordBank.innerHTML = ''; 
                const feedback = document.createElement('div');
                feedback.id = 'feedback-display';

                if (isCorrect) {
                    this.state.score++; 
                    this.state.consecutiveCorrect++;
                    feedback.textContent = "Correct!";
                    feedback.className = "feedback-correct";
                    if (this.state.consecutiveCorrect === 10) this.unlockAchievement('streak10');
                    if (this.state.consecutiveCorrect === 25) this.unlockAchievement('streak25');
                } else {
                    this.state.score--;
                    this.state.consecutiveCorrect = 0; 
                    this.state.roundErrors++;
                    if (!this.state.errors.some(e => e.id === wordInfo.id)) {
                        this.state.errors.push(wordInfo);
                    }
                    feedback.textContent = "Incorrect!";
                    feedback.className = "feedback-incorrect";
                }
                this.dom.hud.wordBank.appendChild(feedback);
                this.updateHUD();
                setTimeout(() => this.presentNextWord(), 800); 
            },

            handleDrop(e) {
                e.preventDefault();
                const droppedWordUniqueID = e.dataTransfer.getData('text/plain'); 
                const targetZone = e.target.closest('.zone');

                if (!targetZone || !droppedWordUniqueID) return;

                targetZone.classList.remove('drag-over');
                
                const wordInfo = this.state.wordListWithIDs.find(w => w.id === droppedWordUniqueID);

                if (!wordInfo) {
                    console.error("Critical Error: Dropped word not found in list:", droppedWordUniqueID);
                    this.presentNextWord();
                    return;
                }

                const droppedPos = targetZone.id.replace('zone-', '');
                const isCorrect = wordInfo.pos.includes(droppedPos);
                this.handleGuess(isCorrect, wordInfo);
            },

            handleDragStart(e) { 
                e.target.classList.add('dragging'); 
                e.dataTransfer.setData('text/plain', e.target.id);
            },
            
            handleDragEnd(e) {
                e.target.classList.remove('dragging');
            },

            handleDragOver(e) { e.preventDefault(); },
            handleDragEnter(e) { if (e.target.classList.contains('zone')) e.target.classList.add('drag-over'); },
            handleDragLeave(e) { if (e.target.classList.contains('zone')) e.target.classList.remove('drag-over'); },

            // --- ACHIEVEMENT & OTHER UTILITIES ---
            unlockAchievement(id) {
                if (!this.state.achievements[id] || this.state.achievements[id].unlocked) return;
                this.state.achievements[id].unlocked = true;
                this.dom.toast.textContent = `🏆 ${this.state.achievements[id].title}`;
                this.dom.toast.classList.add('show');
                setTimeout(() => this.dom.toast.classList.remove('show'), 4000);
            },

            updateRewardsScreen() {
                this.dom.rewardsContainer.innerHTML = '';
                for (const id in this.state.achievements) {
                    const ach = this.state.achievements[id];
                    const card = document.createElement('div');
                    card.className = `reward-card ${ach.unlocked ? 'unlocked' : ''}`;
                    card.innerHTML = `<h3>${ach.title}</h3><p>${ach.description}</p>`;
                    this.dom.rewardsContainer.appendChild(card);
                }
            },
            
            startTimer() {
                clearInterval(this.state.gameTimer);
                this.state.gameTimer = setInterval(() => {
                    this.state.timeLeft--; 
                    this.updateHUD();
                    if (this.state.timeLeft <= 0) {
                         this.endGame(false);
                    }
                }, 1000);
            }
        };

        Game.init();
    });
