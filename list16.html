<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List 16 Vocabulary Matching Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    :root {
      --main-bg: #f6f8fc;
      --panel-bg: #fcfdff;
      --accent: #5a73b5;
      --accent-soft: #b3c3e6;
      --accent-green: #43b581;
      --accent-red: #ea5d68;
      --text-main: #23272f;
      --text-soft: #6a768f;
      --button-bg: #e7ecfa;
      --button-hover: #dde4f7;
      --border: #e0e6ed;
      --shadow: 0 2px 8px 0 rgba(60,72,88,0.07);
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--main-bg);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 17px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    h1 {
      font-size: 1rem;
      margin: 16px 0 8px 0;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .top-bar {
      font-size: 0.98rem;
      color: var(--text-soft);
      display: flex;
      justify-content: center;
      gap: 1.7em;
      margin-bottom: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .game-panel {
      background: var(--panel-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 97vw;
      max-width: 680px;
      min-height: 340px;
      margin: 0 0 18px 0;
      padding: 18px 2vw 10px 2vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.2px solid var(--border);
    }
    .section-title {
      font-size: 1.08em;
      color: var(--text-soft);
      margin: 0 0 4px 0;
      font-weight: 500;
    }
    .main-word {
      font-size: clamp(2.1rem, 6vw, 2.5rem);
      font-weight: 800;
      color: var(--accent);
      margin: 5px 0 5px 0;
      letter-spacing: 0.01em;
    }
    .word-def {
      font-size: 1.13rem;
      color: var(--text-main);
      font-weight: 500;
      margin-bottom: 10px;
      margin-top: 0;
    }
    .choices-row {
      display: flex;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      margin: 10px 0 0 0;
    }
    .choice-btn {
      padding: 13px 10px;
      border-radius: 11px;
      background: var(--button-bg);
      border: 1.2px solid var(--border);
      color: var(--text-main);
      font-size: 1.08rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.14s, border-color 0.13s;
      font-family: inherit;
      font-weight: 500;
      box-shadow: 0 1px 3px 0 rgba(60,72,88,0.03);
      white-space: normal;
    }
    .choice-btn:hover, .choice-btn[aria-pressed="true"] {
      background: var(--button-hover);
      border-color: var(--accent);
    }
    .choice-btn.correct { background: #e2fbec; border-color: var(--accent-green); color: var(--accent-green);}
    .choice-btn.incorrect { background: #ffe8eb; border-color: var(--accent-red); color: var(--accent-red);}
    .gif-reward {
      width: 60px; height: 60px; margin: 10px auto 0 auto;
      display: block;
    }
    .question-counter {
      margin-top: 10px;
      color: var(--text-soft);
      font-size: 1.05em;
      font-weight: 500;
    }
    .score-final {
      color: var(--accent-green);
      font-size: 1.12em;
      font-weight: 600;
      margin: 10px 0 3px 0;
    }
    .alert {
      background: var(--accent-soft);
      color: #fff;
      padding: 8px 20px;
      border-radius: 6px;
      display: inline-block;
      margin: 7px 0;
      font-size: 1.03em;
      font-weight: 500;
      letter-spacing: 0.03em;
      box-shadow: 0 1px 4px 0 rgba(60,72,88,0.07);
    }
    .hidden { display: none !important; }
    #start-btn {
      font-size: 1.07rem;
      padding: 12px 32px;
      margin: 16px 0 10px 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px 0 rgba(60,72,88,0.08);
      transition: background 0.14s;
    }
    #start-btn:hover { background: var(--accent-soft);}
    #name-input {
      font-size: 1.03rem;
      padding: 9px 16px;
      border-radius: 6px;
      border: 1.2px solid var(--border);
      margin-top: 16px;
      width: 90vw;
      max-width: 260px;
      margin-bottom: 7px;
      background: #fff;
      color: var(--text-main);
    }
    @media (max-width: 800px) {
      .game-panel { max-width: 99vw; padding: 10px 1vw 7px 1vw;}
      .main-word { font-size: clamp(1.5rem, 8vw, 2.1rem);}
      .word-def { font-size: 1.01rem;}
    }
    @media (max-width: 550px) {
      .main-word { font-size: 1.1rem;}
      .word-def { font-size: 0.97rem;}
      .choice-btn { font-size: 0.91rem; padding: 10px 7px;}
      .game-panel { min-height: 0; padding: 6px 2vw 2px 2vw;}
      .top-bar { font-size: 0.96rem;}
      #name-input { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <h1>List 16 Vocabulary Matching Game</h1>
  <div class="top-bar">
    <span id="timer-bar"></span>
    <span id="score-bar"></span>
  </div>
  <input id="name-input" type="text" placeholder="Enter your name">
  <button id="start-btn">Start Game</button>
  <div id="game-container"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <script>
    // ================ DATA ================
    const vocab = [
      { word: "allowance", zh: "津贴 / 补助", def: "Money given regularly for spending." },
      { word: "mark", zh: "标记 / 分数", def: "A symbol or sign made on something." },
      { word: "pulse", zh: "脉搏", def: "The regular beat of the heart." },
      { word: "clerk", zh: "职员 / 店员", def: "A person who works in an office or store." },
      { word: "skate", zh: "滑冰", def: "To move on ice using special shoes." },
      { word: "souvenir", zh: "纪念品", def: "Something kept to remember a place or event." },
      { word: "robot", zh: "机器人", def: "A machine that can do tasks automatically." },
      { word: "sail", zh: "航行 / 帆", def: "To travel on water using a boat with sails." },
      { word: "quarrel", zh: "争吵", def: "A verbal argument or fight." },
      { word: "cupboard", zh: "橱柜", def: "A piece of furniture with shelves for storage." },
      { word: "single", zh: "单身的 / 单个的", def: "One only; not in a pair or group." },
      { word: "peace", zh: "和平", def: "A time without war or conflict." },
      { word: "alphabet", zh: "字母表", def: "A set of letters used in a language." },
      { word: "case", zh: "盒子 / 容器", def: "A container used to hold or protect something." },
      { word: "principle", zh: "原则", def: "A basic rule or belief." },
      { word: "patient", zh: "病人", def: "A person receiving medical treatment." },
      { word: "nation", zh: "国家", def: "A country or group of people with the same government." },
      { word: "atmosphere", zh: "大气 / 气氛", def: "The layer of gases around the Earth." },
      { word: "tube", zh: "管子", def: "A long, hollow object." },
      { word: "furniture", zh: "家具", def: "Items like chairs and tables used in a room." }
    ];

    // =========== HELPERS ===========
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    function getDistractors(correctIndex) {
      let indices = [...Array(vocab.length).keys()].filter(i => i !== correctIndex);
      shuffle(indices);
      return [vocab[correctIndex].zh, vocab[indices[0]].zh, vocab[indices[1]].zh].sort(() => Math.random() - 0.5);
    }

    // =========== STATE ===========
    let playerName = "";
    let score = 100; // Percentage
    let timer = 300; // 5 min = 300 sec
    let timerInterval = null;
    let part = 1;
    let qIndex = 0;
    let part1Queue = [];
    let part2Order = [];
    let part2QIndex = 0;

    // =========== DOM ===========
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const nameInput = document.getElementById('name-input');
    const correctSound = document.getElementById('correct-sound');
    const incorrectSound = document.getElementById('incorrect-sound');
    const timerBar = document.getElementById('timer-bar');
    const scoreBar = document.getElementById('score-bar');

    startBtn.onclick = startGame;
    function startGame() {
      playerName = nameInput.value.trim();
      if (!playerName) {
        showAlert("Please enter your name!");
        return;
      }
      startBtn.classList.add("hidden");
      nameInput.classList.add("hidden");
      score = 100;
      timer = 300;
      part = 1;
      qIndex = 0;
      part2QIndex = 0;
      part1Queue = shuffle([...Array(vocab.length).keys()]);
      updateBars();
      showPart1();
      startTimer();
    }
    function startTimer() {
      updateBars();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        updateBars();
        if (timer <= 0) {
          clearInterval(timerInterval);
          endQuiz();
        }
      }, 1000);
    }
    function updateBars() {
      timerBar.textContent = `Time Left: ${Math.floor(timer/60)}:${('0'+(timer%60)).slice(-2)}`;
      scoreBar.textContent = `Score: ${score}%`;
    }

    // =========== PART 1 ===========
    function showPart1() {
      if (timer <= 0) { endQuiz(); return; }
      if (part1Queue.length === 0) {
        // Move to part 2 automatically
        part = 2;
        part2Order = shuffle([...Array(vocab.length).keys()]);
        part2QIndex = 0;
        showPart2();
        return;
      }
      let idx = part1Queue[0];
      let vocabItem = vocab[idx];
      let choices = getDistractors(idx);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 1: English + Definition → Chinese Translation</div>
          <div class="main-word">${vocabItem.word}</div>
          <div class="word-def">${vocabItem.def}</div>
          <div class="choices-row">
            ${choices.map((zh, i) =>
              `<button class="choice-btn" onclick="selectPart1('${zh.replace(/'/g, "\\'")}', this)">${zh}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Remaining: ${part1Queue.length}</div>
        </div>
      `;
      window.selectPart1 = selectPart1;
    }
    function selectPart1(selectedZh, btn) {
      let idx = part1Queue[0];
      let correctZh = vocab[idx].zh;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (selectedZh === correctZh) {
        btn.classList.add("correct");
        correctSound.play();
        showReward("reward1.gif");
        part1Queue.shift(); // Remove from queue
      } else {
        btn.classList.add("incorrect");
        let correctBtn = Array.from(buttons).find(b => b.textContent === correctZh);
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert(`❌ Incorrect! 正确答案: ${correctZh}`);
        // Re-insert at a random position after the next question
        let reinsertPos = Math.floor(Math.random() * (part1Queue.length-1)) + 1;
        part1Queue.splice(reinsertPos, 0, part1Queue[0]);
        part1Queue.shift(); // Remove current
        score = Math.max(score - 5, 0);
      }
      updateBars();
      setTimeout(showPart1, 1100);
    }
    function showReward(gif) {
      let img = document.createElement('img');
      img.src = gif;
      img.className = 'gif-reward';
      document.querySelector('.game-panel').appendChild(img);
    }

    // =========== PART 2 ===========
    function showPart2() {
      if (timer <= 0) { endQuiz(); return; }
      if (part2QIndex >= vocab.length) {
        endQuiz();
        return;
      }
      let idx = part2Order[part2QIndex];
      let word = vocab[idx].word;
      // Build a set of 9 random incorrect definitions + 1 correct
      let correctDef = vocab[idx].def;
      let allDefs = vocab.map((v, i) => ({def: v.def, idx: i}));
      let incorrectDefs = allDefs.filter(d => d.idx !== idx);
      shuffle(incorrectDefs);
      let defs10 = [ {def: correctDef, idx: idx}, ...incorrectDefs.slice(0,9) ];
      shuffle(defs10);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 2: English Word → Definition</div>
          <div class="main-word">${word}</div>
          <div class="choices-row">
            ${defs10.map((d, i) =>
              `<button class="choice-btn" style="white-space:normal;" onclick="selectPart2(${idx},${d.idx},this)">${d.def}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Remaining: ${vocab.length - part2QIndex}</div>
        </div>
      `;
      window.selectPart2 = selectPart2;
    }
    function selectPart2(wordIdx, defIdx, btn) {
      let correctIdx = wordIdx;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (defIdx === correctIdx) {
        btn.classList.add("correct");
        correctSound.play();
        showReward("reward2.gif");
      } else {
        btn.classList.add("incorrect");
        let correctDef = vocab[correctIdx].def;
        let correctBtn = Array.from(buttons).find(b => b.textContent === correctDef);
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert("❌ Incorrect! 正确答案: " + correctDef);
        score = Math.max(score - 5, 0);
      }
      updateBars();
      setTimeout(() => {
        part2QIndex++;
        showPart2();
      }, 1100);
    }

    // =========== END QUIZ ===========
    function endQuiz() {
      clearInterval(timerInterval);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="score-final">Test Complete!</div>
          <div class="score-final">Final Score: ${score}%</div>
          <p>Great work, ${playerName}!</p>
          <button onclick="location.reload()">Restart Game</button>
        </div>
      `;
    }
    // =========== ALERT =============
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.textContent = msg;
      document.querySelector('.game-panel').appendChild(div);
      setTimeout(() => div.remove(), 1050);
    }
  </script>
</body>
</html>
