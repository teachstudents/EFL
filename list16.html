<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List 16 Vocabulary Matching Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    :root {
      --main-bg: #f4f7fb;
      --panel-bg: #f9fafc;
      --accent: #6c63ff;
      --accent-soft: #aab6fe;
      --accent-green: #43b581;
      --accent-red: #ff616f;
      --text-main: #222;
      --text-soft: #555;
      --button-bg: #e6eaff;
      --button-hover: #dadffe;
      --button-active: #cfd6fd;
      --border: #e0e6ed;
      --shadow: 0 2px 8px 0 rgba(60,72,88,0.08);
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--main-bg);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.1rem;
      margin: 18px 0 8px 0;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .top-bar {
      font-size: 1rem;
      color: var(--text-soft);
      display: flex;
      justify-content: center;
      gap: 1.7em;
      margin-bottom: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .game-panel {
      background: var(--panel-bg);
      border-radius: 18px;
      box-shadow: var(--shadow);
      width: 97vw;
      max-width: 680px;
      min-height: 340px;
      margin: 0 0 18px 0;
      padding: 20px 2vw 12px 2vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid var(--border);
    }
    .section-title {
      font-size: 1.13em;
      color: var(--text-soft);
      margin: 0 0 6px 0;
      font-weight: 500;
    }
    .main-word {
      font-size: clamp(2.1rem, 6vw, 2.7rem);
      font-weight: 800;
      color: var(--accent);
      margin: 5px 0 5px 0;
      letter-spacing: 0.01em;
    }
    .word-def {
      font-size: 1.19rem;
      color: var(--text-main);
      font-weight: 500;
      margin-bottom: 10px;
      margin-top: 0;
    }
    .choices-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin: 10px 0 0 0;
    }
    .choice-btn {
      padding: 13px 10px;
      border-radius: 11px;
      background: var(--button-bg);
      border: 1.5px solid var(--border);
      color: var(--text-main);
      font-size: 1.1rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s;
      font-family: inherit;
      font-weight: 500;
      box-shadow: 0 1px 3px 0 rgba(60,72,88,0.03);
    }
    .choice-btn:hover, .choice-btn[aria-pressed="true"] {
      background: var(--button-hover);
      border-color: var(--accent);
    }
    .choice-btn.correct { background: #e2fbec; border-color: var(--accent-green); color: var(--accent-green);}
    .choice-btn.incorrect { background: #ffe8eb; border-color: var(--accent-red); color: var(--accent-red);}
    .gif-reward {
      width: 60px; height: 60px; margin: 10px auto;
      display: block;
    }
    .question-counter {
      margin-top: 10px;
      color: var(--text-soft);
      font-size: 1.07em;
      font-weight: 500;
    }
    .score-final {
      color: var(--accent-green);
      font-size: 1.15em;
      font-weight: 600;
      margin: 10px 0 3px 0;
    }
    .alert {
      background: var(--accent-soft);
      color: #fff;
      padding: 9px 20px;
      border-radius: 6px;
      display: inline-block;
      margin: 8px 0;
      font-size: 1.04em;
      font-weight: 500;
      letter-spacing: 0.03em;
      box-shadow: 0 1px 4px 0 rgba(60,72,88,0.07);
    }
    .hidden { display: none !important; }
    #start-btn {
      font-size: 1.1rem;
      padding: 13px 34px;
      margin: 17px 0 11px 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px 0 rgba(60,72,88,0.08);
      transition: background 0.16s;
    }
    #start-btn:hover { background: var(--accent-soft);}
    #name-input {
      font-size: 1.07rem;
      padding: 10px 18px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      margin-top: 18px;
      width: 90vw;
      max-width: 270px;
      margin-bottom: 7px;
      background: #fff;
      color: var(--text-main);
    }
    @media (max-width: 800px) {
      .game-panel { max-width: 99vw; padding: 12px 1vw 8px 1vw;}
      .main-word { font-size: clamp(1.5rem, 8vw, 2.2rem);}
      .word-def { font-size: 1.07rem;}
    }
    @media (max-width: 550px) {
      .main-word { font-size: 1.2rem;}
      .word-def { font-size: 0.99rem;}
      .choice-btn { font-size: 0.96rem; padding: 11px 7px;}
      .game-panel { min-height: 0; padding: 7px 2vw 3px 2vw;}
      .top-bar { font-size: 0.98rem;}
      #name-input { font-size: 0.97rem; }
    }
  </style>
</head>
<body>
  <h1>List 16 Vocabulary Matching Game</h1>
  <div class="top-bar">
    <span id="timer-bar"></span>
    <span id="score-bar"></span>
  </div>
  <input id="name-input" type="text" placeholder="Enter your name">
  <button id="start-btn">Start Game</button>
  <div id="game-container"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <script>
    // ================ DATA ================
    const vocab = [
      { word: "allowance", zh: "津贴 / 补助", def: "Money given regularly for spending." },
      { word: "mark", zh: "标记 / 分数", def: "A symbol or sign made on something." },
      { word: "pulse", zh: "脉搏", def: "The regular beat of the heart." },
      { word: "clerk", zh: "职员 / 店员", def: "A person who works in an office or store." },
      { word: "skate", zh: "滑冰", def: "To move on ice using special shoes." },
      { word: "souvenir", zh: "纪念品", def: "Something kept to remember a place or event." },
      { word: "robot", zh: "机器人", def: "A machine that can do tasks automatically." },
      { word: "sail", zh: "航行 / 帆", def: "To travel on water using a boat with sails." },
      { word: "quarrel", zh: "争吵", def: "A verbal argument or fight." },
      { word: "cupboard", zh: "橱柜", def: "A piece of furniture with shelves for storage." },
      { word: "single", zh: "单身的 / 单个的", def: "One only; not in a pair or group." },
      { word: "peace", zh: "和平", def: "A time without war or conflict." },
      { word: "alphabet", zh: "字母表", def: "A set of letters used in a language." },
      { word: "case", zh: "盒子 / 容器", def: "A container used to hold or protect something." },
      { word: "principle", zh: "原则", def: "A basic rule or belief." },
      { word: "patient", zh: "病人", def: "A person receiving medical treatment." },
      { word: "nation", zh: "国家", def: "A country or group of people with the same government." },
      { word: "atmosphere", zh: "大气 / 气氛", def: "The layer of gases around the Earth." },
      { word: "tube", zh: "管子", def: "A long, hollow object." },
      { word: "furniture", zh: "家具", def: "Items like chairs and tables used in a room." }
    ];

    // =========== HELPERS ===========
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    // Distractors for Part 1
    function getDistractors(correctIndex) {
      let indices = [...Array(vocab.length).keys()].filter(i => i !== correctIndex);
      shuffle(indices);
      return [vocab[correctIndex].zh, vocab[indices[0]].zh, vocab[indices[1]].zh].sort(() => Math.random() - 0.5);
    }

    // =========== STATE ===========
    let playerName = "";
    let part = 1;
    let score = 0;
    let timer = 0;
    let qIndex = 0;
    let timerInterval = null;
    let part1Order = [];
    let part2Order = [];
    let part1Block = 0; // 0 or 1 for 2 blocks of 10
    let part2Block = 0;
    let part1Blocks = [[],[]];
    let part2Blocks = [[],[]];

    // =========== DOM ===========
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const nameInput = document.getElementById('name-input');
    const correctSound = document.getElementById('correct-sound');
    const incorrectSound = document.getElementById('incorrect-sound');
    const timerBar = document.getElementById('timer-bar');
    const scoreBar = document.getElementById('score-bar');

    startBtn.onclick = startGame;
    function startGame() {
      playerName = nameInput.value.trim();
      if (!playerName) {
        showAlert("Please enter your name!");
        return;
      }
      startBtn.classList.add("hidden");
      nameInput.classList.add("hidden");
      score = 0; part = 1; qIndex = 0; part1Block = 0; part2Block = 0;
      part1Order = shuffle([...Array(vocab.length).keys()]);
      part1Blocks = [part1Order.slice(0,10), part1Order.slice(10)];
      timer = 120;
      updateBars();
      showPart1();
      startTimer();
    }
    function startTimer() {
      updateBars();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        updateBars();
        if (timer <= 0) {
          clearInterval(timerInterval);
          if (part === 1) part1End();
          else part2End();
        }
      }, 1000);
    }
    function updateBars() {
      timerBar.textContent = `Time Left: ${Math.floor(timer/60)}:${('0'+(timer%60)).slice(-2)}`;
      scoreBar.textContent = `Score: ${score}`;
    }

    // =========== PART 1 ===========
    function showPart1() {
      let block = part1Blocks[part1Block];
      let idx = block[qIndex];
      let vocabItem = vocab[idx];
      let choices = getDistractors(idx);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 1 (2 min): English + Definition → Chinese Translation</div>
          <div class="main-word">${vocabItem.word}</div>
          <div class="word-def">${vocabItem.def}</div>
          <div class="choices-row">
            ${choices.map((zh, i) =>
              `<button class="choice-btn" onclick="selectPart1('${zh.replace(/'/g, "\\'")}', this)">${String.fromCharCode(65+i)}. ${zh}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${qIndex+1 + part1Block*10} / 20</div>
        </div>
      `;
      window.selectPart1 = selectPart1;
    }
    function selectPart1(selectedZh, btn) {
      let block = part1Blocks[part1Block];
      let idx = block[qIndex];
      let correctZh = vocab[idx].zh;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (selectedZh === correctZh) {
        score++;
        btn.classList.add("correct");
        correctSound.play();
        showReward("reward1.gif");
      } else {
        btn.classList.add("incorrect");
        let correctBtn = Array.from(buttons).find(b => b.textContent.includes(correctZh));
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert(`❌ Incorrect! 正确答案: ${correctZh}`);
      }
      setTimeout(() => {
        qIndex++;
        if (qIndex >= 10) {
          if (part1Block === 0) {
            part1Block = 1; qIndex = 0;
            showPart1BlockEnd();
          } else {
            clearInterval(timerInterval);
            part1End();
          }
        } else {
          showPart1();
        }
        updateBars();
      }, 1100);
    }
    function showPart1BlockEnd() {
      gameContainer.innerHTML = `<div class="game-panel">
        <div class="score-final">Block 1 Complete!</div>
        <div class="score-final">Score so far: ${score} / 20</div>
        <button id="next-block1">Next 10 Questions</button>
      </div>`;
      document.getElementById('next-block1').onclick = () => { showPart1(); };
    }
    function part1End() {
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="score-final">Part 1 Complete!</div>
          <div class="score-final">Score: ${score} / 20</div>
          <p>Time Used: ${120 - timer} seconds</p>
          <button id="start-part2">Start Part 2</button>
        </div>
      `;
      document.getElementById('start-part2').onclick = startPart2;
    }
    function showReward(gif) {
      let img = document.createElement('img');
      img.src = gif;
      img.className = 'gif-reward';
      document.querySelector('.game-panel').appendChild(img);
    }

    // =========== PART 2 ===========
    function startPart2() {
      part = 2; qIndex = 0; part2Block = 0;
      part2Order = shuffle([...Array(vocab.length).keys()]);
      part2Blocks = [part2Order.slice(0,10), part2Order.slice(10)];
      timer = 180;
      updateBars();
      showPart2();
      startTimer();
    }
    function showPart2() {
      let block = part2Blocks[part2Block];
      let idx = block[qIndex];
      let word = vocab[idx].word;
      // build definitions list (shuffle, always 20, but show all as buttons)
      let defs = vocab.map((v, i) => ({def: v.def, idx: i}));
      defs = shuffle(defs);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 2 (3 min): English Word → Definition</div>
          <div class="main-word">${word}</div>
          <div class="choices-row">
            ${defs.map((d, i) =>
              `<button class="choice-btn" style="white-space:normal;" onclick="selectPart2(${idx},${d.idx},this)">${String.fromCharCode(65+i)}. ${d.def}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${qIndex+1 + part2Block*10} / 20</div>
        </div>
      `;
      window.selectPart2 = selectPart2;
    }
    function selectPart2(wordIdx, defIdx, btn) {
      let correctIdx = wordIdx;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (defIdx === correctIdx) {
        score++;
        btn.classList.add("correct");
        correctSound.play();
        showReward("reward2.gif");
      } else {
        btn.classList.add("incorrect");
        let correctDef = vocab[correctIdx].def;
        let correctBtn = Array.from(buttons).find(b => b.textContent.includes(correctDef));
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert("❌ Incorrect! 正确答案: " + correctDef);
      }
      setTimeout(() => {
        qIndex++;
        if (qIndex >= 10) {
          if (part2Block === 0) {
            part2Block = 1; qIndex = 0;
            showPart2BlockEnd();
          } else {
            clearInterval(timerInterval);
            part2End();
          }
        } else {
          showPart2();
        }
        updateBars();
      }, 1100);
    }
    function showPart2BlockEnd() {
      gameContainer.innerHTML = `<div class="game-panel">
        <div class="score-final">Block 1 Complete!</div>
        <div class="score-final">Score so far: ${score} / 20</div>
        <button id="next-block2">Next 10 Questions</button>
      </div>`;
      document.getElementById('next-block2').onclick = () => { showPart2(); };
    }
    function part2End() {
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="score-final">Game Over!</div>
          <div class="score-final">Final Score: ${score} / 20 (Part 2)</div>
          <p>Well done, ${playerName}!</p>
          <button onclick="location.reload()">Restart Game</button>
        </div>
      `;
    }
    // =========== ALERT =============
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.textContent = msg;
      document.querySelector('.game-panel').appendChild(div);
      setTimeout(() => div.remove(), 1150);
    }
  </script>
</body>
</html>
