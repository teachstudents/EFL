<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List 16 Vocabulary Matching Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f0f8ff; text-align: center; color: #333; }
    h1 { color: #ff6347; }
    .question, .part2 { background: #fff; border: 2px solid #ff6347; border-radius: 10px; margin: 20px auto; max-width: 600px; padding: 24px; }
    .choices { display: flex; justify-content: center; gap: 16px; margin: 20px 0; }
    .choices button, .defs-list button { padding: 10px 18px; border-radius: 8px; border: none; background: #ff6347; color: #fff; font-size: 18px; cursor: pointer; }
    .choices button:hover, .defs-list button:hover { background: #ff4500; }
    .defs-list { display: flex; flex-direction: column; align-items: stretch; }
    .defs-list button { margin: 6px 0; text-align: left; }
    .timer, .score { font-size: 22px; margin: 10px 0; }
    .alert { background: #f0ad4e; color: #fff; padding: 8px 20px; border-radius: 5px; display: inline-block; margin: 10px 0; }
    .hidden { display: none !important; }
    #start-btn { font-size: 20px; padding: 12px 30px; margin-top: 20px; }
    #name-input { font-size: 18px; padding: 8px 12px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>List 16 Vocabulary Matching Game</h1>
  <input id="name-input" type="text" placeholder="Enter your name">
  <button id="start-btn">Start Game</button>
  <div id="game-container"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <script>
    // Vocabulary Data (20 items)
    const vocab = [
      { word: "allowance", zh: "津贴 / 补助", def: "Money given regularly for spending." },
      { word: "mark", zh: "标记 / 分数", def: "A symbol or sign made on something." },
      { word: "pulse", zh: "脉搏", def: "The regular beat of the heart." },
      { word: "clerk", zh: "职员 / 店员", def: "A person who works in an office or store." },
      { word: "skate", zh: "滑冰", def: "To move on ice using special shoes." },
      { word: "souvenir", zh: "纪念品", def: "Something kept to remember a place or event." },
      { word: "robot", zh: "机器人", def: "A machine that can do tasks automatically." },
      { word: "sail", zh: "航行 / 帆", def: "To travel on water using a boat with sails." },
      { word: "quarrel", zh: "争吵", def: "A verbal argument or fight." },
      { word: "cupboard", zh: "橱柜", def: "A piece of furniture with shelves for storage." },
      { word: "single", zh: "单身的 / 单个的", def: "One only; not in a pair or group." },
      { word: "peace", zh: "和平", def: "A time without war or conflict." },
      { word: "alphabet", zh: "字母表", def: "A set of letters used in a language." },
      { word: "case", zh: "盒子 / 容器", def: "A container used to hold or protect something." },
      { word: "principle", zh: "原则", def: "A basic rule or belief." },
      { word: "patient", zh: "病人", def: "A person receiving medical treatment." },
      { word: "nation", zh: "国家", def: "A country or group of people with the same government." },
      { word: "atmosphere", zh: "大气 / 气氛", def: "The layer of gases around the Earth." },
      { word: "tube", zh: "管子", def: "A long, hollow object." },
      { word: "furniture", zh: "家具", def: "Items like chairs and tables used in a room." }
    ];

    // Part 1 distractor Chinese translations (random from others)
    function getDistractors(correctIndex) {
      let indices = [...Array(vocab.length).keys()].filter(i => i !== correctIndex);
      shuffle(indices);
      return [vocab[correctIndex].zh, vocab[indices[0]].zh, vocab[indices[1]].zh].sort(() => Math.random() - 0.5);
    }

    // Shuffle Helper
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // State
    let playerName = "";
    let part = 1;
    let score = 0;
    let timer = 0;
    let qIndex = 0;
    let timerInterval = null;
    let part1Order = [];
    let part2Order = [];
    let usedDefs = [];

    // DOM
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const nameInput = document.getElementById('name-input');
    const correctSound = document.getElementById('correct-sound');
    const incorrectSound = document.getElementById('incorrect-sound');

    startBtn.onclick = startGame;

    function startGame() {
      playerName = nameInput.value.trim();
      if (!playerName) {
        showAlert("Please enter your name!");
        return;
      }
      startBtn.classList.add("hidden");
      nameInput.classList.add("hidden");
      score = 0;
      qIndex = 0;
      part = 1;
      part1Order = shuffle([...Array(vocab.length).keys()]);
      timer = 120; // 2 minutes for part 1
      showPart1();
      startTimer();
    }

    function startTimer() {
      showTimer();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        showTimer();
        if (timer <= 0) {
          clearInterval(timerInterval);
          if (part === 1) part1End();
          else part2End();
        }
      }, 1000);
    }
    function showTimer() {
      gameContainer.querySelector('.timer').textContent = `Time Left: ${Math.floor(timer/60)}:${('0'+(timer%60)).slice(-2)}`;
    }

    // ------------- PART 1 -------------
    function showPart1() {
      const idx = part1Order[qIndex];
      const vocabItem = vocab[idx];
      const choices = getDistractors(idx);
      gameContainer.innerHTML = `
        <div class="timer"></div>
        <div class="score">Score: ${score}</div>
        <div class="question">
          <h2>Part 1 (2 min): English + Definition → Chinese Translation</h2>
          <p><b>Word:</b> ${vocabItem.word}</p>
          <p><b>Definition:</b> ${vocabItem.def}</p>
          <div class="choices">
            ${choices.map((zh, i) =>
              `<button onclick="selectPart1('${zh.replace(/'/g, "\\'")}')">${zh}</button>`
            ).join('')}
          </div>
          <div>Question ${qIndex+1} / 20</div>
        </div>
      `;
      showTimer();
      window.selectPart1 = selectPart1;
    }

    function selectPart1(selectedZh) {
      const idx = part1Order[qIndex];
      const correctZh = vocab[idx].zh;
      if (selectedZh === correctZh) {
        score++;
        correctSound.play();
        showAlert("✅ Correct!");
      } else {
        incorrectSound.play();
        showAlert(`❌ Incorrect! Correct: ${correctZh}`);
      }
      qIndex++;
      if (qIndex >= vocab.length) {
        clearInterval(timerInterval);
        part1End();
      } else {
        showPart1();
      }
    }

    function part1End() {
      gameContainer.innerHTML = `
        <div class="question">
          <h2>Part 1 Complete!</h2>
          <div class="score">Score: ${score} / 20</div>
          <p>Time Used: ${120 - timer} seconds</p>
          <button onclick="startPart2()">Start Part 2</button>
        </div>
      `;
      window.startPart2 = startPart2;
    }

    // ------------- PART 2 -------------
    function startPart2() {
      part = 2;
      qIndex = 0;
      usedDefs = [];
      timer = 180; // 3 minutes
      part2Order = shuffle([...Array(vocab.length).keys()]);
      score = 0;
      showPart2();
      startTimer();
    }

    function showPart2() {
      const idx = part2Order[qIndex];
      const word = vocab[idx].word;
      // build definitions list (shuffle)
      let defs = vocab.map((v, i) => ({def: v.def, idx: i}));
      defs = shuffle(defs);
      usedDefs = defs.map(d => d.idx); // record mapping for checking
      gameContainer.innerHTML = `
        <div class="timer"></div>
        <div class="score">Score: ${score}</div>
        <div class="part2">
          <h2>Part 2 (3 min): English Word → Definition</h2>
          <p><b>Word:</b> ${word}</p>
          <div class="defs-list">
            ${defs.map((d, i) =>
              `<button onclick="selectPart2(${idx},${d.idx},this)">${String.fromCharCode(65+i)}. ${d.def}</button>`
            ).join('')}
          </div>
          <div>Question ${qIndex+1} / 20</div>
        </div>
      `;
      showTimer();
      window.selectPart2 = selectPart2;
    }

    function selectPart2(wordIdx, defIdx, btn) {
      const correctIdx = wordIdx;
      if (defIdx === correctIdx) {
        score++;
        correctSound.play();
        btn.style.background = "#4caf50";
        showAlert("✅ Correct!");
      } else {
        incorrectSound.play();
        btn.style.background = "#ff4500";
        showAlert("❌ Incorrect! Correct: " + vocab[wordIdx].def);
      }
      // Prevent double clicks
      const buttons = document.querySelectorAll('.defs-list button');
      buttons.forEach(b => b.disabled = true);
      setTimeout(() => {
        qIndex++;
        if (qIndex >= vocab.length || timer <= 0) {
          clearInterval(timerInterval);
          part2End();
        } else {
          showPart2();
        }
      }, 900);
    }

    function part2End() {
      gameContainer.innerHTML = `
        <div class="question">
          <h2>Game Over!</h2>
          <div class="score">Final Score: ${score} / 20 (Part 2)</div>
          <p>Well done, ${playerName}!</p>
          <button onclick="location.reload()">Restart Game</button>
        </div>
      `;
    }

    // ------------- Alert Helper -------------
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.textContent = msg;
      gameContainer.appendChild(div);
      setTimeout(() => div.remove(), 1200);
    }
  </script>
</body>
</html>
