<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Practice (B1 Level) - New Set of 25</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    .quiz-container {
      max-width: 750px;
      margin: auto;
      background-color: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2, h3 {
      text-align: center;
    }
    #start-screen, #quiz-screen, #result-screen {
      margin-bottom: 20px;
    }
    #quiz-screen, #result-screen {
      display: none;
    }
    #timer {
      font-size: 1.2em;
      text-align: right;
      margin-bottom: 10px;
    }
    #score-display {
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: right;
    }
    .question {
      font-weight: bold;
      margin-bottom: 15px;
    }
    .option {
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .option:hover {
      background-color: #eee;
    }
    .option.correct {
      background-color: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }
    .option.incorrect {
      background-color: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }
    .disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    #feedback {
      margin-top: 10px;
      font-style: italic;
    }
    #next-btn {
      margin-top: 20px;
      display: none;
      width: 100%;
      padding: 10px;
      font-size: 1em;
    }
    .error-item {
      margin-bottom: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Vocabulary Practice (B1 Level) - New Set of 25</h2>

    <!-- Start Screen -->
    <div id="start-screen">
      <label for="username">Enter your name:</label>
      <input type="text" id="username" required>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen">
      <div id="timer">Time Left: 10:00</div>
      <div id="score-display">Score: 100%</div>
      <div id="question-container"></div>
      <div id="feedback"></div>
      <button id="next-btn">Next Question</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen">
      <h3>Quiz Report</h3>
      <div id="final-score"></div>
      <div id="error-report"></div>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "When I get home, I always ____ my shoes at the door.",
        options: ["remove", "repair", "wear", "ignore"],
        correct: 0,
        explanation: "Remove means to take something off.",
        detailedExplanation: "Removing your shoes at the door helps keep the home clean by preventing dirt from being tracked inside."
      },
      {
        question: "During the exam, I try to ____ my worries and concentrate on the questions.",
        options: ["forget", "remember", "share", "raise"],
        correct: 0,
        explanation: "Forget means to stop thinking about something.",
        detailedExplanation: "Forgetting your worries, even temporarily, allows you to focus clearly on the exam and perform better."
      },
      {
        question: "I ____ my English lessons every afternoon in order to improve my speaking skills.",
        options: ["practice", "ignore", "pause", "leave"],
        correct: 0,
        explanation: "Practice means to work on something repeatedly.",
        detailedExplanation: "Regular practice helps you gain confidence and fluency in English over time."
      },
      {
        question: "When the phone rings, I always ____ it as soon as possible.",
        options: ["answer", "miss", "skip", "avoid"],
        correct: 0,
        explanation: "Answer means to pick up the phone and speak.",
        detailedExplanation: "Answering the phone promptly shows good communication skills and helps you stay reachable."
      },
      {
        question: "In the library, people are asked to speak very ____ to maintain a quiet study area.",
        options: ["quietly", "loudly", "quickly", "angrily"],
        correct: 0,
        explanation: "Quietly means to speak softly.",
        detailedExplanation: "Speaking quietly in the library ensures that everyone has a peaceful environment for reading and studying."
      },
      {
        question: "I ____ my bag carefully so that nothing falls out when I walk.",
        options: ["carry", "drop", "throw", "rip"],
        correct: 0,
        explanation: "Carry means to hold something and move with it.",
        detailedExplanation: "Carrying your bag properly prevents items from falling and keeps your belongings secure."
      },
      {
        question: "My friend always ____ his homework on time before dinner.",
        options: ["finishes", "starts", "watches", "writes"],
        correct: 0,
        explanation: "Finishes means to complete.",
        detailedExplanation: "Completing homework on time is important for learning and shows responsibility."
      },
      {
        question: "At the park, many children ____ back and forth on the swings.",
        options: ["swing", "run", "walk", "jump"],
        correct: 0,
        explanation: "Swing means to move back and forth.",
        detailedExplanation: "Children swing on playground equipment for fun and exercise, making it the best fit for the context."
      },
      {
        question: "In class, students are expected to ____ their hands when they want to ask a question.",
        options: ["raise", "lower", "cover", "ignore"],
        correct: 0,
        explanation: "Raise means to lift up.",
        detailedExplanation: "By raising your hand, you indicate to the teacher that you have a question or want to speak."
      },
      {
        question: "I ____ my favorite song on my headphones during my morning commute.",
        options: ["listen", "sing", "write", "draw"],
        correct: 0,
        explanation: "Listen means to pay attention to sound.",
        detailedExplanation: "Listening to your favorite song can boost your mood and help you prepare for the day ahead."
      },
      {
        question: "Every Saturday, our family ____ the local market to buy fresh fruits and vegetables.",
        options: ["visit", "build", "ignore", "destroy"],
        correct: 0,
        explanation: "Visit means to go and see a place.",
        detailedExplanation: "Visiting the market is an enjoyable way to buy fresh produce and support local vendors."
      },
      {
        question: "When cooking dinner, I always ____ the vegetables into small pieces.",
        options: ["chop", "wash", "skip", "forget"],
        correct: 0,
        explanation: "Chop means to cut into pieces.",
        detailedExplanation: "Chopping vegetables makes them easier to cook and helps them blend well into your dish."
      },
      {
        question: "On cold days, I ____ a thick sweater to stay warm.",
        options: ["wear", "remove", "show", "skip"],
        correct: 0,
        explanation: "Wear means to have clothing on.",
        detailedExplanation: "Wearing a thick sweater helps protect you from the cold and keeps your body warm."
      },
      {
        question: "At the bus station, I quickly ____ the bus so I don’t miss my ride.",
        options: ["board", "leave", "sleep", "ride"],
        correct: 0,
        explanation: "Board means to get on a vehicle.",
        detailedExplanation: "Boarding the bus promptly ensures you arrive at your destination on time."
      },
      {
        question: "After a long day, I ____ on the sofa to relax and watch television.",
        options: ["sit", "stand", "run", "jump"],
        correct: 0,
        explanation: "Sit means to rest in a seated position.",
        detailedExplanation: "Sitting allows you to rest comfortably after a busy day so you can relax and enjoy some leisure time."
      },
      {
        question: "In the evening, I ____ a book to help me unwind before going to bed.",
        options: ["read", "write", "play", "eat"],
        correct: 0,
        explanation: "Read means to look at and understand text.",
        detailedExplanation: "Reading a book is a calming activity that can help transition you into a peaceful sleep."
      },
      {
        question: "When I’m hungry, I ____ a small snack to keep my energy up.",
        options: ["eat", "make", "build", "hear"],
        correct: 0,
        explanation: "Eat means to consume food.",
        detailedExplanation: "Eating a healthy snack when hungry provides you with quick energy and keeps you satisfied."
      },
      {
        question: "At the store, I ____ prices of different brands before deciding what to buy.",
        options: ["compare", "ignore", "destroy", "lose"],
        correct: 0,
        explanation: "Compare means to examine the differences or similarities.",
        detailedExplanation: "Comparing prices helps you choose the best value for your money, ensuring you make a smart purchase."
      },
      {
        question: "To relax after a long day, I usually ____ some soothing music on my speaker.",
        options: ["play", "stop", "create", "throw"],
        correct: 0,
        explanation: "Play means to start music on a device.",
        detailedExplanation: "Playing soothing music helps calm your mind and reduce stress after a busy day."
      },
      {
        question: "On my birthday, my friends ____ a surprise party to celebrate with me.",
        options: ["organize", "cancel", "postpone", "ignore"],
        correct: 0,
        explanation: "Organize means to arrange or set up an event.",
        detailedExplanation: "When friends organize a surprise party, they take care of all the arrangements so you can enjoy a memorable celebration."
      },
      {
        question: "Before leaving the office, I always ____ my computer to save my work.",
        options: ["shut", "open", "lose", "crash"],
        correct: 0,
        explanation: "Shut means to close something.",
        detailedExplanation: "Shutting your computer safely ensures that your work is saved and the device is properly turned off."
      },
      {
        question: "During a snowstorm, the roads often become very ____ and dangerous.",
        options: ["slippery", "fast", "bright", "clean"],
        correct: 0,
        explanation: "Slippery means having a smooth surface that is risky to walk on.",
        detailedExplanation: "Slippery roads can make driving hazardous, so extra caution is needed during a snowstorm."
      },
      {
        question: "After dinner, I ____ 'thank you' to show my appreciation for the meal.",
        options: ["say", "ignore", "push", "drop"],
        correct: 0,
        explanation: "Say means to speak words aloud.",
        detailedExplanation: "Saying 'thank you' demonstrates gratitude for the effort put into preparing a delicious meal."
      },
      {
        question: "In the summer, many tourists ____ to the beach to enjoy the sunshine and sea.",
        options: ["travel", "sleep", "run", "stay"],
        correct: 0,
        explanation: "Travel means to go from one place to another.",
        detailedExplanation: "Traveling to the beach is a common holiday activity that allows visitors to relax and enjoy nature."
      },
      {
        question: "After the workshop, the instructor ____ all the questions raised by the participants.",
        options: ["answered", "ignored", "lost", "fumbled"],
        correct: 0,
        explanation: "Answered means to reply to questions.",
        detailedExplanation: "Answering questions helps clarify any doubts and ensures that everyone understands the material covered."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 100;
    const penalty = 100 / questions.length;
    let timerValue = 10 * 60;
    let timerInterval;
    const incorrectAnswers = [];
    let username = "";
    let currentShuffledOptions = [];
    let currentCorrectIndex = -1;

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const startBtn = document.getElementById("start-btn");
    const nextBtn = document.getElementById("next-btn");
    const questionContainer = document.getElementById("question-container");
    const feedbackDiv = document.getElementById("feedback");
    const scoreDisplay = document.getElementById("score-display");
    const timerDisplay = document.getElementById("timer");
    const finalScoreDiv = document.getElementById("final-score");
    const errorReportDiv = document.getElementById("error-report");

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startQuiz() {
      username = document.getElementById("username").value.trim() || "Student";
      startScreen.style.display = "none";
      quizScreen.style.display = "block";
      timerInterval = setInterval(updateTimer, 1000);
      displayQuestion();
    }

    function updateTimer() {
      let minutes = Math.floor(timerValue / 60);
      let seconds = timerValue % 60;
      timerDisplay.innerText = `Time Left: ${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
      if (timerValue <= 0) {
        clearInterval(timerInterval);
        finishQuiz();
      } else {
        timerValue--;
      }
    }

    function displayQuestion() {
      feedbackDiv.innerText = "";
      nextBtn.style.display = "none";
      questionContainer.innerHTML = "";

      const currentQ = questions[currentQuestionIndex];
      let optionsArray = currentQ.options.map((text, idx) => ({ text, origIndex: idx }));
      currentShuffledOptions = shuffleArray(optionsArray);
      currentCorrectIndex = currentShuffledOptions.findIndex(option => option.origIndex === currentQ.correct);

      const questionEl = document.createElement("div");
      questionEl.className = "question";
      questionEl.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.question}`;
      questionContainer.appendChild(questionEl);

      currentShuffledOptions.forEach((optionObj, index) => {
        const optionEl = document.createElement("div");
        optionEl.className = "option";
        optionEl.innerText = optionObj.text;
        optionEl.addEventListener("click", () => selectOption(optionEl, index));
        questionContainer.appendChild(optionEl);
      });
    }

    function selectOption(selectedEl, selectedIndex) {
      const currentQ = questions[currentQuestionIndex];
      const optionEls = document.querySelectorAll(".option");
      optionEls.forEach(el => el.classList.add("disabled"));

      if (selectedIndex === currentCorrectIndex) {
        selectedEl.classList.add("correct");
        feedbackDiv.innerHTML = "<strong>Correct!</strong>";
      } else {
        selectedEl.classList.add("incorrect");
        feedbackDiv.innerHTML = "<strong>Incorrect.</strong> " + currentQ.explanation +
                                  "<br><br>" + currentQ.detailedExplanation;
        score -= penalty;
        incorrectAnswers.push({
          question: currentQ.question,
          chosen: currentShuffledOptions[selectedIndex].text,
          correct: currentQ.options[currentQ.correct],
          explanation: currentQ.explanation,
          detailedExplanation: currentQ.detailedExplanation
        });
        optionEls.forEach(el => {
          if (el.innerText === currentQ.options[currentQ.correct]) {
            el.classList.add("correct");
          }
        });
      }

      score = Math.max(score, 0);
      scoreDisplay.innerText = `Score: ${Math.round(score)}%`;
      nextBtn.style.display = "block";
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        displayQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScoreDiv.innerText = `${username}, your final score is ${Math.round(score)}%`;
      
      if (incorrectAnswers.length > 0) {
        let errorHtml = "<h4>Review your incorrect answers:</h4>";
        incorrectAnswers.forEach(item => {
          errorHtml += `<div class="error-item">
                          <strong>Question:</strong> ${item.question}<br>
                          <strong>Your answer:</strong> ${item.chosen}<br>
                          <strong>Correct answer:</strong> ${item.correct}<br>
                          <strong>Short note:</strong> ${item.explanation}<br>
                          <strong>More details:</strong> ${item.detailedExplanation}
                        </div>`;
        });
        errorReportDiv.innerHTML = errorHtml;
      } else {
        errorReportDiv.innerHTML = "<h4>Great job! You answered all questions correctly.</h4>";
      }
    }
  </script>
</body>
</html>
