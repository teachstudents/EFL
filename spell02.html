<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Spelling Test – Next Set (Set 4)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { margin-bottom: 10px; }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #45a049; }
    input[type="text"] {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
    .feedback {
      margin-top: 10px;
      font-weight: bold;
      min-height: 60px;
    }
    #overallTimer, #overallScore, #setIndicator, #timerDisplay {
      font-size: 18px;
      margin: 10px 0;
      color: #333;
    }
    img.reward {
      max-width: 300px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcomeContainer" class="container">
    <h2>Welcome to Joel Mitchell’s Listening & Spelling</h2>
    <label for="username">Your Name: </label>
    <input type="text" id="username" placeholder="Enter your name">
    <br>
    <button id="startBtn">Start Test</button>
  </div>
  
  <!-- Test Interface (hidden initially) -->
  <div id="testInterface" class="container" style="display:none;">
    <!-- Overall Timer, Overall Score, and Test Set Indicator -->
    <p id="overallTimer">Overall Time Remaining: 10:00</p>
    <p id="overallScore">Overall Score: 100%</p>
    <!-- Since this file is only for the next set, we display "Test Set: 1 of 1" -->
    <p id="setIndicator">Test Set: 1/1</p>
    
    <!-- Current Word Section -->
    <p id="progress">Word 1 of 30</p>
    <p id="clue">Clue: </p>
    <button id="playAudioBtn">Play Audio</button>
    <p id="timerDisplay">Time remaining: <span id="wordTimer">20</span> seconds</p>
    <input type="text" id="answerInput" placeholder="Type the word here">
    <br>
    <button id="checkBtn">Check Answer</button>
    <button id="nextBtn" style="display:none;">Next Word</button>
    <div id="feedback" class="feedback"></div>
  </div>
  
  <!-- Hidden audio element for playing both vocabulary and reward audio -->
  <audio id="audioPlayer"></audio>
  
  <script>
    /***** Data & Variables *****/
    // Test Set 4: Next 30 words from the attached vocabulary list
    const testSets = [
      [
        { word: "green",      clue: "A color between blue and yellow",               audioFile: "voc/green.mp3" },
        { word: "hairdresser", clue: "A person who cuts clients' hair",               audioFile: "voc/hairdresser.mp3" },
        { word: "hand",       clue: "The end part of your arm",                        audioFile: "voc/hand.mp3" },
        { word: "head",       clue: "What you think with",                             audioFile: "voc/head.mp3" },
        { word: "heart",      clue: "A vital organ; symbol of love",                   audioFile: "voc/heart.mp3" },
        { word: "helicopter", clue: "A rotary-wing aircraft",                          audioFile: "voc/helicopter.mp3" },
        { word: "horse",      clue: "A farm animal used for riding",                   audioFile: "voc/horse.mp3" },
        { word: "hospital",   clue: "A place for medical treatment",                   audioFile: "voc/hospital.mp3" },
        { word: "house",      clue: "A building in which people live",                 audioFile: "voc/house.mp3" },
        { word: "husband",    clue: "A married man",                                   audioFile: "voc/husband.mp3" },
        { word: "island",     clue: "A piece of land surrounded by water",             audioFile: "voc/island.mp3" },
        { word: "jacket",     clue: "A piece of clothing worn over other clothes",     audioFile: "voc/jacket.mp3" },
        { word: "january",    clue: "The first month of the year",                     audioFile: "voc/january.mp3" },
        { word: "juice",      clue: "A drink made from fruits",                        audioFile: "voc/juice.mp3" },
        { word: "july",       clue: "A hot summer month",                              audioFile: "voc/july.mp3" },
        { word: "june",       clue: "The month between May and July",                  audioFile: "voc/june.mp3" },
        { word: "kitchen",    clue: "A room where food is prepared",                   audioFile: "voc/kitchen.mp3" },
        { word: "knife",      clue: "A tool used for cutting",                         audioFile: "voc/knife.mp3" },
        { word: "lamb",       clue: "A young sheep",                                   audioFile: "voc/lamb.mp3" },
        { word: "leaf",       clue: "A typically green, flat part of a plant",         audioFile: "voc/leaf.mp3" },
        { word: "leg",        clue: "A limb used for walking",                         audioFile: "voc/leg.mp3" },
        { word: "lemon",      clue: "A sour, yellow citrus fruit",                     audioFile: "voc/lemon.mp3" },
        { word: "lemonade",   clue: "A sweet, refreshing citrus drink",               audioFile: "voc/lemonade.mp3" },
        { word: "lettuce",    clue: "A green leafy vegetable",                         audioFile: "voc/lettuce.mp3" },
        { word: "librarian",  clue: "A person who works in a library",                 audioFile: "voc/librarian.mp3" },
        { word: "library",    clue: "A place that houses many books",                  audioFile: "voc/library.mp3" },
        { word: "lion",       clue: "Known as the king of the jungle",               audioFile: "voc/lion.mp3" },
        { word: "lips",       clue: "Parts of your mouth used for speaking",           audioFile: "voc/lips.mp3" },
        { word: "lunch",      clue: "A midday meal",                                   audioFile: "voc/lunch.mp3" },
        { word: "march",      clue: "A month in early spring",                         audioFile: "voc/march.mp3" }
      ]
    ];
    
    // Use the only set in this file.
    const totalWords = testSets[0].length; // 30 words
    let mistakes = 0;
    let overallScore = 100; // start at 100%
    
    // Overall timer: 10 minutes = 600 seconds
    let overallTime = 600;
    let overallTimerInterval;
    
    // For this file, there is only one test set, so:
    let currentTestIndex = 0;
    let currentWordIndex = 0;
    
    /***** DOM Element References *****/
    const welcomeContainer = document.getElementById("welcomeContainer");
    const testInterface = document.getElementById("testInterface");
    const usernameInput = document.getElementById("username");
    const startBtn = document.getElementById("startBtn");
    
    const overallTimerEl = document.getElementById("overallTimer");
    const overallScoreEl = document.getElementById("overallScore");
    const setIndicatorEl = document.getElementById("setIndicator");
    
    const progressEl = document.getElementById("progress");
    const clueEl = document.getElementById("clue");
    const playAudioBtn = document.getElementById("playAudioBtn");
    const wordTimerEl = document.getElementById("wordTimer");
    const answerInputEl = document.getElementById("answerInput");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackEl = document.getElementById("feedback");
    const audioPlayer = document.getElementById("audioPlayer");
    
    /***** Overall Timer Function *****/
    function startOverallTimer() {
      overallTimerInterval = setInterval(() => {
        overallTime--;
        const minutes = Math.floor(overallTime / 60);
        const seconds = overallTime % 60;
        overallTimerEl.textContent = `Overall Time Remaining: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        if (overallTime <= 0) {
          clearInterval(overallTimerInterval);
          endTest("Overall time is up!");
        }
      }, 1000);
    }
    
    /***** Per-Word Functions *****/
    // Update the display for the current word.
    function updateWordDisplay() {
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      progressEl.textContent = `Word ${currentWordIndex + 1} of ${totalWords}`;
      clueEl.textContent = `Clue: ${currentItem.clue}`;
      wordTimerEl.textContent = "20";
      answerInputEl.value = "";
      feedbackEl.innerHTML = "";
      answerInputEl.disabled = false;
      checkBtn.disabled = false;
      playAudioBtn.disabled = false;
      nextBtn.style.display = "none";
    }
    
    // Start the per-word 20-second timer.
    let wordTimerInterval;
    function startWordTimer() {
      clearInterval(wordTimerInterval);
      let timeLeft = 20;
      wordTimerEl.textContent = timeLeft;
      wordTimerInterval = setInterval(() => {
        timeLeft--;
        wordTimerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(wordTimerInterval);
          checkAnswer(true); // auto-check if time expires
        }
      }, 1000);
    }
    
    // Play the audio for the current word.
    function playAudio() {
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      audioPlayer.src = currentItem.audioFile;
      audioPlayer.play().catch(error => console.error("Error playing audio:", error));
    }
    
    // Check the answer; if auto is true (timer expired) and answer is empty, count it as a mistake.
    function checkAnswer(auto = false) {
      clearInterval(wordTimerInterval);
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      const userAnswer = answerInputEl.value.trim().toLowerCase();
      const correctAnswer = currentItem.word.toLowerCase();
      
      if (auto && userAnswer === "") {
        feedbackEl.textContent = `Time's up! The correct answer was "${correctAnswer}".`;
        feedbackEl.style.color = "red";
        mistakes++;
      } else if (userAnswer === correctAnswer) {
        feedbackEl.innerHTML = `Correct!<br><img src="reward1.gif" alt="Reward" class="reward">`;
        feedbackEl.style.color = "green";
        // Play reward sound
        new Audio("game1.mp3").play().catch(err => console.error("Error playing reward audio:", err));
      } else {
        feedbackEl.textContent = `Incorrect! The correct answer was "${correctAnswer}".`;
        feedbackEl.style.color = "red";
        mistakes++;
      }
      
      // Recalculate overall score (each mistake deducts 100/totalWords percent)
      overallScore = Math.max(100 - (mistakes * (100 / totalWords)), 0).toFixed(2);
      overallScoreEl.textContent = `Overall Score: ${overallScore}%`;
      
      answerInputEl.disabled = true;
      checkBtn.disabled = true;
      playAudioBtn.disabled = true;
      nextBtn.style.display = "inline-block";
    }
    
    // Move to the next word; end test if finished.
    function nextWord() {
      currentWordIndex++;
      if (currentWordIndex < totalWords) {
        updateWordDisplay();
        startWordTimer();
      } else {
        endTest("You have completed this test set!");
      }
    }
    
    // End the test and show final message.
    function endTest(message) {
      clearInterval(wordTimerInterval);
      clearInterval(overallTimerInterval);
      const userName = usernameInput.value.trim() || "Participant";
      document.querySelector(".container").innerHTML = `
        <h2>Test Completed!</h2>
        <p>${message}</p>
        <p>${userName}, your final score is ${overallScore}%.</p>
        <button onclick="location.reload()">Restart Test</button>
      `;
    }
    
    /***** Event Listeners *****/
    startBtn.addEventListener("click", () => {
      if (usernameInput.value.trim() === "") {
        alert("Please enter your name to start the test.");
      } else {
        welcomeContainer.style.display = "none";
        testInterface.style.display = "block";
        updateWordDisplay();
        startWordTimer();
        startOverallTimer();
      }
    });
    
    playAudioBtn.addEventListener("click", playAudio);
    checkBtn.addEventListener("click", () => { checkAnswer(false); });
    nextBtn.addEventListener("click", nextWord);
    answerInputEl.addEventListener("keyup", (event) => {
      if (event.key === "Enter" && !checkBtn.disabled) {
        checkAnswer(false);
      }
    });
    
  </script>
  
</body>
</html>
