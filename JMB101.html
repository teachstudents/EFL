<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Practice (B1 Level)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      min-height: 100vh;
    }
    .quiz-container {
      max-width: 750px;
      margin: 24px auto;
      background-color: #fff;
      padding: 5vw 4vw;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 95vw;
    }
    h2, h3 {
      text-align: center;
    }
    #start-screen, #quiz-screen, #result-screen {
      margin-bottom: 20px;
    }
    #quiz-screen, #result-screen {
      display: none;
    }
    #timer {
      font-size: 1.1em;
      text-align: right;
      margin-bottom: 10px;
    }
    #score-display {
      font-size: 1.1em;
      margin-bottom: 18px;
      text-align: right;
    }
    #progress-bar {
      width: 100%;
      background-color: #eee;
      border-radius: 5px;
      margin-bottom: 18px;
      height: 16px;
      overflow: hidden;
    }
    #progress-inner {
      background-color: #3b82f6;
      height: 100%;
      width: 0;
      transition: width 0.3s;
    }
    .question {
      font-weight: bold;
      margin-bottom: 15px;
    }
    .option {
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      font-size: 1em;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      outline: none;
      box-sizing: border-box;
      position: relative;
    }
    .option:focus {
      border-color: #3b82f6;
      background-color: #e0f0ff;
    }
    .option.correct {
      background-color: #d4edda;
      border-color: #4caf50;
      color: #155724;
    }
    .option.incorrect {
      background-color: #f8d7da;
      border-color: #e74c3c;
      color: #721c24;
    }
    .disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    #feedback {
      margin-top: 10px;
      font-style: italic;
      min-height: 36px;
    }
    #next-btn, #restart-btn {
      margin-top: 20px;
      width: 100%;
      padding: 13px 0;
      font-size: 1.05em;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #next-btn:disabled,
    #restart-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }
    #next-btn:active,
    #restart-btn:active {
      background: #2563eb;
    }
    .error-item {
      margin-bottom: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
      font-size: 0.97em;
    }
    input[type="text"] {
      font-size: 1em;
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      margin-bottom: 18px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #bbb;
    }
    label {
      font-weight: 500;
    }
    @media (max-width: 600px) {
      .quiz-container {
        padding: 3vw 2vw;
      }
      h2, h3 {
        font-size: 1.1em;
      }
      .option {
        font-size: 0.98em;
        padding: 16px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-container" role="main" aria-label="Vocabulary Quiz">
    <h2>Vocabulary Practice (B1 Level)</h2>

    <!-- Start Screen -->
    <section id="start-screen">
      <label for="username">Enter your name:</label>
      <input type="text" id="username" required autocomplete="name" aria-label="Enter your name">
      <button id="start-btn" type="button">Start Quiz</button>
    </section>

    <!-- Quiz Screen -->
    <section id="quiz-screen">
      <div id="timer" aria-live="polite">Time Left: 10:00</div>
      <div id="score-display">Score: 100%</div>
      <div id="progress-bar" aria-label="Progress">
        <div id="progress-inner"></div>
      </div>
      <div id="question-number" style="margin-bottom:8px;"></div>
      <div id="question-container"></div>
      <div id="feedback" aria-live="polite"></div>
      <button id="next-btn" type="button" style="display:none;">Next Question</button>
    </section>

    <!-- Result Screen -->
    <section id="result-screen">
      <h3>Quiz Report</h3>
      <div id="final-score"></div>
      <div id="error-report"></div>
      <button id="restart-btn" type="button">Restart Quiz</button>
    </section>
  </main>

  <script>
    // Quiz questions (same as before)
    const questions = [/* (Insert all question objects here as in your original code) */];

    // For brevity, I'll fetch the questions from your previous snippet
    // --- begin questions array copy ---
    // (Paste your question array here from your current file.)
    // --- end questions array copy ---

    let currentQuestionIndex = 0;
    let score = 100;
    const penalty = 100 / questions.length;
    let timerValue = 10 * 60;
    let timerInterval;
    const incorrectAnswers = [];
    let username = "";
    let currentShuffledOptions = [];
    let currentCorrectIndex = -1;

    // DOM elements
    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const startBtn = document.getElementById("start-btn");
    const nextBtn = document.getElementById("next-btn");
    const questionContainer = document.getElementById("question-container");
    const feedbackDiv = document.getElementById("feedback");
    const scoreDisplay = document.getElementById("score-display");
    const timerDisplay = document.getElementById("timer");
    const finalScoreDiv = document.getElementById("final-score");
    const errorReportDiv = document.getElementById("error-report");
    const usernameInput = document.getElementById("username");
    const progressBar = document.getElementById("progress-bar");
    const progressInner = document.getElementById("progress-inner");
    const questionNumberDiv = document.getElementById("question-number");
    const restartBtn = document.getElementById("restart-btn");

    // Event Listeners
    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartQuiz);
    usernameInput.addEventListener("keyup", function(e) {
      if (e.key === "Enter") startQuiz();
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startQuiz() {
      username = usernameInput.value.trim() || "Student";
      // Shuffle question order and reset
      currentQuestionIndex = 0;
      score = 100;
      timerValue = 10 * 60;
      incorrectAnswers.length = 0;
      questions.sort(() => Math.random() - 0.5);
      startScreen.style.display = "none";
      resultScreen.style.display = "none";
      quizScreen.style.display = "block";
      updateProgress();
      timerDisplay.innerText = "Time Left: 10:00";
      scoreDisplay.innerText = "Score: 100%";
      nextBtn.disabled = false;
      timerInterval = setInterval(updateTimer, 1000);
      displayQuestion();
    }

    function updateTimer() {
      let minutes = Math.floor(timerValue / 60);
      let seconds = timerValue % 60;
      timerDisplay.innerText = `Time Left: ${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
      if (timerValue <= 0) {
        clearInterval(timerInterval);
        finishQuiz();
      } else {
        timerValue--;
      }
    }

    function updateProgress() {
      const percent = ((currentQuestionIndex) / questions.length) * 100;
      progressInner.style.width = percent + "%";
      questionNumberDiv.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
    }

    function displayQuestion() {
      feedbackDiv.innerText = "";
      nextBtn.style.display = "none";
      nextBtn.disabled = false;
      questionContainer.innerHTML = "";
      updateProgress();

      const currentQ = questions[currentQuestionIndex];
      let optionsArray = currentQ.options.map((text, idx) => ({ text, origIndex: idx }));
      currentShuffledOptions = shuffleArray(optionsArray.slice());
      currentCorrectIndex = currentShuffledOptions.findIndex(option => option.origIndex === currentQ.correct);

      const questionEl = document.createElement("div");
      questionEl.className = "question";
      questionEl.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.question}`;
      questionContainer.appendChild(questionEl);

      currentShuffledOptions.forEach((optionObj, index) => {
        const optionEl = document.createElement("button");
        optionEl.className = "option";
        optionEl.type = "button";
        optionEl.innerText = optionObj.text;
        optionEl.setAttribute("tabindex", "0");
        optionEl.setAttribute("aria-label", optionObj.text);
        optionEl.addEventListener("click", () => selectOption(optionEl, index));
        optionEl.addEventListener("keyup", function(e) {
          if (e.key === "Enter" || e.key === " ") selectOption(optionEl, index);
        });
        questionContainer.appendChild(optionEl);
      });
    }

    function selectOption(selectedEl, selectedIndex) {
      const currentQ = questions[currentQuestionIndex];
      const optionEls = questionContainer.querySelectorAll(".option");
      optionEls.forEach(el => el.classList.add("disabled"));

      if (selectedIndex === currentCorrectIndex) {
        selectedEl.classList.add("correct");
        feedbackDiv.innerHTML = "<strong>Correct!</strong>";
      } else {
        selectedEl.classList.add("incorrect");
        feedbackDiv.innerHTML = `<strong>Incorrect.</strong> ${currentQ.explanation}<br><br>${currentQ.detailedExplanation}`;
        score -= penalty;
        incorrectAnswers.push({
          question: currentQ.question,
          chosen: currentShuffledOptions[selectedIndex].text,
          correct: currentQ.options[currentQ.correct],
          explanation: currentQ.explanation,
          detailedExplanation: currentQ.detailedExplanation
        });
        // Highlight the correct option
        optionEls.forEach((el, idx) => {
          if (currentShuffledOptions[idx].origIndex === currentQ.correct) {
            el.classList.add("correct");
          }
        });
      }

      score = Math.max(score, 0);
      scoreDisplay.innerText = `Score: ${Math.round(score)}%`;
      nextBtn.style.display = "block";
      nextBtn.focus();
      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        displayQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScoreDiv.innerText = `${username}, your final score is ${Math.round(score)}%`;
      progressInner.style.width = "100%";
      questionNumberDiv.innerText = "";

      if (incorrectAnswers.length > 0) {
        let errorHtml = "<h4>Review your incorrect answers:</h4>";
        incorrectAnswers.forEach(item => {
          errorHtml += `<div class="error-item">
            <strong>Question:</strong> ${item.question}<br>
            <strong>Your answer:</strong> ${item.chosen}<br>
            <strong>Correct answer:</strong> ${item.correct}<br>
            <strong>Short note:</strong> ${item.explanation}<br>
            <strong>More details:</strong> ${item.detailedExplanation}
            </div>`;
        });
        errorReportDiv.innerHTML = errorHtml;
      } else {
        errorReportDiv.innerHTML = "<h4>Great job! You answered all questions correctly.</h4>";
      }
    }

    function restartQuiz() {
      usernameInput.value = "";
      startScreen.style.display = "block";
      resultScreen.style.display = "none";
      quizScreen.style.display = "none";
      usernameInput.focus();
      progressInner.style.width = "0%";
    }

    // Accessibility: focus username input on load
    window.onload = function() { usernameInput.focus(); };
  </script>
</body>
</html>
