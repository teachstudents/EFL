<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live News & Audio Streams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        /* Audio player styling */
        audio {
            width: 100%;
            border-radius: 8px;
            filter: sepia(20%) saturate(70%) grayscale(1) contrast(99%) hue-rotate(-12deg);
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">

        <header class="mb-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-2">Live News Feed</h1>
            <p class="text-lg text-gray-600">Your daily source for news and live audio broadcasts</p>
        </header>

        <section id="audio-streams" class="mb-10">
            <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-500 pb-2 mb-6">Live Audio Streams</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <h3 class="font-semibold text-lg mb-3">BBC World Service</h3>
                    <audio controls preload="none">
                        <source src="https://stream.live.vc.bbcmedia.co.uk/bbc_world_service" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <h3 class="font-semibold text-lg mb-3">NPR News</h3>
                     <audio controls preload="none">
                        <source src="https://npr-ice.streamguys1.com/live.mp3" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
            </div>
        </section>

        <section id="news-articles">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b-2 border-blue-500 pb-2 mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 sm:mb-0">Top Stories</h2>
                <div class="relative">
                    <select id="news-source-selector" class="appearance-none w-full sm:w-auto bg-white border border-gray-300 rounded-md py-2 pl-3 pr-10 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="cna">Channel News Asia (Singapore)</option>
                        <option value="aljazeera">Al Jazeera</option>
                    </select>
                    <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </span>
                </div>
            </div>
            <div id="loading" class="text-center py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-600">Fetching latest news...</p>
            </div>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
             <div id="error-message" class="hidden text-center bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mt-6">
                <strong class="font-bold">Error:</strong>
                <span class="block sm:inline" id="error-text"></span>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const newsContainer = document.getElementById('news-container');
            const loadingIndicator = document.getElementById('loading');
            const sourceSelector = document.getElementById('news-source-selector');
            const errorMessageDiv = document.getElementById('error-message');
            const errorTextSpan = document.getElementById('error-text');

            // Using public RSS feeds from sources generally accessible in China.
            const newsSources = {
                cna: 'https://www.channelnewsasia.com/rssfeeds/8395986',
                aljazeera: 'https://www.aljazeera.com/xml/rss/all.xml',
            };
            
            // This service converts RSS feeds to a usable JSON format.
            const RSS2JSON_API_ENDPOINT = 'https://api.rss2json.com/v1/api.json?rss_url=';

            /**
             * Fetches and displays news from the selected source.
             */
            async function fetchNews(sourceKey) {
                loadingIndicator.style.display = 'block';
                newsContainer.innerHTML = '';
                errorMessageDiv.classList.add('hidden');

                const feedUrl = newsSources[sourceKey];

                try {
                    const response = await fetch(`${RSS2JSON_API_ENDPOINT}${encodeURIComponent(feedUrl)}`);
                    if (!response.ok) {
                        throw new Error(`Network response was not ok, status: ${response.status}`);
                    }
                    const data = await response.json();
                    
                    if (data.status !== 'ok') {
                        throw new Error('Could not retrieve news feed. The source might be temporarily unavailable.');
                    }
                    
                    displayArticles(data.items, data.feed.title);

                } catch (error) {
                    console.error('Error fetching news:', error);
                    displayError(`Could not fetch news. Please try again later. Details: ${error.message}`);
                } finally {
                    loadingIndicator.style.display = 'none';
                }
            }

            /**
             * Displays an error message in the UI.
             */
            function displayError(message) {
                errorTextSpan.textContent = message;
                errorMessageDiv.classList.remove('hidden');
            }


            /**
             * Creates and appends article cards to the container.
             * @param {Array} articles - An array of article objects from the API.
             * @param {string} feedTitle - The title of the news source.
             */
            function displayArticles(articles, feedTitle) {
                if (!articles || articles.length === 0) {
                    displayError("No articles were found for this source.");
                    return;
                }

                articles.forEach(article => {
                    const articleEl = document.createElement('div');
                    articleEl.className = 'card';
                    
                    const title = article.title || 'No Title';
                    const link = article.link || '#';
                    const pubDateStr = article.pubDate;
                    const pubDate = pubDateStr ? new Date(pubDateStr).toLocaleDateString() : 'N/A';
                    
                    // The description often contains HTML, so we strip it for a clean summary
                    const description = (article.description || 'No summary available.')
                                        .replace(/<[^>]*>?/gm, '')
                                        .substring(0, 150);


                    articleEl.innerHTML = `
                        <a href="${link}" target="_blank" rel="noopener noreferrer" class="flex flex-col h-full">
                            <h3 class="font-bold text-lg mb-2">${title}</h3>
                            <p class="text-gray-600 text-sm mb-4 flex-grow">${description}...</p>
                            <div class="text-xs text-gray-500 mt-auto">
                                <p><strong>${feedTitle}</strong></p>
                                <p>Published: ${pubDate}</p>
                            </div>
                        </a>
                    `;
                    newsContainer.appendChild(articleEl);
                });
            }

            // Event listener for the source dropdown
            sourceSelector.addEventListener('change', (event) => {
                fetchNews(event.target.value);
            });

            // Initial fetch on page load with the default source
            fetchNews(sourceSelector.value);
        });
    </script>

</body>
</html>
