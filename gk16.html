    <style>
        body { font-family: Arial, sans-serif; }

        .question { margin-bottom: 20px; }
        .feedback { color: red; }
        .timer { font-size: 20px; margin-bottom: 20px; }
        .score { font-size: 20px; margin-bottom: 20px; }
    </style>
    <script>
        let score = 100;
        let timer;
        let timeLeft = 600; // 10 minutes in seconds

        function startTimer() {
            timer = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').innerText = 'Time left: ' + Math.floor(timeLeft / 60) + ':' + (timeLeft % 60);
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer').innerText = 'Time is up!';
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('quizForm').submit();
                }
            }, 1000);
        }

        function checkAnswer(questionId, correctAnswer) {
            const userAnswer = document.getElementById('answer' + questionId).value.trim();
            const feedbackElement = document.getElementById('feedback' + questionId);
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                feedbackElement.innerText = 'Correct!';
                feedbackElement.style.color = 'green';
            } else {
                feedbackElement.innerText = 'Incorrect! The correct answer is ' + correctAnswer;
                feedbackElement.style.color = 'red';
                score -= 2; // Deduct 2 points for incorrect answer
            }
            document.getElementById('score').innerText = 'Score: ' + score;
            document.getElementById('answer' + questionId).disabled = true;
        }

        function submitQuiz() {
            clearInterval(timer);
            alert('Quiz submitted! Your final score is ' + score);
        }
    </script>
</head>
