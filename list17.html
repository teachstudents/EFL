<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List 17</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: #ff6347;
      margin-bottom: 0.2em;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 2vw 0 2vw;
      position: relative;
      max-width: 650px;
      margin: auto;
    }
    .timers {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      font-size: 18px;
    }
    .score {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .question {
      padding: 22px 10px;
      margin: 24px auto 18px auto;
      background: #fff;
      border: 2px solid #ff6347;
      border-radius: 10px;
      max-width: 500px;
      min-height: 90px;
    }
    .mcq {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
      gap: 8px;
    }
    .mcq button {
      padding: 15px 24px;
      font-size: 20px;
      cursor: pointer;
      background-color: #ff6347;
      color: white;
      border: none;
      border-radius: 10px;
      min-width: 120px;
      max-width: 90vw;
      word-break: break-word;
      transition: background-color 0.3s;
    }
    .mcq button:hover, .mcq button:focus {
      background-color: #ff4500;
    }
    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 10px;
      overflow: hidden;
      max-width: 500px;
      margin: 18px auto;
      height: 18px;
    }
    .progress {
      height: 100%;
      background-color: #4caf50;
      width: 100%;
      transition: width 1s;
    }
    .alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f0ad4e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      z-index: 1000;
      animation: fadeIn 0.5s;
      font-size: 1.2em;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .reward-top-left {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1100;
      width: 56px;
      height: 56px;
      animation: fadeIn 0.5s, fadeOut 0.5s 1.3s;
      pointer-events: none;
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .bottom-reward {
      width: 75px;
      max-width: 24vw;
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 10;
    }
    input[type="text"] {
      padding: 10px;
      font-size: 18px;
      border-radius: 5px;
      margin-bottom: 20px;
      border: 1.5px solid #ff6347;
      width: 220px;
      max-width: 80vw;
    }
    button#start-button {
      margin-bottom: 8px;
      font-size: 19px;
      border-radius: 5px;
      background: #ff6347;
      color: #fff;
      padding: 12px 30px;
      border: none;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      .question, .progress-bar { max-width: 99vw; }
      .mcq button { font-size: 16px; padding: 10px 8px; min-width: 95px; }
      .score { font-size: 18px; }
    }
  </style>
</head>
<body>
  <h1>List 17</h1>
  <div class="top-bar">
    <div class="timers">
      <span id="global-timer">Global: 5:00</span>
      <span id="block-timer"></span>
    </div>
    <span id="score-container" class="score"></span>
  </div>
  <div class="progress-bar">
    <div id="progress" class="progress"></div>
  </div>
  <input type="text" id="name-input" placeholder="Enter your name">
  <button id="start-button">Start Quiz</button>
  <div id="question-container" class="question"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <img id="reward-bottom" class="bottom-reward" style="display:none" src="" alt="reward">
  <img id="reward-top" class="reward-top-left" style="display:none" src="reward1.gif" alt="correct!">
  <script>
    // ------------------- Data -------------------
    const questions = [
      { english: "somehow", translations: ["不知怎么地", "建议", "变成"] },
      { english: "suggestion", translations: ["建议", "不知怎么地", "危险"] },
      { english: "become", translations: ["变成", "幻想", "代替"] },
      { english: "entire", translations: ["全部的", "虚荣的", "细绳"] },
      { english: "superior", translations: ["更好的 / 优越的", "羞愧的", "危险"] },
      { english: "superb", translations: ["极好的", "变成", "剑"] },
      { english: "authority", translations: ["权威", "幻想", "抓住"] },
      { english: "awesome", translations: ["令人敬畏的 / 极好的", "拖拉", "细绳"] },
      { english: "vain", translations: ["虚荣的 / 徒劳的", "成熟的（水果）", "建议"] },
      { english: "instead", translations: ["代替", "虚荣的", "抓住"] },
      { english: "surround", translations: ["包围", "变成", "之后"] },
      { english: "string", translations: ["细绳 / 一串", "剑", "幻想"] },
      { english: "dust", translations: ["灰尘", "剑", "幻想"] },
      { english: "afterward(s)", translations: ["之后", "建议", "权威"] },
      { english: "sword", translations: ["剑", "抓住", "危险"] },
      { english: "ashamed", translations: ["羞愧的", "变成", "幻想"] },
      { english: "beg", translations: ["乞求", "全部的", "剑"] },
      { english: "danger", translations: ["危险", "幻想", "乞求"] },
      { english: "fantasy", translations: ["幻想", "灰尘", "乞求"] },
      { english: "childhood", translations: ["童年", "剑", "虚荣的"] }
    ];

    // ------------------- State -------------------
    let score = 100;
    let name = "";
    let globalTimer = 300, part1Timer = 120, part2Timer = 180;
    let globalInterval = null, part1Interval = null, part2Interval = null;
    let allDefs = [];
    let part1Queue = [], part1Done = [], part1Current = null;
    let part2Index = 0;
    let mode = 1; // 1 = Part 1, 2 = Part 2, 0 = idle/end
    let showAlertTimeout = null;

    // ------------------- Utilities -------------------
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }
    function showAlert(message) {
      if (showAlertTimeout) clearTimeout(showAlertTimeout);
      const alertBox = document.createElement("div");
      alertBox.innerText = message;
      alertBox.className = "alert";
      document.body.appendChild(alertBox);
      showAlertTimeout = setTimeout(() => {
        if (alertBox.parentNode) alertBox.parentNode.removeChild(alertBox);
      }, 2000);
    }
    function updateScore() {
      document.getElementById("score-container").innerHTML = `Score: ${score}%`;
    }
    function updateTimers() {
      document.getElementById("global-timer").textContent = "Global: " + fmt(globalTimer);
      document.getElementById("block-timer").textContent = (
        mode === 1 ? "Part 1: " + fmt(part1Timer) :
        mode === 2 ? "Part 2: " + fmt(part2Timer) : ""
      );
      document.getElementById("progress").style.width = `${(globalTimer/300)*100}%`;
    }
    function playSound(isCorrect) {
      if (isCorrect) document.getElementById("correct-sound").play();
      else document.getElementById("incorrect-sound").play();
    }
    function fmt(sec) {
      return Math.floor(sec/60) + ":" + (sec%60).toString().padStart(2, "0");
    }
    function showRewardTop() {
      let img = document.getElementById("reward-top");
      img.style.display = "block";
      img.src = "reward1.gif";
      img.style.opacity = "1";
      setTimeout(() => { img.style.display = "none"; }, 1800);
    }
    // ------------------- Game Start -------------------
    document.getElementById("start-button").onclick = startGame;
    function startGame() {
      name = document.getElementById("name-input").value.trim();
      if (!name) return showAlert("Please enter your name!");
      document.getElementById("name-input").style.display = "none";
      document.getElementById("start-button").style.display = "none";
      document.getElementById("timer-container").style.display = "";
      document.getElementById("score-container").style.display = "";
      document.querySelector(".progress-bar").style.display = "";
      score = 100;
      globalTimer = 300; part1Timer = 120; part2Timer = 180;
      allDefs = [];
      questions.forEach(q => q.translations.forEach(def => { if (!allDefs.includes(def)) allDefs.push(def); }));
      updateScore(); updateTimers();
      document.getElementById("reward-bottom").src = "reward2.gif";
      document.getElementById("reward-bottom").style.display = "block";
      startGlobalTimer();
      startPart1();
    }

    // ------------------- Timers -------------------
    function startGlobalTimer() {
      if (globalInterval) clearInterval(globalInterval);
      globalInterval = setInterval(() => {
        globalTimer--;
        updateTimers();
        if (globalTimer <= 0) {
          globalTimer = 0;
          stopBlockTimers();
          endGame("Time's up!");
        }
      }, 1000);
    }
    function startPart1Timer() {
      if (part1Interval) clearInterval(part1Interval);
      part1Interval = setInterval(() => {
        part1Timer--;
        updateTimers();
        if (part1Timer <= 0) {
          part1Timer = 0;
          clearInterval(part1Interval);
          setTimeout(() => { startPart2(); }, 400);
        }
      }, 1000);
    }
    function startPart2Timer() {
      if (part2Interval) clearInterval(part2Interval);
      part2Interval = setInterval(() => {
        part2Timer--;
        updateTimers();
        if (part2Timer <= 0) {
          part2Timer = 0;
          clearInterval(part2Interval);
          endGame("Time's up!");
        }
      }, 1000);
    }
    function stopBlockTimers() {
      if (part1Interval) clearInterval(part1Interval);
      if (part2Interval) clearInterval(part2Interval);
    }
    // ------------------- Part 1 -------------------
    function startPart1() {
      mode = 1;
      part1Queue = [...questions.keys()];
      shuffleArray(part1Queue);
      part1Done = [];
      document.getElementById("reward-bottom").src = "reward2.gif";
      document.getElementById("reward-bottom").style.display = "block";
      startPart1Timer();
      nextPart1Question();
    }
    function nextPart1Question() {
      if (globalTimer <= 0 || part1Timer <= 0) return;
      if (part1Queue.length === 0) {
        setTimeout(() => { startPart2(); }, 400);
        return;
      }
      let idx = part1Queue.shift();
      part1Current = idx;
      let q = questions[idx];
      let options = [...q.translations];
      shuffleArray(options);
      document.getElementById("question-container").innerHTML = `
        <h2>${q.english}</h2>
        <div class="mcq">
          ${options.map((t,i)=> `<button onclick="checkPart1(${i})">${t}</button>`).join("")}
        </div>
        <div style="margin-top:14px;height:30px;"></div>
        <div>Progress: ${part1Done.length+1} / ${questions.length}</div>
      `;
      window.checkPart1 = function(i) {
        let userAns = options[i];
        let correct = q.translations[0];
        if (userAns === correct) {
          playSound(true); showRewardTop();
          part1Done.push(idx);
        } else {
          playSound(false); showAlert("❌ Incorrect!");
          score = Math.max(score - 5, 0);
          updateScore();
          // Re-insert this question 2-4 spots later
          let pos = Math.min(part1Queue.length, Math.floor(Math.random()*3)+2);
          part1Queue.splice(pos, 0, idx);
        }
        updateScore();
        setTimeout(nextPart1Question, 600);
      };
      updateScore();
      updateTimers();
    }

    // ------------------- Part 2 -------------------
    function startPart2() {
      mode = 2;
      stopBlockTimers();
      document.getElementById("reward-bottom").src = "reward3.gif";
      document.getElementById("reward-bottom").style.display = "block";
      part2Index = 0;
      part2Timer = 180;
      updateTimers();
      startPart2Timer();
      showPart2Question();
    }
    function showPart2Question() {
      if (globalTimer <= 0 || part2Timer <= 0) return;
      if (part2Index >= questions.length) {
        endGame("Test complete!");
        return;
      }
      let q = questions[part2Index];
      let correctDef = q.translations[0];
      let incorrect = allDefs.filter(def => def !== correctDef);
      shuffleArray(incorrect);
      let choices = [correctDef, ...incorrect.slice(0,4)];
      shuffleArray(choices);
      document.getElementById("question-container").innerHTML = `
        <h2>Choose the correct definition for: <span style="color:#ff6347">${q.english}</span></h2>
        <div class="mcq">
          ${choices.map((choice, idx) =>
            `<button class="def-choice" data-index="${idx}">${choice}</button>`
          ).join('')}
        </div>
        <div id="spelling-feedback" style="margin-top:14px;height:30px;"></div>
        <div>Progress: ${part2Index+1} / ${questions.length}</div>
      `;
      document.querySelectorAll(".def-choice").forEach(btn => {
        btn.onclick = function() {
          if (globalTimer <= 0 || part2Timer <= 0) return;
          let selected = btn.textContent;
          let feedback = document.getElementById("spelling-feedback");
          if (selected === correctDef) {
            playSound(true); showRewardTop();
            feedback.innerHTML = '<span style="color:green">✅ Correct!</span>';
          } else {
            playSound(false);
            feedback.innerHTML = `<span style="color:red">❌ Incorrect! Answer: <b>${correctDef}</b></span>`;
            score = Math.max(score - 5, 0);
            updateScore();
          }
          part2Index++;
          setTimeout(showPart2Question, 950);
        };
      });
      updateScore();
      updateTimers();
    }

    // ------------------- End Game -------------------
    function endGame(msg) {
      stopBlockTimers();
      if (globalInterval) clearInterval(globalInterval);
      document.getElementById("question-container").innerHTML = `
        <h2>${msg}</h2>
        <p>Name: ${name}</p>
        <p>Final Score: ${score}%</p>
        <p>Time Used: ${300-globalTimer} seconds</p>
        <button onclick="location.reload()">Restart</button>
      `;
      document.getElementById("reward-bottom").style.display = "none";
    }

    // ------------------- UI setup -------------------
    document.getElementById("timer-container")?.style.display = "";
    document.getElementById("score-container").style.display = "";
    document.querySelector(".progress-bar").style.display = "";
    updateScore(); updateTimers();
  </script>
</body>
</html>
