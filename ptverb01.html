<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot's Forest Adventure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <h1>Parrot's Forest Adventure</h1>

    <p id="instructions">Welcome to Parrot's Forest Adventure! Your goal is to find food (acorns) scattered throughout the forest.</p>

    <button id="start-game">Start Game</button>

    <script src="https://cdn.jsdelivr.net/npm/parrot-tts@1.2.0/dist/parrot-tts.min.js"></script>
    <script>
        const parrot = new ParrotTTS();

        document.getElementById("start-game").addEventListener("click", () => {
          startGame();
        });

        function startGame() {
          let forest = [
            { location: "tree1", sound: "Bird chirp" },
            { location: "river", sound: "Water splashing" },
            { location: "acorn1", sound: "Acorn cracking" },
            { location: "tree2", sound: "Branch swaying" },
            { location: "acorn2", sound: "More acorns!" }
          ];

          let playerLocation = forest[0].location;
          let currentSound = parrot.speak(`You are at the ${playerLocation}!`);

          document.getElementById("instructions").innerHTML += `
            <p id="current-location">Current Location: ${playerLocation}</p>
            <button id="move-left" onclick="moveLeft()">Move Left</button>
            <button id="move-right" onclick="moveRight()">Move Right</button>
            <button id="move-up" onclick="moveUp()">Move Up</button>
          `;

          document.getElementById("current-location").innerHTML = `${currentSound} You are at the ${playerLocation}!`;
        }

        function moveLeft() {
          let newLocation = forest[0].location;
          parrot.speak(`You fly to the ${newLocation}, but it's empty!`);

          playerLocation = newLocation;

          currentSound = parrot.speak(`You are at the ${playerLocation}!`);
          document.getElementById("current-location").innerHTML = `${currentSound}`;

          if (forest.find(item => item.location === "acorn1")) {
            console.log("Found acorn!");
          }
        }

        function moveRight() {
          let newLocation = forest[2].location;
          parrot.speak(`You fly to the ${newLocation}, and find an acorn!`);

          playerLocation = newLocation;

          currentSound = parrot.speak(`You are at the ${playerLocation}!`);
          document.getElementById("current-location").innerHTML = `${currentSound}`;

          if (forest.find(item => item.location === "acorn2")) {
            console.log("Found more acorns!");
          }
        }

        function moveUp() {
          let newLocation = forest[3].location;
          parrot.speak(`You fly to the ${newLocation}, and find a tree!`);

          playerLocation = newLocation;

          currentSound = parrot.speak(`You are at the ${playerLocation}!`);
          document.getElementById("current-location").innerHTML = `${currentSound}`;

          if (forest.find(item => item.location === "acorn1")) {
            console.log("Found acorn!");
          }
        }
    </script>
</body>
</html>
