<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Verb Story</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .story-container {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            display: flex;
            justify-content: center;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            margin: 0 10px;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>

    <h1>Story Time!</h1>
    <form id="user-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <button class="button" onclick="startGame()">Start Game</button>
    </form>

    <div id="story-container"></div>

    <script>
        let story = [
            'Leo and Elsa were walking in the park.',
            'They saw a group of children playing soccer.',
            'The children were laughing and having fun.',
            'But then they heard a loud noise behind them.',
            'They turned around to see a big dog running towards them.'
        ];

        let verbOptions = [
            { text: 'went', value: 'went' },
            { text: 'ran', value: 'ran' },
            { text: 'jumped', value: 'jumped' }
        ];

        let currentSentenceIndex = 0;
        let userAnswer;

        function startGame() {
            const userName = document.getElementById('name').value;
            if (userName) {
                displayStoryContainer();
                updateVerbOptions();
            } else {
                alert('Please enter your name first!');
            }
        }

        function generateNextSentence() {
            if (userAnswer && userAnswer.value === verbOptions.find(option 
=> option.text === story[currentSentenceIndex].split(' ').pop()).value) {
                currentSentenceIndex++;
                displayStoryContainer();
            } else if (currentSentenceIndex < 50) {
                displayStoryContainer();
                updateVerbOptions();
            }
        }

        function displayStoryContainer() {
            const storyElement = 
document.getElementById('story-container');
            while (storyElement.firstChild) {
                storyElement.removeChild(storyElement.firstChild);
            }
            for (let i = 0; i < currentSentenceIndex; i++) {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.classList.add('story');
                if (!i && currentSentenceIndex === 0) {
                    sentenceDiv.innerHTML = 
`<p><strong>${userName}</strong> walked into the park.</p>`;
                } else if (i === 0) {
                    sentenceDiv.innerHTML = `They 
${verbOptions.find(option => option.value === story[i].split(' 
').pop()).text} to the park.`;
                } else {
                    sentenceDiv.innerHTML = `${story[i]}<br><br>`;
                }
                storyElement.appendChild(sentenceDiv);
            }

            if (currentSentenceIndex >= 10) {
                const choicesButton = document.createElement('button');
                choicesButton.classList.add('choices-button');
                choicesButton.innerHTML = 'Make a choice';
                storyElement.appendChild(choicesButton);

                choicesButton.addEventListener('click', () => {
                    displayChoices();
                });
            } else if (currentSentenceIndex >= 20) {
                const dangerButton = document.createElement('button');
                dangerButton.classList.add('danger-button');
                dangerButton.innerHTML = 'Avoid danger';
                storyElement.appendChild(dangerButton);

                dangerButton.addEventListener('click', () => {
                    userAnswer.value = verbOptions.find(option => 
option.text === 'ran').value;
                    generateNextSentence();
                });
            }
        }

        function displayChoices() {
            const choicesElement = document.createElement('div');
            choicesElement.classList.add('choices-element');
            for (const option of verbOptions) {
                const buttonElement = document.createElement('button');
                buttonElement.classList.add('choices-button');
                buttonElement.innerHTML = `<p>${option.text}</p>`;
                choicesElement.appendChild(buttonElement);
            }

            choicesElement.style.display = 'block';

            storyElement.appendChild(choicesElement);

            choicesButton.style.display = 'none';
        }

        function updateVerbOptions() {
            const verbButtonElements = 
document.querySelectorAll('.button');
            for (const button of verbButtonElements) {
                button.style.display = 'inline-block';
                button.addEventListener('click', () => {
                    userAnswer = button;
                });
            }
        }

        startGame();
    </script>

</body>
</html>
