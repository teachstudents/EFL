<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <button id="start-button">Start TTS</button>
    <button id="stop-button" style="display: none;">Stop TTS</button>
    <audio id="tts-audio" controls></audio>

    <script src="https://cdn.jsdelivr.net/npm/parrot-tts@1.2.0/dist/parrot-tts.min.js"></script>
    <script>
        const parrot = new ParrotTTS();
        let audioContext;

        document.getElementById("start-button").addEventListener("click", startTts);
        document.getElementById("stop-button").addEventListener("click", stopTts);

        function startTts() {
            // Create a new audio context
            audioContext = new Audio();

            // Set up the voice and language
            parrot.setVoice('British')
            parrot.setLanguage('en-GB');

            // Speak some text
            const text = "Hello, world!";
            audioContext.srcObject = parrot.speak(text);
            audioContext.play();

            // Add event listeners to stop the TTS when clicked
            document.getElementById("stop-button").style.display = "block";
        }

        function stopTts() {
            // Stop the TTS
            audioContext.pause();
            audioContext.currentTime = 0;

            // Remove the stop button
            document.getElementById("stop-button").style.display = "none";

            // Reset the parrot object
            parrot.reset();
        }
    </script>

</body>
</html>
