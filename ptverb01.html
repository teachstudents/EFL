<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Verb Adventure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            background-color: white;
            max-width: 90%;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        #start-screen, #game-screen, #end-screen {
            display: none;
        }
        .active-screen {
            display: block;
        }
        input {
            padding: 10px;
            margin: 10px;
            width: 80%;
            max-width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 10px 5px;
            width: 80%;
            max-width: 200px;
        }
        button:hover {
            background-color: #45a049;
        }
        #score {
            font-size: 20px;
            margin: 15px;
        }
        #story-text {
            margin: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="active-screen">
            <h1>Past Tense Verb Adventure</h1>
            <p>Enter your name to start the game:</p>
            <input type="text" id="user-name" placeholder="Your Name">
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game-screen">
            <h2 id="welcome-message"></h2>
            <div id="score">Score: <span id="current-score">0</span></div>
            <p id="story-text">Story will appear here.</p>
            <div id="options">
                <!-- Options will be dynamically inserted here -->
            </div>
        </div>

        <div id="end-screen">
            <h2>Game Over!</h2>
            <p id="final-score"></p>
            <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

    <script>
const stories = [
    { text: "Leo woke up early in the morning and decided to ______ for a run.", verb: "go", pastOptions: ["went", "gone", "going"], correctPast: "went" },
    { text: "After his run, he ______ a big breakfast to refuel.", verb: "eat", pastOptions: ["ate", "eaten", "eating"], correctPast: "ate" },
    { text: "He ______ his favorite book while drinking his morning coffee.", verb: "read", pastOptions: ["read", "reading", "red"], correctPast: "read" },
    { text: "He ______ his dog for a walk in the park.", verb: "take", pastOptions: ["took", "taken", "taking"], correctPast: "took" },
    { text: "They ______ a movie last night that was really exciting.", verb: "watch", pastOptions: ["watched", "watching", "watches"], correctPast: "watched" },
    { text: "She ______ a beautiful song at the concert.", verb: "sing", pastOptions: ["sang", "sung", "singing"], correctPast: "sang" },
    { text: "He ______ his homework before going out to play.", verb: "do", pastOptions: ["did", "done", "doing"], correctPast: "did" },
    { text: "We ______ a fantastic time at the beach yesterday.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "The cat ______ all the milk from the bowl.", verb: "drink", pastOptions: ["drank", "drunk", "drinking"], correctPast: "drank" },
    { text: "They ______ a new car last month.", verb: "buy", pastOptions: ["bought", "buying", "buys"], correctPast: "bought" },
    { text: "He ______ to the store to get some groceries.", verb: "drive", pastOptions: ["drove", "driven", "driving"], correctPast: "drove" },
    { text: "She ______ a letter to her friend yesterday.", verb: "write", pastOptions: ["wrote", "written", "writing"], correctPast: "wrote" },
    { text: "They ______ to the mountains for their vacation.", verb: "travel", pastOptions: ["traveled", "traveling", "travels"], correctPast: "traveled" },
    { text: "He ______ his keys on the table.", verb: "leave", pastOptions: ["left", "leaving", "leaves"], correctPast: "left" },
    { text: "We ______ a delicious pizza for dinner.", verb: "make", pastOptions: ["made", "making", "makes"], correctPast: "made" },
    { text: "She ______ a beautiful dress for the party.", verb: "wear", pastOptions: ["wore", "wearing", "wears"], correctPast: "wore" },
    { text: "They ______ a new house last year.", verb: "build", pastOptions: ["built", "building", "builds"], correctPast: "built" },
    { text: "He ______ his bicycle to the park.", verb: "ride", pastOptions: ["rode", "riding", "rides"], correctPast: "rode" },
    { text: "She ______ a picture of the beautiful sunset.", verb: "take", pastOptions: ["took", "taking", "takes"], correctPast: "took" },
    { text: "We ______ a great time at the party last night.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "He ______ his homework before dinner.", verb: "finish", pastOptions: ["finished", "finishing", "finishes"], correctPast: "finished" },
    { text: "They ______ to the concert and enjoyed the music.", verb: "go", pastOptions: ["went", "gone", "going"], correctPast: "went" },
    { text: "She ______ a cake for her friend's birthday.", verb: "bake", pastOptions: ["baked", "baking", "bakes"], correctPast: "baked" },
    { text: "He ______ his room before his parents came home.", verb: "clean", pastOptions: ["cleaned", "cleaning", "cleans"], correctPast: "cleaned" },
    { text: "We ______ a fantastic movie at the cinema.", verb: "see", pastOptions: ["saw", "seen", "seeing"], correctPast: "saw" },
    { text: "She ______ a new language for her trip abroad.", verb: "learn", pastOptions: ["learned", "learning", "learns"], correctPast: "learned" },
    { text: "They ______ a lot of money on their vacation.", verb: "spend", pastOptions: ["spent", "spending", "spends"], correctPast: "spent" },
    { text: "He ______ his friend at the coffee shop.", verb: "meet", pastOptions: ["met", "meeting", "meets"], correctPast: "met" },
    { text: "She ______ a beautiful painting at the art gallery.", verb: "see", pastOptions: ["saw", "seen", "seeing"], correctPast: "saw" },
    { text: "We ______ a great time at the amusement park.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "He ______ his phone at home and had to go back.", verb: "forget", pastOptions: ["forgot", "forgetting", "forgets"], correctPast: "forgot" },
    { text: "They ______ a new restaurant in town and loved the food.", verb: "try", pastOptions: ["tried", "trying", "tries"], correctPast: "tried" },
    { text: "She ______ a beautiful flower in the garden.", verb: "see", pastOptions: ["saw", "seen", "seeing"], correctPast: "saw" },
    { text: "He ______ his best to finish the project on time.", verb: "do", pastOptions: ["did", "done", "doing"], correctPast: "did" },
    { text: "We ______ a wonderful time at the family reunion.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "She ______ a delicious meal for her family.", verb: "cook", pastOptions: ["cooked", "cooking", "cooks"], correctPast: "cooked" },
    { text: "They ______ a new game and played it all day.", verb: "get", pastOptions: ["got", "getting", "gets"], correctPast: "got" },
    { text: "He ______ his sister with her homework.", verb: "help", pastOptions: ["helped", "helping", "helps"], correctPast: "helped" },
    { text: "She ______ a beautiful song on the piano.", verb: "play", pastOptions: ["played", "playing", "plays"], correctPast: "played" },
    { text: "We ______ a fantastic time at the music festival.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "He ______ his friend a funny joke.", verb: "tell", pastOptions: ["told", "telling", "tells"], correctPast: "told" },
    { text: "They ______ a new TV show and binge-watched it all weekend.", verb: "find", pastOptions: ["found", "finding", "finds"], correctPast: "found" },
    { text: "She ______ a beautiful dress for the special occasion.", verb: "choose", pastOptions: ["chose", "choosing", "chooses"], correctPast: "chose" },
    { text: "He ______ his best friend at the mall.", verb: "meet", pastOptions: ["met", "meeting", "meets"], correctPast: "met" },
    { text: "We ______ a great time at the beach and enjoyed the sun.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "She ______ a beautiful picture of the sunset.", verb: "take", pastOptions: ["took", "taking", "takes"], correctPast: "took" },
    { text: "They ______ a new board game and played it with friends.", verb: "buy", pastOptions: ["bought", "buying", "buys"], correctPast: "bought" },
    { text: "He ______ his homework and then went to bed.", verb: "finish", pastOptions: ["finished", "finishing", "finishes"], correctPast: "finished" },
    { text: "She ______ a beautiful song at the talent show.", verb: "sing", pastOptions: ["sang", "sung", "singing"], correctPast: "sang" },
    { text: "We ______ a fantastic time at the party and danced all night.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "He ______ his friend a gift for her birthday.", verb: "give", pastOptions: ["gave", "giving", "gives"], correctPast: "gave" },
    { text: "They ______ a new recipe and cooked a delicious meal.", verb: "try", pastOptions: ["tried", "trying", "tries"], correctPast: "tried" },
    { text: "She ______ a beautiful painting at the art exhibition.", verb: "see", pastOptions: ["saw", "seen", "seeing"], correctPast: "saw" },
    { text: "He ______ his best to win the competition.", verb: "do", pastOptions: ["did", "done", "doing"], correctPast: "did" },
    { text: "We ______ a wonderful time at the family gathering.", verb: "have", pastOptions: ["had", "having", "has"], correctPast: "had" },
    { text: "She ______ a delicious cake for the party.", verb: "bake", pastOptions: ["baked", "baking", "bakes"], correctPast: "baked" },
    { text: "They ______ a new video game and played it all day.", verb: "get", pastOptions: ["got", "getting", "gets"], correctPast: "got" }
];

let userName = \"\";
let currentScore = 0;
let currentStoryIndex = 0;

function startGame() {
    userName = document.getElementById('user-name').value || \"Player\";
    document.getElementById('welcome-message').textContent = `Welcome, ${userName}!`;
    document.getElementById('start-screen').classList.remove('active-screen');
    document.getElementById('game-screen').classList.add('active-screen');
    loadNewStory();
}

function loadNewStory() {
    if (currentStoryIndex >= stories.length) {
        endGame();
        return;
    }

    const story = stories[currentStoryIndex];
    document.getElementById('story-text').textContent = story.text;
    document.getElementById('options').innerHTML = '';

    story.pastOptions.forEach(option => {
        const button = document.createElement('button');
        button.textContent = option;
        button.onclick = () => checkAnswer(option, story.correctPast);
        document.getElementById('options').appendChild(button);
    });
}

function checkAnswer(selectedOption, correctPast) {
    if (selectedOption === correctPast) {
        currentScore++;
        document.getElementById('current-score').textContent = currentScore;
    }

    currentStoryIndex++;
    loadNewStory();
}

function endGame() {
    document.getElementById('game-screen').classList.remove('active-screen');
    document.getElementById('end-screen').classList.add('active-screen');
    document.getElementById('final-score').textContent = `${userName}, your final score is ${currentScore}!`;
}

function restartGame() {
    currentScore = 0;
    currentStoryIndex = 0;
    document.getElementById('current-score').textContent = currentScore;
    document.getElementById('end-screen').classList.remove('active-screen');
    document.getElementById('start-screen').classList.add('active-screen');
}
    </script>
</body>
</html>
