<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Verb Story</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .story-container {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            width: 80%;
            margin: 40px auto;
        }
        .button-container {
            text-align: center;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            margin: 0 10px;
        }
        .button:hover {
            background-color: #3e8e41;
        }
        .choices-container {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 200px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .choices-item {
            padding: 10px 20px;
            border: none;
            background-color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        .choices-item:hover {
            background-color: #ccc;
        }
        .danger-button {
            font-size: 24px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #00698f;">Story Time!</h1>
    <form id="user-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <button class="button" onclick="startGame()">Start Game</button>
    </form>

    <div class="story-container">
        <h2 style="text-align: center; color: #00698f;">Welcome to the 
Adventure Story!</h2>
        <p>You are a brave adventurer who is on a quest to find the 
legendary treasure.</p>
        <img src="https://picsum.photos/200/300" alt="Adventure 
Background">
    </div>

    <div id="story-container"></div>

    <script>
        let story = [
            'You are walking through the forest when you hear a strange 
noise.',
            'Suddenly, a wild boar charges towards you!',
            'But you're not afraid. You grab your trusty sword and prepare 
to defend yourself.'
        ];

        let verbOptions = [
            { text: 'ran', value: 'ran' },
            { text: 'jumped', value: 'jumped' }
        ];

        let currentSentenceIndex = 0;
        let userName;

        function startGame() {
            const nameInput = document.getElementById('name');
            if (nameInput.value) {
                userName = nameInput.value;
                displayStoryContainer();
                updateVerbOptions();
            } else {
                alert('Please enter your name first!');
            }
        }

        function generateNextSentenceLogic() {
            if (currentSentenceIndex < 3) {
                const randomChoice = Math.floor(Math.random() * 
verbOptions.length);
                let choiceText;
                switch (randomChoice) {
                    case 0:
                        choiceText = verbOptions[randomChoice].text;
                        break;
                    case 1:
                        choiceText = verbOptions[randomChoice].text;
                        break;
                    case 2:
                        choiceText = verbOptions[randomChoice].text;
                        break;
                }

                userAnswer.value = choiceText;

                if (currentSentenceIndex === 2) {
                    generateFinalSentence();
                } else {
                    const nextButton = document.createElement('button');
                    nextButton.classList.add('next-button');
                    nextButton.innerHTML = `You ${choiceText} away from 
the boar.`;
                    
document.querySelector('.story-container').appendChild(nextButton);

                    nextButton.addEventListener('click', () => {
                        currentSentenceIndex++;
                        generateNextSentenceLogic();
                    });
                }
            } else if (currentSentenceIndex === 3) {
                const dangerButton = document.createElement('button');
                dangerButton.classList.add('danger-button');
                dangerButton.innerHTML = 'Run away!';
                
document.querySelector('.story-container').appendChild(dangerButton);

                dangerButton.addEventListener('click', () => {
                    userAnswer.value = verbOptions.find(option => 
option.text === 'ran').value;
                    generateFinalSentence();
                });
            }
        }

        function displayStoryContainer() {
            const storyElement = 
document.getElementById('story-container');
            while (storyElement.firstChild) {
                storyElement.removeChild(storyElement.firstChild);
            }
            for (let i = 0; i < currentSentenceIndex; i++) {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.classList.add('sentence');
                if (!i && currentSentenceIndex === 0) {
                    sentenceDiv.innerHTML = 
`<p><strong>${userName}</strong> walked into the forest.</p>`;
                } else if (i === 0) {
                    sentenceDiv.innerHTML = `They 
${verbOptions.find(option => option.value === story[i].split(' 
').pop()).text} through the dense foliage.`;
                } else {
                    sentenceDiv.innerHTML = `${story[i]}<br><br>`;
                }
                
document.querySelector('.story-container').appendChild(sentenceDiv);
            }

            if (currentSentenceIndex >= 10) {
                const choicesContainer = document.createElement('div');
                choicesContainer.classList.add('choices-container');
                for (let i = 0; i < verbOptions.length; i++) {
                    const choicesItem = document.createElement('button');
                    choicesItem.classList.add('choices-item');
                    choicesItem.innerHTML = `Go ${verbOptions[i].text} 
towards the sound of running water.`;
                    choicesContainer.appendChild(choicesItem);

                    choicesItem.addEventListener('click', () => {
                        userAnswer.value = verbOptions[i].text;
                        generateNextSentenceLogic();
                    });
                }
                
document.querySelector('.story-container').appendChild(choicesContainer);
            } else if (currentSentenceIndex >= 20) {
                const dangerButton = document.createElement('button');
                dangerButton.classList.add('danger-button');
                dangerButton.innerHTML = 'Run away!';
                
document.querySelector('.story-container').appendChild(dangerButton);

                dangerButton.addEventListener('click', () => {
                    userAnswer.value = verbOptions.find(option => 
option.text === 'ran').value;
                    generateFinalSentence();
                });
            }
        }

        function updateVerbOptions() {
            const buttonContainer = document.querySelectorAll('.button');
            for (const button of buttonContainer) {
                button.style.display = 'inline-block';
                button.addEventListener('click', () => {
                    userAnswer.value = button.innerHTML.replace(' ', 
'_').toLowerCase();
                });
            }
        }

        function generateFinalSentence() {
            const finalSentenceDiv = document.createElement('div');
            finalSentenceDiv.classList.add('final-sentence');
            finalSentenceDiv.innerHTML = `You found the treasure and 
returned home victorious!</p>`;
            
document.querySelector('.story-container').appendChild(finalSentenceDiv);

            if (currentSentenceIndex === 49) {
                alert(`Congratulations! You have completed the adventure 
story.`);
            }
        }

        startGame();
    </script>

</body>
</html>
