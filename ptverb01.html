<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Verb Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            background-color: white;
            max-width: 90%;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        #start-screen, #game-screen, #score-screen {
            display: none;
        }
        .active-screen {
            display: block;
        }
        input {
            padding: 10px;
            margin: 10px;
            width: 80%;
            max-width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 10px 5px;
            width: 80%;
            max-width: 200px;
        }
        button:hover {
            background-color: #45a049;
        }
        #timer, #score {
            font-size: 20px;
            margin: 15px;
        }
        #reward-image {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="active-screen">
            <h1>Past Tense Verb Game</h1>
            <p>Enter your name to start the game:</p>
            <input type="text" id="user-name" placeholder="Your Name">
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game-screen">
            <h2 id="welcome-message"></h2>
            <div id="timer">Time left: <span id="time-left">10</span>s</div>
            <div id="score">Score: <span id="current-score">0</span></div>
            <p id="question">What is the past tense of "go"?</p>
            <div id="options">
                <!-- Options will be dynamically inserted here -->
            </div>
            <img id="reward-image" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iYmx1ZSIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNTAiIHI9IjQwIiBmaWxsPSJ5ZWxsb3ciLz48L3N2Zz4=" alt="Reward">
            <audio id="reward-sound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU..."></audio>
        </div>

        <div id="score-screen">
            <h2>Game Over!</h2>
            <p id="final-score"></p>
            <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

    <script>
        const verbs = [
            { present: "go", past: "went" },
            { present: "eat", past: "ate" },
            { present: "see", past: "saw" },
            { present: "take", past: "took" },
            { present: "run", past: "ran" },
            { present: "sing", past: "sang" },
            { present: "drink", past: "drank" },
            { present: "write", past: "wrote" },
            { present: "drive", past: "drove" },
            { present: "ride", past: "rode" }
        ];

        let userName = "";
        let currentScore = 0;
        let timeLeft = 10;
        let timer;
        let currentVerbIndex = 0;

        function startGame() {
            userName = document.getElementById('user-name').value || "Player";
            document.getElementById('welcome-message').textContent = `Welcome, ${userName}!`;
            document.getElementById('start-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            loadNewQuestion();
        }

        function loadNewQuestion() {
            clearInterval(timer);
            timeLeft = 10;
            document.getElementById('time-left').textContent = timeLeft;

            currentVerbIndex = Math.floor(Math.random() * verbs.length);
            const verb = verbs[currentVerbIndex];
            document.getElementById('question').textContent = `What is the past tense of "${verb.present}"?`;

            const options = document.getElementById('options');
            options.innerHTML = '';

            const correctAnswer = verb.past;
            const incorrectOptions = verbs.filter(v => v.past !== correctAnswer).sort(() => 0.5 - Math.random()).slice(0, 2).map(v => v.past);

            const allOptions = [correctAnswer, ...incorrectOptions].sort(() => 0.5 - Math.random());

            allOptions.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => checkAnswer(option, verb.present);
                options.appendChild(button);
            });

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }

        function checkAnswer(selectedOption, presentTense) {
            clearInterval(timer);
            const correctAnswer = verbs.find(v => v.present === presentTense).past;

            if (selectedOption === correctAnswer) {
                currentScore++;
                document.getElementById('current-score').textContent = currentScore;
                showReward();
            }

            loadNewQuestion();
        }

        function showReward() {
            const rewardImage = document.getElementById('reward-image');
            rewardImage.style.display = 'block';
            const rewardSound = document.getElementById('reward-sound');
            rewardSound.currentTime = 0;
            rewardSound.play().catch(e => console.log("Audio play failed:", e));

            setTimeout(() => {
                rewardImage.style.display = 'none';
            }, 1000);
        }

        function endGame() {
            document.getElementById('game-screen').classList.remove('active-screen');
            document.getElementById('score-screen').classList.add('active-screen');
            document.getElementById('final-score').textContent = `${userName}, your final score is ${currentScore}!`;
        }

        function restartGame() {
            currentScore = 0;
            document.getElementById('current-score').textContent = currentScore;
            document.getElementById('score-screen').classList.remove('active-screen');
            document.getElementById('start-screen').classList.add('active-screen');
        }
    </script>
</body>
</html>
