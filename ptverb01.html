<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Verb Story</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .story {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            display: flex;
            justify-content: center;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            margin: 0 10px;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>

    <h1>Story Time!</h1>
    <form id="user-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <button class="button" onclick="startGame()">Start Game</button>
    </form>

    <div id="story-container"></div>

    <script>
        let story = [
            'Leo and Elsa were walking in the park.',
            'They saw a group of children playing soccer.',
            'The children were laughing and having fun.',
            'But then they heard a loud noise behind them.',
            'They turned around to see a big dog running towards them.'
        ];

        let currentSentenceIndex = 0;

        function startGame() {
            const userName = document.getElementById('name').value;
            if (userName) {
                displayStoryContainer();
                generateNextSentence();
            } else {
                alert('Please enter your name first!');
            }
        }

        function generateNextSentence() {
            const verbInputValue = 
document.getElementById('verb-input').value;
            if (verbInputValue) {
                story[currentSentenceIndex] += ` They ${verbInputValue} to 
the park. `;
                currentSentenceIndex++;
                displayStoryContainer();
                generateNextSentence();
            } else {
                alert('Please enter a verb!');
            }
        }

        function displayStoryContainer() {
            const storyElement = 
document.getElementById('story-container');
            if (storyElement) {
                for (let i = 0; i < Math.min(currentSentenceIndex, 
story.length); i++) {
                    const sentenceDiv = document.createElement('div');
                    sentenceDiv.classList.add('story');
                    sentenceDiv.innerHTML = story[i];
                    storyElement.appendChild(sentenceDiv);
                }
            } else {
                storyElement.style.display = 'flex';
                for (const button of buttons) {
                    button.addEventListener('click', () => {
                        const verbInputValue = '';
                        if (button.dataset.verb === 'went') {
                            verbInputValue = 'went';
                        } else if (button.dataset.verb === 'ran') {
                            verbInputValue = 'ran';
                        } else if (button.dataset.verb === 'jumped') {
                            verbInputValue = 'jumped';
                        } else if (button.dataset.verb === 'ate') {
                            verbInputValue = 'ate';
                        } else if (button.dataset.verb === 'drank') {
                            verbInputValue = 'drank';
                        } else if (button.dataset.verb === 'read') {
                            verbInputValue = 'read';
                        } else if (button.dataset.verb === 'heard') {
                            verbInputValue = 'heard';
                        } else if (button.dataset.verb === 'saw') {
                            verbInputValue = 'saw';
                        } else if (button.dataset.verb === 'played') {
                            verbInputValue = 'played';
                        } else if (button.dataset.verb === 'made') {
                            verbInputValue = 'made';
                        }
                        document.getElementById('verb-input').value = 
verbInputValue;
                        generateNextSentence();
                    });
                }
            }
        }

        const buttons = document.querySelectorAll('.button');
        for (const button of buttons) {
            button.addEventListener('click', () => {
                if (story.length <= currentSentenceIndex) {
                    alert('No more sentences to add!');
                } else {
                    let verbInputValue = '';
                    if (button.dataset.verb === 'went') {
                        verbInputValue = 'went';
                    } else if (button.dataset.verb === 'ran') {
                        verbInputValue = 'ran';
                    } else if (button.dataset.verb === 'jumped') {
                        verbInputValue = 'jumped';
                    } else if (button.dataset.verb === 'ate') {
                        verbInputValue = 'ate';
                    } else if (button.dataset.verb === 'drank') {
                        verbInputValue = 'drank';
                    } else if (button.dataset.verb === 'read') {
                        verbInputValue = 'read';
                    } else if (button.dataset.verb === 'heard') {
                        verbInputValue = 'heard';
                    } else if (button.dataset.verb === 'saw') {
                        verbInputValue = 'saw';
                    } else if (button.dataset.verb === 'played') {
                        verbInputValue = 'played';
                    } else if (button.dataset.verb === 'made') {
                        verbInputValue = 'made';
                    }
                    document.getElementById('verb-input').value = 
verbInputValue;
                    generateNextSentence();
                }
            });
        }

        startGame();
    </script>

</body>
</html>
