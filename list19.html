<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List 19 Vocabulary Matching Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #f6f8fc;
      color: #23272f;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh;
      font-size: 18px;
    }
    body {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.18rem;
      margin: 18px 0 10px 0;
      color: #5a73b5;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .top-bar {
      font-size: 1.05rem;
      color: #5a73b5;
      display: flex;
      justify-content: center;
      gap: 2em;
      margin-bottom: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .game-panel {
      background: #fcfdff;
      border-radius: 14px;
      box-shadow: 0 2px 8px 0 rgba(60,72,88,0.07);
      width: 96vw; max-width: 620px;
      margin: 0 0 18px 0;
      padding: 20px 2vw 26px 2vw;
      display: flex; flex-direction: column; align-items: center;
      border: 1.2px solid #e0e6ed;
      position: relative;
      min-height: 340px;
    }
    .section-title {
      font-size: 1.07em;
      color: #6a768f;
      margin: 0 0 8px 0;
      font-weight: 500;
    }
    .main-word {
      font-size: clamp(2.2rem, 5vw, 2.7rem);
      font-weight: 800;
      color: #5a73b5;
      margin: 8px 0 8px 0;
      letter-spacing: 0.01em;
      text-align: center;
      word-break: break-word;
    }
    .word-def {
      font-size: 1.15rem;
      color: #23272f;
      font-weight: 500;
      margin-bottom: 12px;
      margin-top: 0;
      text-align: center;
      word-break: break-word;
    }
    .choices-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin: 14px 0 0 0;
      align-items: stretch;
    }
    .choice-btn {
      padding: 15px 10px;
      border-radius: 12px;
      background: #e7ecfa;
      border: 1.2px solid #e0e6ed;
      color: #23272f;
      font-size: 1.08rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.13s, border-color 0.12s;
      font-family: inherit;
      font-weight: 500;
      box-shadow: 0 1px 3px 0 rgba(60,72,88,0.03);
      white-space: normal;
    }
    .choice-btn:hover, .choice-btn[aria-pressed="true"] {
      background: #dde4f7;
      border-color: #5a73b5;
    }
    .choice-btn.correct { background: #e2fbec; border-color: #43b581; color: #43b581;}
    .choice-btn.incorrect { background: #ffe8eb; border-color: #ea5d68; color: #ea5d68;}
    .question-counter {
      margin-top: 10px;
      color: #6a768f;
      font-size: 1.07em;
      font-weight: 500;
      text-align: center;
    }
    .score-final {
      color: #43b581;
      font-size: 1.13em;
      font-weight: 600;
      margin: 10px 0 5px 0;
    }
    .alert {
      background: #b3c3e6;
      color: #fff;
      padding: 7px 20px;
      border-radius: 6px;
      display: inline-block;
      margin: 7px 0;
      font-size: 1.03em;
      font-weight: 500;
      box-shadow: 0 1px 4px 0 rgba(60,72,88,0.07);
    }
    .hidden { display: none !important; }
    #start-btn {
      font-size: 1.07rem;
      padding: 13px 32px;
      margin: 20px 0 10px 0;
      border-radius: 8px;
      background: #5a73b5;
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px 0 rgba(60,72,88,0.08);
      transition: background 0.14s;
    }
    #start-btn:hover { background: #b3c3e6;}
    #name-input {
      font-size: 1.03rem;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1.2px solid #e0e6ed;
      margin-top: 18px;
      width: 90vw; max-width: 260px;
      margin-bottom: 10px;
      background: #fff;
      color: #23272f;
    }
    .top-left-reward {
      position: absolute;
      left: 8px; top: 8px;
      width: 50px; height: 50px;
      z-index: 4;
      animation: fadeout 1s linear;
      pointer-events: none;
    }
    @keyframes fadeout {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }
    .fixed-bottom-reward {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      bottom: 8px;
      width: 80px; height: 80px;
      pointer-events: none;
      opacity: 1;
    }
    @media (max-width: 700px) {
      .game-panel { max-width: 99vw; padding: 13px 1vw 20px 1vw;}
      .main-word { font-size: clamp(1.38rem, 6vw, 2rem);}
      .word-def { font-size: 1.01rem;}
      .fixed-bottom-reward { width: 60px; height: 60px; }
      .top-left-reward { width: 40px; height: 40px;}
    }
    @media (max-width: 430px) {
      .main-word { font-size: 1rem;}
      .choice-btn { font-size: 0.93rem; padding: 9px 5px;}
      .game-panel { min-height: 0; }
      .top-bar { font-size: 0.92rem;}
    }
  </style>
</head>
<body>
  <h1>List 19 Vocabulary Matching Game</h1>
  <div class="top-bar">
    <span id="timer-global"></span>
    <span id="timer-part"></span>
    <span id="score-bar"></span>
  </div>
  <input id="name-input" type="text" placeholder="Enter your name">
  <button id="start-btn">Start Game</button>
  <div id="game-container"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <script>
    // ================ DATA ================
    const vocab = [
      { word: "publish", zh: "出版", def: "To make something available to the public, especially in print." },
      { word: "local", zh: "当地的", def: "Related to a nearby area or neighborhood." },
      { word: "adaptation", zh: "适应 / 改编", def: "A change made to fit new conditions." },
      { word: "respect", zh: "尊重", def: "A feeling of admiration or regard." },
      { word: "click", zh: "点击 / 咔哒声", def: "A short sound made by pressing something." },
      { word: "secure", zh: "安全的 / 获得", def: "To make something safe or protected." },
      { word: "orbit", zh: "轨道", def: "The path one object takes around another in space." },
      { word: "gradual", zh: "逐渐的", def: "Happening slowly over time." },
      { word: "toward(s)", zh: "朝向", def: "In the direction of something." },
      { word: "bedding", zh: "床上用品", def: "Sheets and blankets used on a bed." },
      { word: "annual", zh: "每年的", def: "Happening once every year." },
      { word: "bush", zh: "灌木", def: "A low plant with many branches." },
      { word: "promise", zh: "承诺", def: "A statement that someone will definitely do something." },
      { word: "noble", zh: "高贵的 / 贵族的", def: "Having high moral qualities or being of high social rank." },
      { word: "stop", zh: "停止", def: "To bring something to an end." },
      { word: "swallow", zh: "吞咽", def: "To make food or drink go down your throat." },
      { word: "compulsory", zh: "强制的 / 必须的", def: "Required by law or rules." },
      { word: "dress", zh: "连衣裙 / 穿衣", def: "A piece of clothing worn by women or girls." },
      { word: "iron", zh: "铁 / 熨斗", def: "A strong metal used in tools and construction." },
      { word: "barber", zh: "理发师", def: "A person whose job is cutting hair." },
      { word: "mature", zh: "成熟的", def: "Fully grown or developed." },
      { word: "lounge", zh: "休息室", def: "A room for relaxing or waiting." },
      { word: "cure", zh: "治愈", def: "Something that makes a sick person healthy again." },
      { word: "dormitory", zh: "宿舍", def: "A building where students live at school or college." },
      { word: "helicopter", zh: "直升机", def: "A flying vehicle with spinning blades on top." }
    ];

    // =========== GAME STATE ===========
    let playerName = "";
    let score = 100;
    let globalTimer = 300, partTimer = 120, part = 1; // part 1: 2min, part 2: 3min
    let globalInterval = null, partInterval = null;
    let p1q = [], p1current = 0, part2Order = [], p2current = 0;
    let gameOver = false;

    // =========== DOM ===========
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const nameInput = document.getElementById('name-input');
    const correctSound = document.getElementById('correct-sound');
    const incorrectSound = document.getElementById('incorrect-sound');
    const timerGlobalBar = document.getElementById('timer-global');
    const timerPartBar = document.getElementById('timer-part');
    const scoreBar = document.getElementById('score-bar');

    // =========== UTILS ===========
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    function showTopLeftReward(imgSrc) {
      const panel = document.querySelector('.game-panel');
      let img = document.createElement('img');
      img.src = imgSrc;
      img.className = 'top-left-reward';
      panel.appendChild(img);
      setTimeout(() => { if(img) img.remove(); }, 950);
    }
    function showBottomReward(imgSrc) {
      let old = document.querySelector('.fixed-bottom-reward');
      if (old) old.remove();
      const panel = document.querySelector('.game-panel');
      let img = document.createElement('img');
      img.src = imgSrc;
      img.className = 'fixed-bottom-reward';
      panel.appendChild(img);
    }
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.textContent = msg;
      document.querySelector('.game-panel').appendChild(div);
      setTimeout(() => div.remove(), 1150);
    }

    // =========== TIMERS ===========
    function updateBars() {
      timerGlobalBar.textContent = `Global: ${Math.floor(globalTimer/60)}:${('0'+(globalTimer%60)).slice(-2)}`;
      timerPartBar.textContent = `Part: ${Math.floor(partTimer/60)}:${('0'+(partTimer%60)).slice(-2)}`;
      scoreBar.textContent = `Score: ${score}%`;
    }
    function startGlobalTimer() {
      if (globalInterval) clearInterval(globalInterval);
      globalInterval = setInterval(() => {
        if (gameOver) return;
        globalTimer--;
        if (globalTimer <= 0) {
          globalTimer = 0;
          updateBars();
          showGameOver();
          return;
        }
        updateBars();
      }, 1000);
    }
    function startPartTimer(seconds, onTimeout) {
      if (partInterval) clearInterval(partInterval);
      partTimer = seconds;
      updateBars();
      partInterval = setInterval(() => {
        if (gameOver) return;
        partTimer--;
        if (partTimer <= 0) {
          partTimer = 0;
          updateBars();
          clearInterval(partInterval);
          onTimeout();
          return;
        }
        updateBars();
      }, 1000);
    }

    // =========== GAME FLOW ===========
    startBtn.onclick = startGame;
    function startGame() {
      playerName = nameInput.value.trim();
      if (!playerName) return showAlert("Please enter your name!");
      startBtn.classList.add("hidden");
      nameInput.classList.add("hidden");
      score = 100;
      globalTimer = 300; // 5min
      part = 1;
      gameOver = false;
      // Part 1 queue (indexes)
      p1q = shuffle([...Array(vocab.length).keys()]);
      p1current = 0;
      part2Order = shuffle([...Array(vocab.length).keys()]);
      p2current = 0;
      startGlobalTimer();
      startPartTimer(120, part1Timeout);
      showPart1();
    }

    // =========== PART 1 ===========
    function showPart1() {
      if (gameOver) return;
      if (p1q.length === 0) {
        part = 2;
        startPartTimer(180, part2Timeout);
        showPart2();
        return;
      }
      let idx = p1q[0];
      let vocabItem = vocab[idx];
      // 2 distractors
      let distractors = shuffle([...Array(vocab.length).keys()].filter(i => i !== idx)).slice(0,2).map(i => vocab[i].zh);
      let choices = shuffle([vocabItem.zh, ...distractors]);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 1: English + Definition → Chinese</div>
          <div class="main-word">${vocabItem.word}</div>
          <div class="word-def">${vocabItem.def}</div>
          <div class="choices-row">
            ${choices.map((zh) =>
              `<button class="choice-btn" onclick="selectPart1('${zh.replace(/'/g, "\\'")}', this)">${zh}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${vocab.length-p1q.length+1} / ${vocab.length}</div>
        </div>
      `;
      window.selectPart1 = selectPart1;
      showBottomReward("reward2.gif");
    }
    function selectPart1(selectedZh, btn) {
      let idx = p1q[0];
      let correctZh = vocab[idx].zh;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (selectedZh === correctZh) {
        btn.classList.add("correct");
        correctSound.play();
        showTopLeftReward("reward1.gif");
        p1q.shift();
        setTimeout(showPart1, 850);
      } else {
        btn.classList.add("incorrect");
        let correctBtn = Array.from(buttons).find(b => b.textContent === correctZh);
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert("❌ 再试一次！");
        // Deduct score, move to end
        score = Math.max(0, score - 5);
        p1q.push(p1q.shift());
        setTimeout(showPart1, 1200);
      }
      updateBars();
    }
    function part1Timeout() {
      showGameOver("Time's up for Part 1!");
    }

    // =========== PART 2 ===========
    function showPart2() {
      if (gameOver) return;
      if (p2current >= vocab.length) {
        showGameOver();
        return;
      }
      let idx = part2Order[p2current];
      let word = vocab[idx].word;
      let correctDef = vocab[idx].def;
      let allDefs = vocab.map((v, i) => ({def: v.def, idx: i}));
      let incorrectDefs = shuffle(allDefs.filter(d => d.idx !== idx)).slice(0,4);
      let defs = shuffle([{def: correctDef, idx: idx}, ...incorrectDefs]);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 2: English Word → Definition</div>
          <div class="main-word">${word}</div>
          <div class="choices-row">
            ${defs.map((d) =>
              `<button class="choice-btn" style="white-space:normal;" onclick="selectPart2(${idx},${d.idx},this)">${d.def}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${p2current+1} / ${vocab.length}</div>
        </div>
      `;
      window.selectPart2 = selectPart2;
      showBottomReward("reward3.gif");
    }
    function selectPart2(wordIdx, defIdx, btn) {
      let correctIdx = wordIdx;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (defIdx === correctIdx) {
        btn.classList.add("correct");
        correctSound.play();
        showTopLeftReward("reward1.gif");
      } else {
        btn.classList.add("incorrect");
        let correctDef = vocab[correctIdx].def;
        let correctBtn = Array.from(buttons).find(b => b.textContent === correctDef);
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert("❌ 正确答案: " + correctDef);
        score = Math.max(0, score - 5);
      }
      setTimeout(() => {
        p2current++;
        showPart2();
        updateBars();
      }, 1100);
    }
    function part2Timeout() {
      showGameOver("Time's up for Part 2!");
    }

    // =========== GAME OVER ===========
    function showGameOver(msg) {
      gameOver = true;
      if (globalInterval) clearInterval(globalInterval);
      if (partInterval) clearInterval(partInterval);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="score-final">Game Over!</div>
          <div class="score-final">Final Score: ${score}%</div>
          ${msg ? '<p>' + msg + '</p>' : ''}
          <p>Well done, ${playerName}!</p>
          <button onclick="location.reload()">Restart Game</button>
        </div>
      `;
    }
  </script>
</body>
</html>
