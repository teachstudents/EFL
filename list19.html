<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List 19 Vocabulary Matching Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    body {
      background: #f6f8fc;
      color: #23272f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      margin: 0; padding: 0;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    h1 {
      font-size: 1.1rem;
      margin: 18px 0 10px 0;
      color: #5a73b5;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .top-bar {
      font-size: 1.04rem;
      color: #6a768f;
      display: flex;
      justify-content: center;
      gap: 2em;
      margin-bottom: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .game-panel {
      background: #fcfdff;
      border-radius: 14px;
      box-shadow: 0 2px 8px 0 rgba(60,72,88,0.07);
      width: 97vw; max-width: 680px;
      margin: 0 0 18px 0;
      padding: 18px 2vw 10px 2vw;
      display: flex; flex-direction: column; align-items: center;
      border: 1.2px solid #e0e6ed;
      min-height: 320px;
    }
    .section-title {
      font-size: 1.09em;
      color: #6a768f;
      margin: 0 0 4px 0;
      font-weight: 500;
    }
    .main-word {
      font-size: clamp(2.1rem, 6vw, 2.5rem);
      font-weight: 800;
      color: #5a73b5;
      margin: 5px 0 5px 0;
      letter-spacing: 0.01em;
    }
    .word-def {
      font-size: 1.13rem;
      color: #23272f;
      font-weight: 500;
      margin-bottom: 10px;
      margin-top: 0;
    }
    .choices-row {
      display: flex;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      margin: 10px 0 0 0;
    }
    .choice-btn {
      padding: 13px 10px;
      border-radius: 11px;
      background: #e7ecfa;
      border: 1.2px solid #e0e6ed;
      color: #23272f;
      font-size: 1.08rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.14s, border-color 0.13s;
      font-family: inherit;
      font-weight: 500;
      box-shadow: 0 1px 3px 0 rgba(60,72,88,0.03);
      white-space: normal;
    }
    .choice-btn:hover, .choice-btn[aria-pressed="true"] {
      background: #dde4f7;
      border-color: #5a73b5;
    }
    .choice-btn.correct { background: #e2fbec; border-color: #43b581; color: #43b581;}
    .choice-btn.incorrect { background: #ffe8eb; border-color: #ea5d68; color: #ea5d68;}
    .question-counter {
      margin-top: 10px;
      color: #6a768f;
      font-size: 1.05em;
      font-weight: 500;
    }
    .score-final {
      color: #43b581;
      font-size: 1.15em;
      font-weight: 600;
      margin: 12px 0 5px 0;
    }
    .alert {
      background: #b3c3e6;
      color: #fff;
      padding: 7px 20px;
      border-radius: 6px;
      display: inline-block;
      margin: 7px 0;
      font-size: 1.03em;
      font-weight: 500;
      letter-spacing: 0.03em;
      box-shadow: 0 1px 4px 0 rgba(60,72,88,0.07);
    }
    .hidden { display: none !important; }
    #start-btn {
      font-size: 1.07rem;
      padding: 12px 32px;
      margin: 16px 0 10px 0;
      border-radius: 8px;
      background: #5a73b5;
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px 0 rgba(60,72,88,0.08);
      transition: background 0.14s;
    }
    #start-btn:hover { background: #b3c3e6;}
    #name-input {
      font-size: 1.03rem;
      padding: 9px 16px;
      border-radius: 6px;
      border: 1.2px solid #e0e6ed;
      margin-top: 16px;
      width: 90vw; max-width: 260px;
      margin-bottom: 7px;
      background: #fff;
      color: #23272f;
    }
    @media (max-width: 800px) {
      .game-panel { max-width: 99vw; padding: 10px 1vw 7px 1vw;}
      .main-word { font-size: clamp(1.5rem, 8vw, 2.1rem);}
      .word-def { font-size: 1.01rem;}
    }
    @media (max-width: 550px) {
      .main-word { font-size: 1.1rem;}
      .word-def { font-size: 0.97rem;}
      .choice-btn { font-size: 0.91rem; padding: 10px 7px;}
      .game-panel { min-height: 0; padding: 6px 2vw 2px 2vw;}
      .top-bar { font-size: 0.96rem;}
      #name-input { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <h1>List 19 Vocabulary Matching Game</h1>
  <div class="top-bar">
    <span id="timer-bar"></span>
    <span id="score-bar"></span>
  </div>
  <input id="name-input" type="text" placeholder="Enter your name">
  <button id="start-btn">Start Game</button>
  <div id="game-container"></div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>
  <script>
    // ================ DATA ================
    const vocab = [
      { word: "publish", zh: "出版", def: "To make something available to the public, especially in print." },
      { word: "local", zh: "当地的", def: "Related to a nearby area or neighborhood." },
      { word: "adaptation", zh: "适应 / 改编", def: "A change made to fit new conditions." },
      { word: "respect", zh: "尊重", def: "A feeling of admiration or regard." },
      { word: "click", zh: "点击 / 咔哒声", def: "A short sound made by pressing something." },
      { word: "secure", zh: "安全的 / 获得", def: "To make something safe or protected." },
      { word: "orbit", zh: "轨道", def: "The path one object takes around another in space." },
      { word: "gradual", zh: "逐渐的", def: "Happening slowly over time." },
      { word: "toward(s)", zh: "朝向", def: "In the direction of something." },
      { word: "bedding", zh: "床上用品", def: "Sheets and blankets used on a bed." },
      { word: "annual", zh: "每年的", def: "Happening once every year." },
      { word: "bush", zh: "灌木", def: "A low plant with many branches." },
      { word: "promise", zh: "承诺", def: "A statement that someone will definitely do something." },
      { word: "noble", zh: "高贵的 / 贵族的", def: "Having high moral qualities or being of high social rank." },
      { word: "stop", zh: "停止", def: "To bring something to an end." },
      { word: "swallow", zh: "吞咽", def: "To make food or drink go down your throat." },
      { word: "compulsory", zh: "强制的 / 必须的", def: "Required by law or rules." },
      { word: "dress", zh: "连衣裙 / 穿衣", def: "A piece of clothing worn by women or girls." },
      { word: "iron", zh: "铁 / 熨斗", def: "A strong metal used in tools and construction." },
      { word: "barber", zh: "理发师", def: "A person whose job is cutting hair." },
      { word: "mature", zh: "成熟的", def: "Fully grown or developed." },
      { word: "lounge", zh: "休息室", def: "A room for relaxing or waiting." },
      { word: "cure", zh: "治愈", def: "Something that makes a sick person healthy again." },
      { word: "dormitory", zh: "宿舍", def: "A building where students live at school or college." },
      { word: "helicopter", zh: "直升机", def: "A flying vehicle with spinning blades on top." }
    ];

    // =========== GAME STATE ===========
    let playerName = "";
    let score = 100;
    let timer = 300; // 5 minutes in seconds
    let timerInterval = null;
    let part = 1; // 1 or 2
    let p1q = []; // queue for part 1 (indexes)
    let p1current = 0;
    let part2Order = [];
    let p2current = 0;

    // =========== DOM ===========
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const nameInput = document.getElementById('name-input');
    const correctSound = document.getElementById('correct-sound');
    const incorrectSound = document.getElementById('incorrect-sound');
    const timerBar = document.getElementById('timer-bar');
    const scoreBar = document.getElementById('score-bar');

    // =========== UTILS ===========
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // =========== TIMER ===========
    function startTimer() {
      updateBars();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        updateBars();
        if (timer <= 0) {
          clearInterval(timerInterval);
          showGameOver();
        }
      }, 1000);
    }
    function updateBars() {
      timerBar.textContent = `Time Left: ${Math.floor(timer/60)}:${('0'+(timer%60)).slice(-2)}`;
      scoreBar.textContent = `Score: ${score}%`;
    }

    // =========== GAME FLOW ===========
    startBtn.onclick = startGame;
    function startGame() {
      playerName = nameInput.value.trim();
      if (!playerName) {
        showAlert("Please enter your name!");
        return;
      }
      startBtn.classList.add("hidden");
      nameInput.classList.add("hidden");
      score = 100;
      timer = 300;
      part = 1;
      p1q = shuffle([...Array(vocab.length).keys()]);
      p1current = 0;
      p2current = 0;
      part2Order = shuffle([...Array(vocab.length).keys()]);
      startTimer();
      showPart1();
    }

    // =========== PART 1 ===========
    function showPart1() {
      if (timer <= 0) return showGameOver();
      if (p1q.length === 0) {
        part = 2;
        p2current = 0;
        showPart2();
        return;
      }
      let idx = p1q[0];
      let vocabItem = vocab[idx];
      // choices: correct + 2 incorrect zhs
      let choices = [vocabItem.zh];
      let distractors = shuffle([...Array(vocab.length).keys()].filter(i => i !== idx)).slice(0,2).map(i => vocab[i].zh);
      choices = shuffle(choices.concat(distractors));
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 1: English + Definition → Chinese Translation</div>
          <div class="main-word">${vocabItem.word}</div>
          <div class="word-def">${vocabItem.def}</div>
          <div class="choices-row">
            ${choices.map((zh, i) =>
              `<button class="choice-btn" onclick="selectPart1('${zh.replace(/'/g, "\\'")}', this)">${String.fromCharCode(65+i)}. ${zh}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${vocab.length-p1q.length+1} / ${vocab.length}</div>
        </div>
      `;
      window.selectPart1 = selectPart1;
    }

    function selectPart1(selectedZh, btn) {
      let idx = p1q[0];
      let correctZh = vocab[idx].zh;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (selectedZh === correctZh) {
        btn.classList.add("correct");
        correctSound.play();
        p1q.shift();
      } else {
        btn.classList.add("incorrect");
        let correctBtn = Array.from(buttons).find(b => b.textContent.includes(correctZh));
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert(`❌ 错误! 再试一次。`);
        // Deduct score & move to end of queue for retry
        score = Math.max(0, score - 5);
        p1q.push(p1q.shift());
        setTimeout(showPart1, 1150);
        updateBars();
        return;
      }
      setTimeout(showPart1, 800);
      updateBars();
    }

    // =========== PART 2 ===========
    function showPart2() {
      if (timer <= 0) return showGameOver();
      if (p2current >= vocab.length) {
        showGameOver();
        return;
      }
      let idx = part2Order[p2current];
      let word = vocab[idx].word;
      let correctDef = vocab[idx].def;
      let allDefs = vocab.map((v, i) => ({def: v.def, idx: i}));
      let incorrectDefs = shuffle(allDefs.filter(d => d.idx !== idx)).slice(0,9);
      let defs10 = shuffle([{def: correctDef, idx: idx}, ...incorrectDefs]);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="section-title">Part 2: English Word → Definition</div>
          <div class="main-word">${word}</div>
          <div class="choices-row">
            ${defs10.map((d, i) =>
              `<button class="choice-btn" style="white-space:normal;" onclick="selectPart2(${idx},${d.idx},this)">${String.fromCharCode(65+i)}. ${d.def}</button>`
            ).join('')}
          </div>
          <div class="question-counter">Question ${p2current+1} / ${vocab.length}</div>
        </div>
      `;
      window.selectPart2 = selectPart2;
    }

    function selectPart2(wordIdx, defIdx, btn) {
      let correctIdx = wordIdx;
      let buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(b => b.disabled = true);
      if (defIdx === correctIdx) {
        btn.classList.add("correct");
        correctSound.play();
      } else {
        btn.classList.add("incorrect");
        let correctDef = vocab[correctIdx].def;
        let correctBtn = Array.from(buttons).find(b => b.textContent.includes(correctDef));
        if (correctBtn) correctBtn.classList.add("correct");
        incorrectSound.play();
        showAlert("❌ 错误! 正确答案: " + correctDef);
        score = Math.max(0, score - 5);
      }
      setTimeout(() => {
        p2current++;
        showPart2();
        updateBars();
      }, 1100);
    }

    // =========== GAME OVER ===========
    function showGameOver() {
      clearInterval(timerInterval);
      gameContainer.innerHTML = `
        <div class="game-panel">
          <div class="score-final">Game Over!</div>
          <div class="score-final">Final Score: ${score}%</div>
          <p>Well done, ${playerName}!</p>
          <button onclick="location.reload()">Restart Game</button>
        </div>
      `;
    }

    // =========== ALERT =============
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.textContent = msg;
      document.querySelector('.game-panel').appendChild(div);
      setTimeout(() => div.remove(), 1150);
    }
  </script>
</body>
</html>
