<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Spelling Test – Set 9 (30 Words)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { margin-bottom: 10px; }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #45a049; }
    input[type="text"] {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
    .feedback {
      margin-top: 10px;
      font-weight: bold;
      min-height: 60px;
    }
    #overallTimer, #overallScore, #setIndicator, #timerDisplay {
      font-size: 18px;
      margin: 10px 0;
      color: #333;
    }
    img.reward {
      max-width: 300px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcomeContainer" class="container">
    <h2>Welcome to Joel Mitchell’s Listening & Spelling</h2>
    <label for="username">Your Name: </label>
    <input type="text" id="username" placeholder="Enter your name">
    <br>
    <button id="startBtn">Start Test</button>
  </div>

  <!-- Test Interface (hidden initially) -->
  <div id="testInterface" class="container" style="display: none;">
    <!-- Overall Timer, Overall Score, and Set Indicator -->
    <p id="overallTimer">Overall Time Remaining: 10:00</p>
    <p id="overallScore">Overall Score: 100%</p>
    <p id="setIndicator">Test Set: 1/1</p>

    <!-- Current Word Section -->
    <p id="progress">Word 1 of 30</p>
    <p id="clue">Clue: </p>
    <button id="playAudioBtn">Play Audio</button>
    <p id="timerDisplay">Time remaining: <span id="wordTimer">20</span> seconds</p>
    <input type="text" id="answerInput" placeholder="Type the word here">
    <br>
    <button id="checkBtn">Check Answer</button>
    <button id="nextBtn" style="display: none;">Next Word</button>
    <div id="feedback" class="feedback"></div>
  </div>

  <!-- Hidden audio element for playing vocabulary and reward audio -->
  <audio id="audioPlayer"></audio>

  <script>
    /***** Data & Variables *****/
    // Set 9: 30 vocabulary words with clues and corresponding audio file paths.
    const testSets = [
      [
        { word: "grandson",    clue: "The male child of your child",                   audioFile: "voc/grandson.mp3" },
        { word: "guitar",      clue: "A stringed musical instrument",                    audioFile: "voc/guitar.mp3" },
        { word: "ham",         clue: "Cured pork meat",                                  audioFile: "voc/ham.mp3" },
        { word: "ice",         clue: "Frozen water",                                     audioFile: "voc/ice.mp3" },
        { word: "jelly",       clue: "A sweet spread made from fruit",                   audioFile: "voc/jelly.mp3" },
        { word: "kite",        clue: "A toy that flies in the wind",                     audioFile: "voc/kite.mp3" },
        { word: "leopard",     clue: "A spotted big cat",                                audioFile: "voc/leopard.mp3" },
        { word: "mango",       clue: "A tropical, sweet fruit",                          audioFile: "voc/mango.mp3" },
        { word: "nectarine",   clue: "A smooth-skinned peach",                           audioFile: "voc/nectarine.mp3" },
        { word: "ocean",       clue: "A vast body of salt water",                        audioFile: "voc/ocean.mp3" },
        { word: "piano",       clue: "A large keyboard musical instrument",            audioFile: "voc/piano.mp3" },
        { word: "quilt",       clue: "A warm bed covering",                              audioFile: "voc/quilt.mp3" },
        { word: "rose",        clue: "A fragrant, blooming flower",                      audioFile: "voc/rose.mp3" },
        { word: "saxophone",   clue: "A wind instrument used in jazz",                   audioFile: "voc/saxophone.mp3" },
        { word: "tornado",     clue: "A destructive whirlwind",                          audioFile: "voc/tornado.mp3" },
        { word: "violin",      clue: "A string instrument played with a bow",            audioFile: "voc/violin.mp3" },
        { word: "watermelon",  clue: "A large, juicy fruit with seeds",                  audioFile: "voc/watermelon.mp3" },
        { word: "xylophone",   clue: "A percussion instrument with wooden bars",         audioFile: "voc/xylophone.mp3" },
        { word: "yacht",       clue: "A large luxury boat",                              audioFile: "voc/yacht.mp3" },
        { word: "zebra",       clue: "An African wild horse with black & white stripes", audioFile: "voc/zebra.mp3" },
        { word: "candle",      clue: "A wax object with a wick for light",               audioFile: "voc/candle.mp3" },
        { word: "dragon",      clue: "A mythical fire-breathing creature",               audioFile: "voc/dragon.mp3" },
        { word: "eagle",       clue: "A large bird of prey",                             audioFile: "voc/eagle.mp3" },
        { word: "flamingo",    clue: "A tall, pink wading bird",                         audioFile: "voc/flamingo.mp3" },
        { word: "igloo",       clue: "A dome-shaped home made of ice",                  audioFile: "voc/igloo.mp3" },
        { word: "jungle",      clue: "A dense tropical forest",                          audioFile: "voc/jungle.mp3" },
        { word: "koala",       clue: "An Australian tree-dwelling marsupial",            audioFile: "voc/koala.mp3" },
        { word: "lighthouse",  clue: "A tower with a beacon for navigation",           audioFile: "voc/lighthouse.mp3" },
        { word: "monsoon",     clue: "A seasonal heavy rain",                            audioFile: "voc/monsoon.mp3" },
        { word: "nebula",      clue: "A cloud of gas and dust in space",                 audioFile: "voc/nebula.mp3" }
      ]
    ];

    // For this file, we use the one test set of 30 words.
    const totalWords = testSets[0].length;
    let mistakes = 0;
    let overallScore = 100;
    
    // Overall timer: 10 minutes = 600 seconds.
    let overallTime = 600;
    let overallTimerInterval;
    
    // For this file, one test set exists.
    let currentTestIndex = 0;
    let currentWordIndex = 0;
    
    /***** DOM Element References *****/
    const welcomeContainer = document.getElementById("welcomeContainer");
    const testInterface = document.getElementById("testInterface");
    const usernameInput = document.getElementById("username");
    const startBtn = document.getElementById("startBtn");
    
    const overallTimerEl = document.getElementById("overallTimer");
    const overallScoreEl = document.getElementById("overallScore");
    const setIndicatorEl = document.getElementById("setIndicator");
    
    const progressEl = document.getElementById("progress");
    const clueEl = document.getElementById("clue");
    const playAudioBtn = document.getElementById("playAudioBtn");
    const wordTimerEl = document.getElementById("wordTimer");
    const answerInputEl = document.getElementById("answerInput");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackEl = document.getElementById("feedback");
    const audioPlayer = document.getElementById("audioPlayer");
    
    /***** Overall Timer Function *****/
    function startOverallTimer() {
      overallTimerInterval = setInterval(() => {
        overallTime--;
        const minutes = Math.floor(overallTime / 60);
        const seconds = overallTime % 60;
        overallTimerEl.textContent = `Overall Time Remaining: ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        if (overallTime <= 0) {
          clearInterval(overallTimerInterval);
          endTest("Overall time is up!");
        }
      }, 1000);
    }
    
    /***** Per-Word Functions *****/
    function updateWordDisplay() {
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      progressEl.textContent = `Word ${currentWordIndex + 1} of ${totalWords}`;
      clueEl.textContent = `Clue: ${currentItem.clue}`;
      wordTimerEl.textContent = "20";
      answerInputEl.value = "";
      feedbackEl.innerHTML = "";
      answerInputEl.disabled = false;
      checkBtn.disabled = false;
      playAudioBtn.disabled = false;
      nextBtn.style.display = "none";
    }
    
    let wordTimerInterval;
    function startWordTimer() {
      clearInterval(wordTimerInterval);
      let timeLeft = 20;
      wordTimerEl.textContent = timeLeft;
      wordTimerInterval = setInterval(() => {
        timeLeft--;
        wordTimerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(wordTimerInterval);
          checkAnswer(true);
        }
      }, 1000);
    }
    
    function playAudio() {
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      audioPlayer.src = currentItem.audioFile;
      audioPlayer.play().catch(error => console.error("Error playing audio:", error));
    }
    
    function checkAnswer(auto = false) {
      clearInterval(wordTimerInterval);
      const currentItem = testSets[currentTestIndex][currentWordIndex];
      const userAnswer = answerInputEl.value.trim().toLowerCase();
      const correctAnswer = currentItem.word.toLowerCase();
      
      if (auto && userAnswer === "") {
        feedbackEl.textContent = `Time's up! The correct answer was "${correctAnswer}".`;
        feedbackEl.style.color = "red";
        mistakes++;
      } else if (userAnswer === correctAnswer) {
        feedbackEl.innerHTML = `Correct!<br><img src="reward1.gif" alt="Reward" class="reward">`;
        feedbackEl.style.color = "green";
        new Audio("game1.mp3").play().catch(err => console.error("Error playing reward audio:", err));
      } else {
        feedbackEl.textContent = `Incorrect! The correct answer was "${correctAnswer}".`;
        feedbackEl.style.color = "red";
        mistakes++;
      }
      
      overallScore = Math.max(100 - (mistakes * (100 / totalWords)), 0).toFixed(2);
      overallScoreEl.textContent = `Overall Score: ${overallScore}%`;
      
      answerInputEl.disabled = true;
      checkBtn.disabled = true;
      playAudioBtn.disabled = true;
      nextBtn.style.display = "inline-block";
    }
    
    function nextWord() {
      currentWordIndex++;
      if (currentWordIndex < totalWords) {
        updateWordDisplay();
        startWordTimer();
      } else {
        endTest("You have completed this test set!");
      }
    }
    
    function endTest(message) {
      clearInterval(wordTimerInterval);
      clearInterval(overallTimerInterval);
      const userName = usernameInput.value.trim() || "Participant";
      document.querySelector(".container").innerHTML = `
        <h2>Test Completed!</h2>
        <p>${message}</p>
        <p>${userName}, your final score is ${overallScore}%.</p>
        <button onclick="location.reload()">Restart Test</button>
      `;
    }
    
    /***** Event Listeners *****/
    startBtn.addEventListener("click", () => {
      if (usernameInput.value.trim() === "") {
        alert("Please enter your name to start the test.");
      } else {
        welcomeContainer.style.display = "none";
        testInterface.style.display = "block";
        updateWordDisplay();
        startWordTimer();
        startOverallTimer();
      }
    });
    
    playAudioBtn.addEventListener("click", playAudio);
    checkBtn.addEventListener("click", () => { checkAnswer(false); });
    nextBtn.addEventListener("click", nextWord);
    
    answerInputEl.addEventListener("keyup", event => {
      if (event.key === "Enter" && !checkBtn.disabled) {
        checkAnswer(false);
      }
    });
    
  </script>
  
</body>
</html>
