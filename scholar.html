<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Source Research Agent with APA Citations</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- citation-js for APA formatting -->
    <script src="https://cdn.jsdelivr.net/npm/citation-js/build/citation.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* A slightly lighter gray */
        }
        /* Simple loading spinner animation */
        .loader {
            border: 4px solid #e5e7eb; /* Lighter gray for the track */
            border-top: 4px solid #3b82f6; /* Blue for the spinner */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Style for the generated citation */
        .citation-text .csl-entry, .consolidated-references .csl-entry {
            line-height: 1.6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">

        <!-- Search Input -->
        <div class="my-10 max-w-2xl mx-auto">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="searchInput" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="Enter your research topic...">
                <button id="searchButton" class="bg-blue-600 text-white font-semibold px-6 py-3 rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-transform transform hover:scale-105">
                    Search
                </button>
            </div>
        </div>

        <!-- Results Area -->
        <main id="resultsArea" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- API 1: arXiv -->
            <section id="arxiv-section">
                <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-blue-200">
                    <a href="https://arxiv.org/" target="_blank" class="hover:underline">arXiv</a> Results
                </h2>
                <div id="arxiv-results" class="space-y-4"></div>
            </section>

            <!-- API 2: Crossref -->
            <section id="crossref-section">
                <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-green-200">
                    <a href="https://www.crossref.org/" target="_blank" class="hover:underline">Crossref</a> Results
                </h2>
                <div id="crossref-results" class="space-y-4"></div>
            </section>

            <!-- API 3: OpenAlex -->
            <section id="openalex-section" class="md:col-span-2 lg:col-span-1">
                <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-purple-200">
                    <a href="https://openalex.org/" target="_blank" class="hover:underline">OpenAlex</a> Results
                </h2>
                <div id="openalex-results" class="space-y-4"></div>
            </section>
        </main>

        <!-- Consolidated Reference List -->
        <section class="mt-12">
            <h2 class="text-2xl font-semibold mb-4 pb-2 border-b-2 border-gray-300">Consolidated Reference List (APA 7)</h2>
            <div id="consolidated-references-container" class="bg-white p-6 rounded-lg shadow-md relative">
                <div id="consolidated-references" class="consolidated-references space-y-4 text-sm">
                    <p class="text-gray-500">Your alphabetized reference list will appear here after a search.</p>
                </div>
                <button id="copyAllBtn" class="absolute top-4 right-4 bg-green-600 text-white font-semibold px-4 py-2 rounded-lg shadow-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition opacity-50 cursor-not-allowed" disabled>Copy All</button>
            </div>
        </section>

    </div>

    <script>
        // --- APP INITIALIZATION ---
        function main() {
            // --- DOM ELEMENTS ---
            const searchButton = document.getElementById('searchButton');
            const searchInput = document.getElementById('searchInput');
            const resultsArea = document.getElementById('resultsArea');
            const containers = {
                arxiv: document.getElementById('arxiv-results'),
                crossref: document.getElementById('crossref-results'),
                openalex: document.getElementById('openalex-results')
            };
            const consolidatedContainer = document.getElementById('consolidated-references');
            const copyAllBtn = document.getElementById('copyAllBtn');
            
            const { Cite } = window.citation_js;
            let consolidatedCSL = [];

            // --- UTILITY FUNCTIONS ---
            
            function createLoader() {
                const loaderContainer = document.createElement('div');
                loaderContainer.className = 'flex justify-center items-center py-10';
                const loader = document.createElement('div');
                loader.className = 'loader';
                loaderContainer.appendChild(loader);
                return loaderContainer;
            }

            function createResultCard(paperData) {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-lg shadow-md border border-gray-200 hover:shadow-lg transition-shadow h-full flex flex-col';
                
                const { title, authors, abstract, url, csl } = paperData;

                const apaCitation = new Cite(csl).format('bibliography', {
                    format: 'html',
                    template: 'apa',
                    lang: 'en-US'
                });

                const sanitizedTitle = title ? title.replace(/</g, "&lt;").replace(/>/g, "&gt;") : 'No Title Available';
                const authorString = authors && authors.length > 0 ? authors.map(a => a.name).join(', ') : 'Not Available';
                const sanitizedAuthors = authorString.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const sanitizedAbstract = abstract ? abstract.replace(/</g, "&lt;").replace(/>/g, "&gt;") : 'No abstract available.';

                card.innerHTML = `
                    <div class="flex-grow">
                        <h3 class="font-semibold text-lg text-blue-800 mb-2">
                            <a href="${url}" target="_blank" class="hover:underline">${sanitizedTitle}</a>
                        </h3>
                        <p class="text-sm text-gray-600 mb-3"><strong>Authors:</strong> ${sanitizedAuthors}</p>
                        <p class="text-sm text-gray-700 leading-relaxed">${sanitizedAbstract}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <details>
                            <summary class="font-semibold cursor-pointer text-sm text-gray-600 hover:text-gray-900">View APA 7 Citation</summary>
                            <div class="mt-2 p-3 bg-gray-100 rounded-lg text-xs text-gray-700 relative">
                                <div class="citation-text pr-16">${apaCitation}</div>
                                <button class="copy-btn absolute top-2 right-2 bg-blue-500 text-white px-2 py-1 text-xs rounded hover:bg-blue-600">Copy</button>
                            </div>
                        </details>
                    </div>
                `;
                return card;
            }

            function deinvertAbstract(invertedIndex) {
                if (!invertedIndex) return null;
                const termMap = new Map();
                for (const term in invertedIndex) {
                    invertedIndex[term].forEach(pos => {
                        termMap.set(pos, term);
                    });
                }
                const sortedPositions = Array.from(termMap.keys()).sort((a, b) => a - b);
                return sortedPositions.map(pos => termMap.get(pos)).join(' ');
            }
            
            function formatAuthorsForCSL(authors) {
                 if (!authors || !Array.isArray(authors)) return [];
                 return authors.map(name => {
                    const parts = name.trim().split(' ');
                    const family = parts.pop();
                    const given = parts.join(' ');
                    return { family, given };
                 });
            }

            function renderConsolidatedReferences() {
                if (consolidatedCSL.length === 0) {
                    consolidatedContainer.innerHTML = '<p class="text-gray-500">No citable results found to generate a reference list.</p>';
                    copyAllBtn.disabled = true;
                    copyAllBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    return;
                }

                try {
                    const bibliography = new Cite(consolidatedCSL).sort().format('bibliography', {
                        format: 'html',
                        template: 'apa',
                        lang: 'en-US'
                    });

                    consolidatedContainer.innerHTML = bibliography;
                    copyAllBtn.disabled = false;
                    copyAllBtn.classList.remove('opacity-50', 'cursor-not-allowed');

                } catch (e) {
                    console.error("Error rendering consolidated references:", e);
                    consolidatedContainer.innerHTML = '<p class="text-red-500">Could not generate the consolidated reference list.</p>';
                }
            }
            
            // --- API FETCHING FUNCTIONS ---

            async function fetchArxiv(query) {
                containers.arxiv.innerHTML = '';
                containers.arxiv.appendChild(createLoader());
                const url = `https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}&max_results=3`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    const xmlText = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    containers.arxiv.innerHTML = '';
                    const entries = xmlDoc.querySelectorAll("entry");
                    if (entries.length > 0) {
                        entries.forEach(entry => {
                            const authorNames = Array.from(entry.querySelectorAll("author > name")).map(name => name.textContent);
                            const paperData = {
                                title: entry.querySelector("title").textContent.trim(),
                                authors: authorNames.map(name => ({name})),
                                abstract: entry.querySelector("summary").textContent.trim(),
                                url: (entry.querySelector('link[rel="alternate"]') || entry.querySelector('link')).getAttribute('href'),
                                csl: { type: 'article', title: entry.querySelector("title").textContent.trim(), author: formatAuthorsForCSL(authorNames), issued: { 'date-parts': [[new Date(entry.querySelector('published').textContent).getFullYear()]] }, URL: (entry.querySelector('link[rel="alternate"]') || entry.querySelector('link')).getAttribute('href'), 'container-title': 'arXiv' }
                            };
                            containers.arxiv.appendChild(createResultCard(paperData));
                            consolidatedCSL.push(paperData.csl);
                        });
                    } else {
                        containers.arxiv.innerHTML = '<p class="text-gray-500">No results found on arXiv.</p>';
                    }
                } catch (error) {
                    console.error("arXiv Fetch Error:", error);
                    containers.arxiv.innerHTML = `<p class="text-red-500">Failed to fetch results from arXiv.</p>`;
                }
            }

            async function fetchCrossref(query) {
                containers.crossref.innerHTML = '';
                containers.crossref.appendChild(createLoader());
                const url = `https://api.crossref.org/works?query=${encodeURIComponent(query)}&rows=3&mailto=guest@example.com`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    const data = await response.json();
                    containers.crossref.innerHTML = '';
                    if (data.message.items && data.message.items.length > 0) {
                        data.message.items.forEach(paper => {
                            const authors = paper.author ? paper.author.map(a => ({ name: `${a.given || ''} ${a.family || ''}`.trim() })) : [];
                            const paperData = {
                                title: paper.title ? paper.title[0] : 'No Title Available',
                                authors: authors,
                                abstract: paper.abstract ? paper.abstract.replace(/<\/?jats:[^>]*>/g, '') : 'No abstract available.',
                                url: paper.URL,
                                csl: { type: 'article-journal', title: paper.title ? paper.title[0] : 'No Title Available', author: paper.author || [], issued: paper.issued ? { 'date-parts': [paper.issued['date-parts'][0]] } : null, 'container-title': paper['container-title'] ? paper['container-title'][0] : null, URL: paper.URL, DOI: paper.DOI }
                            };
                            containers.crossref.appendChild(createResultCard(paperData));
                            consolidatedCSL.push(paperData.csl);
                        });
                    } else {
                        containers.crossref.innerHTML = '<p class="text-gray-500">No results found on Crossref.</p>';
                    }
                } catch (error) {
                    console.error("Crossref Fetch Error:", error);
                    containers.crossref.innerHTML = `<p class="text-red-500">Failed to fetch results from Crossref.</p>`;
                }
            }
            
            async function fetchOpenAlex(query) {
                containers.openalex.innerHTML = '';
                containers.openalex.appendChild(createLoader());
                const url = `https://api.openalex.org/works?search=${encodeURIComponent(query)}&per-page=3`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    const data = await response.json();
                    containers.openalex.innerHTML = '';
                    if (data.results && data.results.length > 0) {
                        data.results.forEach(paper => {
                            const authors = paper.authorships.map(a => ({ name: a.author.display_name }));
                            const paperData = {
                                title: paper.display_name,
                                authors: authors,
                                abstract: deinvertAbstract(paper.abstract_inverted_index),
                                url: paper.doi ? `https://doi.org/${paper.doi.split('/').slice(3).join('/')}` : (paper.locations[0]?.landing_page_url || '#'),
                                csl: { type: 'article-journal', title: paper.display_name, author: paper.authorships.map(a => ({ family: a.author.display_name.split(' ').pop(), given: a.author.display_name.split(' ').slice(0, -1).join(' ') })), issued: { 'date-parts': [[paper.publication_year]] }, 'container-title': paper.host_venue?.display_name, DOI: paper.doi?.split('/').slice(3).join('/') }
                            };
                            containers.openalex.appendChild(createResultCard(paperData));
                            consolidatedCSL.push(paperData.csl);
                        });
                    } else {
                        containers.openalex.innerHTML = '<p class="text-gray-500">No results found on OpenAlex.</p>';
                    }
                } catch (error) {
                    console.error("OpenAlex Fetch Error:", error);
                    containers.openalex.innerHTML = `<p class="text-red-500">Failed to fetch results from OpenAlex.</p>`;
                }
            }

            // --- EVENT HANDLERS ---
            
            function handleSearch() {
                const query = searchInput.value.trim();
                if (query) {
                    consolidatedCSL = []; // Clear previous results
                    consolidatedContainer.innerHTML = '<p class="text-gray-500">Generating reference list...</p>';
                    copyAllBtn.disabled = true;
                    copyAllBtn.classList.add('opacity-50', 'cursor-not-allowed');

                    const allFetches = [
                        fetchArxiv(query),
                        fetchCrossref(query),
                        fetchOpenAlex(query)
                    ];

                    Promise.allSettled(allFetches).then(() => {
                        renderConsolidatedReferences();
                    });
                }
            }
            
            resultsArea.addEventListener('click', function(event) {
                if (event.target.classList.contains('copy-btn')) {
                    const button = event.target;
                    const citationTextElement = button.previousElementSibling;
                    const citationText = citationTextElement.innerText;
                    
                    navigator.clipboard.writeText(citationText).then(() => {
                        button.textContent = 'Copied!';
                        button.classList.remove('bg-blue-500', 'hover:bg-blue-600');
                        button.classList.add('bg-green-500');
                        setTimeout(() => {
                            button.textContent = 'Copy';
                            button.classList.remove('bg-green-500');
                            button.classList.add('bg-blue-500', 'hover:bg-blue-600');
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy text: ', err);
                        alert('Failed to copy citation.');
                    });
                }
            });

            copyAllBtn.addEventListener('click', () => {
                const referenceListText = consolidatedContainer.innerText;
                navigator.clipboard.writeText(referenceListText).then(() => {
                    copyAllBtn.textContent = 'Copied!';
                    setTimeout(() => {
                        copyAllBtn.textContent = 'Copy All';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy all references: ', err);
                    alert('Failed to copy reference list.');
                });
            });

            searchButton.addEventListener('click', handleSearch);
            searchInput.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') {
                    handleSearch();
                }
            });
        }

        // This function polls until the citation.js library is loaded, then starts the main app.
        // This is a robust way to handle external script loading.
        function checkLibraryAndInit() {
            if (window.citation_js) {
                main();
            } else {
                setTimeout(checkLibraryAndInit, 100);
            }
        }
        
        // Start the initialization process once the initial DOM is ready.
        document.addEventListener('DOMContentLoaded', checkLibraryAndInit);
    </script>
</body>
</html>
