<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List 18</title>
  <style>
    html, body {
      background: #f8fafd;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #222;
      min-height: 100vh;
    }
    #app-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 18px 4vw 0 4vw;
      box-sizing: border-box;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      color: #ff6347;
      margin: 18px 0 0 0;
      text-align: center;
    }
    #status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 6px 0;
      flex-wrap: wrap;
      gap: 8px 2vw;
    }
    .timer, .score {
      font-size: 20px;
      color: #444;
      background: #f7e3e3;
      border-radius: 8px;
      padding: 6px 14px;
      margin: 0 4px;
      min-width: 104px;
      text-align: center;
    }
    .score {
      background: #e3f7e3;
    }
    #global-timer { border: 2px solid #ff6347; }
    #part-timer { border: 2px solid #4caf50; }
    #question-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 10px #0001;
      margin: 16px 0;
      padding: 18px 12px 6px 12px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .mcq {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 3vw;
      margin-top: 8px;
      width: 100%;
    }
    .mcq button {
      flex: 1 1 37%;
      min-width: 120px;
      max-width: 43vw;
      font-size: 18px;
      padding: 13px 0;
      margin: 5px 2px;
      background: #ff6347;
      color: #fff;
      border: none;
      border-radius: 10px;
      box-shadow: 0 1px 2px #0002;
      cursor: pointer;
      transition: background 0.22s;
      word-break: break-word;
    }
    .mcq button:hover, .mcq button.selected {
      background: #ff4500;
    }
    #bottom-gif {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      min-height: 80px;
      margin-top: auto;
    }
    #bottom-gif img {
      max-width: 150px;
      min-width: 70px;
      width: 25vw;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      margin-top: 18px;
    }
    #reward1 {
      position: absolute;
      top: -16px;
      left: -16px;
      z-index: 100;
      width: 70px;
      height: 70px;
      display: none;
      pointer-events: none;
    }
    .alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f0ad4e;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 20px;
      z-index: 2000;
      box-shadow: 0 2px 10px #0003;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Tablet & mobile */
    @media (max-width: 700px) {
      #app-container { padding: 6px 0 0 0; }
      .mcq button { min-width: 92px; font-size: 16px; }
      #bottom-gif img { width: 33vw; max-width: 110px; }
      #reward1 { width: 52px; height: 52px; }
    }
    @media (max-width: 500px) {
      .mcq button { min-width: 80px; max-width: 98vw; }
      #question-container { padding: 10px 3vw 6px 3vw; }
      #bottom-gif img { width: 45vw; }
    }
  </style>
</head>
<body>
  <div id="app-container">
    <h1>List 18</h1>
    <div id="status-row">
      <div id="global-timer" class="timer"></div>
      <div id="part-timer" class="timer"></div>
      <div id="score-container" class="score"></div>
    </div>
    <input type="text" id="name-input" placeholder="Enter your name" style="padding: 10px; font-size: 18px; border-radius: 5px; margin-bottom: 16px; width: 90%; max-width: 300px; display: block; margin-left:auto; margin-right:auto;">
    <button id="start-button" style="display:block; margin:0 auto 15px auto; padding: 10px 26px; font-size: 1.18em; border-radius: 7px; border:none; background:#ff6347; color:#fff; cursor:pointer;">Start Quiz</button>
    <div id="question-container"></div>
    <img id="reward1" src="reward1.gif" alt="Reward" />
    <div id="bottom-gif"></div>
    <audio id="correct-sound" src="game1.mp3"></audio>
    <audio id="incorrect-sound" src="wrong.mp3"></audio>
  </div>
  <script>
    // List 18 Data
    const questionsData = [
      { english: "choose", translations: ["选择", "折扣", "数字"] },
      { english: "medical", translations: ["医疗的", "金字塔", "旋转"] },
      { english: "awake", translations: ["醒着的", "到期的 / 应得的", "惩罚"] },
      { english: "addition", translations: ["加法 / 增加", "旋转", "测量"] },
      { english: "splendid", translations: ["极好的 / 灿烂的", "火鸡", "触摸"] },
      { english: "admit", translations: ["承认", "类别", "品牌"] },
      { english: "brand", translations: ["品牌", "爆炸", "加法 / 增加"] },
      { english: "discount", translations: ["折扣", "选择", "惩罚"] },
      { english: "due", translations: ["到期的 / 应得的", "测量", "爆炸"] },
      { english: "concentrate", translations: ["集中注意力", "折扣", "火鸡"] },
      { english: "turkey", translations: ["火鸡", "旋转", "数字"] },
      { english: "expense", translations: ["花费 / 费用", "类别", "品牌"] },
      { english: "measure", translations: ["测量", "金字塔", "折扣"] },
      { english: "choice", translations: ["选择", "醒着的", "加法 / 增加"] },
      { english: "punishment", translations: ["惩罚", "触摸", "医疗的"] },
      { english: "roll", translations: ["滚动", "花费 / 费用", "惩罚"] },
      { english: "touch", translations: ["触摸", "选择", "金字塔"] },
      { english: "number", translations: ["数字", "醒着的", "爆炸"] },
      { english: "pyramid", translations: ["金字塔", "加法 / 增加", "测量"] },
      { english: "aware", translations: ["意识到的", "品牌", "爆炸"] }
    ];

    let globalTimer = 300; // 5 min
    let globalTimerInterval = null;
    let partTimer = 120; // 2 min for Part 1, 3 min for Part 2
    let partTimerMax = 120;
    let partTimerInterval = null;
    let inPart = 1; // 1 or 2
    let part1Questions = [];
    let part2Questions = [];
    let allDefs = [];
    let score = 100;
    let name = "";
    let isTransitioning = false;
    let currentQ = 0;

    // Helper: Shuffle
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Helper: Show reward1.gif top-left briefly
    function showReward1() {
      const r = document.getElementById("reward1");
      r.style.display = "block";
      setTimeout(() => { r.style.display = "none"; }, 900);
    }

    // Helper: Show alert
    function showAlert(msg) {
      const alertBox = document.createElement("div");
      alertBox.className = "alert";
      alertBox.innerText = msg;
      document.body.appendChild(alertBox);
      setTimeout(() => { alertBox.remove(); }, 1600);
    }

    // Timer Display
    function updateTimers() {
      document.getElementById("global-timer").textContent = `Global: ${Math.floor(globalTimer/60)}:${('0'+(globalTimer%60)).slice(-2)}`;
      document.getElementById("part-timer").textContent = `Part ${inPart}: ${Math.floor(partTimer/60)}:${('0'+(partTimer%60)).slice(-2)}`;
    }
    // Score
    function updateScore() {
      document.getElementById("score-container").textContent = `Score: ${score}%`;
    }

    // Timer Logic
    function startGlobalTimer() {
      updateTimers();
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      globalTimerInterval = setInterval(() => {
        globalTimer--;
        updateTimers();
        if (globalTimer <= 0) endQuiz('timeup');
      }, 1000);
    }
    function startPartTimer(newTime) {
      partTimerMax = newTime;
      partTimer = newTime;
      updateTimers();
      if (partTimerInterval) clearInterval(partTimerInterval);
      partTimerInterval = setInterval(() => {
        partTimer--;
        updateTimers();
        if (partTimer <= 0) {
          inPart === 1 ? startPart2() : endQuiz('timeup');
        }
      }, 1000);
    }
    function stopTimers() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      if (partTimerInterval) clearInterval(partTimerInterval);
    }

    // PART 1
    function startPart1() {
      inPart = 1;
      part1Questions = questionsData.map(q=>({...q}));
      shuffleArray(part1Questions);
      currentQ = 0;
      startPartTimer(120);
      renderPart1();
      setBottomGif("reward2.gif");
    }
    function renderPart1() {
      if (part1Questions.length === 0) { startPart2(); return; }
      const q = part1Questions[0];
      const options = shuffleArray([...q.translations]);
      document.getElementById("question-container").innerHTML = `
        <div style="font-size:1.15em;margin-bottom:8px;"><b>Part 1: 英文选中文</b></div>
        <div style="font-size:1.5em;margin-bottom:10px;">${q.english}</div>
        <div class="mcq">
          ${options.map((option, i) => `<button>${option}</button>`).join('')}
        </div>
        <div style="font-size:0.96em;margin-top:10px;color:#888;">Questions left: ${part1Questions.length}</div>
      `;
      document.querySelectorAll(".mcq button").forEach((btn, i) => {
        btn.onclick = () => {
          if(isTransitioning) return;
          isTransitioning = true;
          const selected = btn.textContent;
          const correct = q.translations[0];
          if(selected === correct) {
            document.getElementById("correct-sound").play();
            showReward1();
            showAlert("✔️ Correct!");
            part1Questions.shift();
          } else {
            document.getElementById("incorrect-sound").play();
            score = Math.max(0, score - 5);
            // Move this question to end for retry
            part1Questions.push(part1Questions.shift());
            showAlert("❌ Incorrect!");
          }
          updateScore();
          setTimeout(() => { isTransitioning = false; renderPart1(); }, 600);
        };
      });
    }

    // PART 2
    function buildAllDefs() {
      const s = new Set();
      questionsData.forEach(q => q.translations.forEach(def => s.add(def)));
      allDefs = Array.from(s);
    }
    function startPart2() {
      inPart = 2;
      buildAllDefs();
      part2Questions = questionsData.map(q=>({...q}));
      shuffleArray(part2Questions);
      currentQ = 0;
      startPartTimer(180); // 3 min
      renderPart2();
      setBottomGif("reward3.gif");
    }
    function renderPart2() {
      if (currentQ >= part2Questions.length) { endQuiz('done'); return; }
      const q = part2Questions[currentQ];
      // 4 random incorrect, 1 correct
      let pool = allDefs.filter(def=>def!==q.translations[0]);
      shuffleArray(pool);
      let choices = shuffleArray([q.translations[0], ...pool.slice(0,4)]);
      document.getElementById("question-container").innerHTML = `
        <div style="font-size:1.15em;margin-bottom:8px;"><b>Part 2: 英文选定义</b></div>
        <div style="font-size:1.5em;margin-bottom:10px;">${q.english}</div>
        <div class="mcq">
          ${choices.map((option, i) => `<button>${option}</button>`).join('')}
        </div>
        <div style="font-size:0.96em;margin-top:10px;color:#888;">${currentQ+1} / ${part2Questions.length}</div>
      `;
      document.querySelectorAll(".mcq button").forEach((btn, i) => {
        btn.onclick = () => {
          if(isTransitioning) return;
          isTransitioning = true;
          const selected = btn.textContent;
          const correct = q.translations[0];
          if(selected === correct) {
            document.getElementById("correct-sound").play();
            showReward1();
            showAlert("✔️ Correct!");
          } else {
            document.getElementById("incorrect-sound").play();
            score = Math.max(0, score - 5);
            showAlert("❌ Incorrect!");
          }
          updateScore();
          setTimeout(() => { isTransitioning = false; currentQ++; renderPart2(); }, 600);
        };
      });
    }

    // Bottom GIF
    function setBottomGif(fn) {
      document.getElementById("bottom-gif").innerHTML = `<img src="${fn}" alt="reward" />`;
    }

    // End Quiz
    function endQuiz(reason) {
      stopTimers();
      document.getElementById("question-container").innerHTML = `
        <div style="font-size:1.5em;margin:15px 0;"><b>Quiz Over!</b></div>
        <div>Name: ${name}</div>
        <div>Final Score: ${score}%</div>
        <div>Time Used: ${300 - Math.max(0,globalTimer)} seconds</div>
        <button onclick="location.reload()" style="margin-top:14px;padding:8px 24px;font-size:1.1em;border-radius:7px;border:none;background:#ff6347;color:#fff;">Restart</button>
      `;
      setBottomGif("");
    }

    // Start logic
    document.getElementById("start-button").onclick = function() {
      name = document.getElementById("name-input").value.trim();
      if(!name) { showAlert("Please enter your name!"); return; }
      document.getElementById("name-input").style.display = "none";
      document.getElementById("start-button").style.display = "none";
      updateScore();
      startGlobalTimer();
      startPart1();
    };

    // Initial UI
    updateTimers();
    updateScore();

  </script>
</body>
</html>
