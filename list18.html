<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List 18</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: #ff6347;
      margin-top: 20px;
    }
    #app-container {
      max-width: 550px;
      margin: 0 auto;
      padding: 20px;
    }
    .question, .mcq {
      background-color: #fff;
      border: 2px solid #ff6347;
      border-radius: 10px;
      margin: 20px auto 0 auto;
      padding: 20px;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 120px;
    }
    .mcq {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      border: none;
      padding: 0 0 20px 0;
    }
    .mcq button {
      padding: 14px 24px;
      font-size: 19px;
      cursor: pointer;
      margin: 8px;
      background-color: #ff6347;
      color: white;
      border: none;
      border-radius: 10px;
      transition: background-color 0.3s;
      flex: 1 1 40%;
      min-width: 120px;
      max-width: 46%;
      word-break: break-word;
    }
    .mcq button:hover, .mcq button.selected {
      background-color: #ff4500;
    }
    .timer, .score {
      font-size: 22px;
      margin: 10px 8px 0 8px;
      display: inline-block;
    }
    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
      height: 18px;
    }
    .progress {
      height: 100%;
      background-color: #4caf50;
      width: 100%;
      transition: width 1s;
    }
    .alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f0ad4e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      z-index: 1000;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @media (max-width: 600px) {
      #app-container { padding: 4px; }
      .question { padding: 10px; }
      .mcq button { font-size: 17px; min-width: 75px; max-width: 98%; }
    }
  </style>
</head>
<body>
  <div id="app-container">
    <h1>List 18</h1>
    <input type="text" id="name-input" placeholder="Enter your name" style="padding: 10px; font-size: 18px; border-radius: 5px; margin-bottom: 20px;">
    <button id="start-button">Start Quiz</button>
    <div id="status-bar">
      <span id="timer-container" class="timer"></span>
      <span id="score-container" class="score"></span>
    </div>
    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>
    <div id="question-container" class="question"></div>
    <audio id="correct-sound" src="game1.mp3"></audio>
    <audio id="incorrect-sound" src="wrong.mp3"></audio>
  </div>
  <script>
    // List 18 Data
    const questionsData = [
      { english: "choose", translations: ["选择", "折扣", "数字"] },
      { english: "medical", translations: ["医疗的", "金字塔", "旋转"] },
      { english: "awake", translations: ["醒着的", "到期的 / 应得的", "惩罚"] },
      { english: "addition", translations: ["加法 / 增加", "旋转", "测量"] },
      { english: "splendid", translations: ["极好的 / 灿烂的", "火鸡", "触摸"] },
      { english: "admit", translations: ["承认", "类别", "品牌"] },
      { english: "brand", translations: ["品牌", "爆炸", "加法 / 增加"] },
      { english: "discount", translations: ["折扣", "选择", "惩罚"] },
      { english: "due", translations: ["到期的 / 应得的", "测量", "爆炸"] },
      { english: "concentrate", translations: ["集中注意力", "折扣", "火鸡"] },
      { english: "turkey", translations: ["火鸡", "旋转", "数字"] },
      { english: "expense", translations: ["花费 / 费用", "类别", "品牌"] },
      { english: "measure", translations: ["测量", "金字塔", "折扣"] },
      { english: "choice", translations: ["选择", "醒着的", "加法 / 增加"] },
      { english: "punishment", translations: ["惩罚", "触摸", "医疗的"] },
      { english: "roll", translations: ["滚动", "花费 / 费用", "惩罚"] },
      { english: "touch", translations: ["触摸", "选择", "金字塔"] },
      { english: "number", translations: ["数字", "醒着的", "爆炸"] },
      { english: "pyramid", translations: ["金字塔", "加法 / 增加", "测量"] },
      { english: "aware", translations: ["意识到的", "品牌", "爆炸"] }
    ];

    let part1Questions = [];
    let part2Questions = [];
    let allDefs = [];
    let name = "";
    let currentQuestionIndex = 0;
    let score = 100;
    let timer = 300; // 5 minutes
    let timerInterval = null;
    let inPart = 1; // 1 or 2
    let isTransitioning = false;

    // Helper: Shuffle array
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Setup definitions pool for part 2
    function buildAllDefs() {
      const defSet = new Set();
      questionsData.forEach(q => q.translations.forEach(def => defSet.add(def)));
      allDefs = Array.from(defSet);
    }

    // Timer logic (shared for both parts)
    function startTimer() {
      updateTimerUI();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        if (timer < 0) {
          endQuiz('timeup');
          return;
        }
        updateTimerUI();
      }, 1000);
    }

    function updateTimerUI() {
      document.getElementById("timer-container").textContent = `Time: ${Math.floor(timer / 60)}:${(timer % 60).toString().padStart(2, '0')}`;
      const pct = Math.max(0, timer / 300) * 100;
      document.getElementById("progress").style.width = `${pct}%`;
    }

    function updateScoreUI() {
      document.getElementById("score-container").textContent = `Score: ${score}%`;
    }

    // Alert helper
    function showAlert(message) {
      const alertBox = document.createElement("div");
      alertBox.innerText = message;
      alertBox.className = "alert";
      document.body.appendChild(alertBox);
      setTimeout(() => {
        if (alertBox.parentNode) alertBox.parentNode.removeChild(alertBox);
      }, 1600);
    }

    // ---------------------- PART 1: MCQ with Retry -----------------------
    function startPart1() {
      inPart = 1;
      part1Questions = questionsData.map((q, i) => ({...q, origIndex: i})); // track origIndex for retry
      shuffleArray(part1Questions);
      currentQuestionIndex = 0;
      document.getElementById("question-container").innerHTML = "";
      nextPart1Question();
    }

    function nextPart1Question() {
      if (timer < 0) return;
      if (part1Questions.length === 0) {
        startPart2();
        return;
      }
      const q = part1Questions[0];
      const options = shuffleArray([...q.translations]);
      document.getElementById("question-container").innerHTML = `
        <div><b>Part 1 / 英文选中文</b></div>
        <div style="font-size:1.4em;margin-bottom:10px;"><b>${q.english}</b></div>
        <div class="mcq">
          ${options.map((option, idx) => `<button data-idx="${idx}">${option}</button>`).join('')}
        </div>
        <div style="font-size:0.95em;margin-top:10px;color:#888;">Questions left: ${part1Questions.length}</div>
      `;
      document.querySelectorAll(".mcq button").forEach((btn, i) => {
        btn.onclick = () => {
          if(isTransitioning) return;
          isTransitioning = true;
          const selected = options[i];
          const correct = q.translations[0];
          if(selected === correct) {
            document.getElementById("correct-sound").play();
            part1Questions.shift();
            showAlert("🎉 Correct!");
          } else {
            document.getElementById("incorrect-sound").play();
            score = Math.max(0, score - 5);
            // Move current question to end for retry
            part1Questions.push(part1Questions.shift());
            showAlert(`❌ Incorrect!`);
          }
          updateScoreUI();
          setTimeout(() => {
            isTransitioning = false;
            nextPart1Question();
          }, 600);
        };
      });
    }

    // ---------------------- PART 2: Definitions MCQ -----------------------
    function startPart2() {
      inPart = 2;
      buildAllDefs();
      part2Questions = shuffleArray(questionsData.map(q => ({...q})));
      currentQuestionIndex = 0;
      nextPart2Question();
    }

    function nextPart2Question() {
      if (timer < 0) return;
      if (currentQuestionIndex >= part2Questions.length) {
        endQuiz('done');
        return;
      }
      const q = part2Questions[currentQuestionIndex];
      // Get 9 incorrect definitions, add correct, shuffle
      let incorrectDefs = allDefs.filter(def => def !== q.translations[0]);
      shuffleArray(incorrectDefs);
      const choices = shuffleArray([q.translations[0], ...incorrectDefs.slice(0,9)]);
      document.getElementById("question-container").innerHTML = `
        <div><b>Part 2 / 选中文定义</b></div>
        <div style="font-size:1.4em;margin-bottom:10px;"><b>${q.english}</b></div>
        <div class="mcq">
          ${choices.map((choice, idx) => `<button data-idx="${idx}">${choice}</button>`).join('')}
        </div>
        <div style="font-size:0.95em;margin-top:10px;color:#888;">${currentQuestionIndex+1} / ${part2Questions.length}</div>
      `;
      document.querySelectorAll(".mcq button").forEach((btn, i) => {
        btn.onclick = () => {
          if(isTransitioning) return;
          isTransitioning = true;
          const selected = choices[i];
          const correct = q.translations[0];
          if(selected === correct) {
            document.getElementById("correct-sound").play();
            showAlert("🎉 Correct!");
          } else {
            document.getElementById("incorrect-sound").play();
            score = Math.max(0, score - 5);
            showAlert(`❌ Incorrect!`);
          }
          updateScoreUI();
          setTimeout(() => {
            isTransitioning = false;
            currentQuestionIndex++;
            nextPart2Question();
          }, 600);
        };
      });
    }

    // ---------------------- End and Start Logic -----------------------
    function endQuiz(reason) {
      clearInterval(timerInterval);
      document.getElementById("timer-container").textContent = `Time: ${Math.max(0, timer)}s`;
      document.getElementById("question-container").innerHTML = `
        <div style="font-size:1.5em;margin:15px 0;"><b>Quiz Over!</b></div>
        <div>Name: ${name}</div>
        <div>Final Score: ${score}%</div>
        <div>Time Used: ${300 - Math.max(0, timer)} seconds</div>
        <button onclick="location.reload()">Restart</button>
      `;
    }

    // ---------------------- Start button and entry -----------------------
    document.getElementById("start-button").onclick = function() {
      name = document.getElementById("name-input").value.trim();
      if(!name) { showAlert("Please enter your name!"); return; }
      document.getElementById("name-input").style.display = "none";
      document.getElementById("start-button").style.display = "none";
      updateScoreUI();
      startTimer();
      startPart1();
    };

    // On reload, always show only name and start
    document.getElementById("question-container").innerHTML = "";
    document.getElementById("timer-container").textContent = "";
    document.getElementById("score-container").textContent = "";

  </script>
</body>
</html>
