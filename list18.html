<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List 18</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      text-align: center;
    }
    h1 {
      color: #ff6347;
    }
    .question {
      padding: 20px;
      background-color: #fff;
      border: 2px solid #ff6347;
      border-radius: 10px;
      margin: 20px auto;
      max-width: 90%;
    }
    .mcq {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mcq button {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
      margin: 10px;
      background-color: #ff6347;
      color: white;
      border: none;
      border-radius: 10px;
      transition: background-color 0.3s;
    }
    .mcq button:hover {
      background-color: #ff4500;
    }
    .timer, .score {
      font-size: 24px;
      margin: 10px;
    }
    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress {
      height: 20px;
      background-color: #4caf50;
      width: 100%;
      transition: width 1s;
    }
    .alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f0ad4e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      z-index: 1000;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>List 18</h1>
  <input type="text" id="name-input" placeholder="Enter your name" style="padding: 10px; font-size: 18px; border-radius: 5px; margin-bottom: 20px;">
  <button id="start-button">Start Quiz</button>
  <div id="question-container" class="question"></div>
  <div id="timer-container" class="timer"></div>
  <div id="score-container" class="score"></div>
  <div class="progress-bar">
    <div id="progress" class="progress"></div>
  </div>
  <audio id="correct-sound" src="game1.mp3"></audio>
  <audio id="incorrect-sound" src="wrong.mp3"></audio>

  <script>
    // Quiz data for List 18
    const questions = [
      { english: "choose", translations: ["选择", "折扣", "数字"] },
      { english: "medical", translations: ["医疗的", "金字塔", "旋转"] },
      { english: "awake", translations: ["醒着的", "到期的 / 应得的", "惩罚"] },
      { english: "addition", translations: ["加法 / 增加", "旋转", "测量"] },
      { english: "splendid", translations: ["极好的 / 灿烂的", "火鸡", "触摸"] },
      { english: "admit", translations: ["承认", "类别", "品牌"] },
      { english: "brand", translations: ["品牌", "爆炸", "加法 / 增加"] },
      { english: "discount", translations: ["折扣", "选择", "惩罚"] },
      { english: "due", translations: ["到期的 / 应得的", "测量", "爆炸"] },
      { english: "concentrate", translations: ["集中注意力", "折扣", "火鸡"] },
      { english: "turkey", translations: ["火鸡", "旋转", "数字"] },
      { english: "expense", translations: ["花费 / 费用", "类别", "品牌"] },
      { english: "measure", translations: ["测量", "金字塔", "折扣"] },
      { english: "choice", translations: ["选择", "醒着的", "加法 / 增加"] },
      { english: "punishment", translations: ["惩罚", "触摸", "医疗的"] },
      { english: "roll", translations: ["滚动", "花费 / 费用", "惩罚"] },
      { english: "touch", translations: ["触摸", "选择", "金字塔"] },
      { english: "number", translations: ["数字", "醒着的", "爆炸"] },
      { english: "pyramid", translations: ["金字塔", "加法 / 增加", "测量"] },
      { english: "aware", translations: ["意识到的", "品牌", "爆炸"] }
    ];

    let currentQuestion = 0;
    let score = 100;
    let timer = 600;
    let name = "";
    let timerInterval = null;
    let currentShuffled = [];

    // Shuffle helper
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // Start Quiz logic
    function startQuiz() {
      name = document.getElementById("name-input").value.trim();
      if (!name) {
        showAlert("Please enter your name!");
        return;
      }
      document.getElementById("name-input").style.display = "none";
      document.getElementById("start-button").style.display = "none";
      currentQuestion = 0;
      score = 100;
      timer = 600;
      updateQuestion();
      updateTimer();
      updateScore();
      document.getElementById("timer-container").style.display = "";
      document.getElementById("score-container").style.display = "";
      document.querySelector(".progress-bar").style.display = "";
    }

    // Attach startQuiz to the button *after* DOM is ready
    document.getElementById("start-button").onclick = startQuiz;
    // Also expose globally for any inline "onclick"
    window.startQuiz = startQuiz;

    // Question rendering
    function updateQuestion() {
      const translations = [...questions[currentQuestion].translations];
      shuffleArray(translations);
      currentShuffled = translations;
      document.getElementById("question-container").innerHTML = `
        <h2>${questions[currentQuestion].english}</h2>
        <div class="mcq">
          ${translations.map((translation, index) =>
            `<button data-index="${index}" onclick="checkAnswer(${index})">${translation}</button>`
          ).join('')}
        </div>
      `;
    }

    // Timer logic
    function updateTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        const progressPercentage = (timer / 600) * 100;
        document.getElementById("progress").style.width = `${progressPercentage}%`;
        document.getElementById("timer-container").innerHTML = `Time: ${Math.floor(timer / 60)}:${(timer % 60).toString().padStart(2, '0')} seconds`;

        if (timer <= 0) {
          endQuiz();
          clearInterval(timerInterval);
        }
      }, 1000);
    }

    // Score update
    function updateScore() {
      document.getElementById("score-container").innerHTML = `Score: ${score} out of 100%`;
    }

    // Multiple choice answer checking
    function checkAnswer(index) {
      const selected = currentShuffled[index];
      const correct = questions[currentQuestion].translations[0];
      if (selected === correct) {
        score = Math.min(score + 10, 100);
        document.getElementById("correct-sound").play();
        showAlert("🎉 Correct! 🎉");
      } else {
        score = Math.max(score - 10, 0);
        document.getElementById("incorrect-sound").play();
        showAlert("❌ Incorrect! ❌");
      }
      currentQuestion++;
      if (currentQuestion >= questions.length) {
        endQuiz();
      } else {
        updateQuestion();
      }
      updateScore();
    }
    // Expose for inline onclick
    window.checkAnswer = checkAnswer;

    // Alert helper
    function showAlert(message) {
      const alertBox = document.createElement("div");
      alertBox.innerText = message;
      alertBox.className = "alert";
      document.body.appendChild(alertBox);
      setTimeout(() => {
        if (alertBox.parentNode) {
          alertBox.parentNode.removeChild(alertBox);
        }
      }, 2000);
    }

    // End of quiz
    function endQuiz() {
      document.getElementById("question-container").innerHTML = `
        <h2>Quiz Over!</h2>
        <p>Name: ${name}</p>
        <p>Final Score: ${score} out of 100%</p>
        <p>Time Used: ${600 - timer} seconds</p>
        <button id="start-spelling-quiz">Start Spelling Quiz (Part 2)</button>
      `;
      document.getElementById("timer-container").style.display = "none";
      document.getElementById("score-container").style.display = "none";
      document.querySelector(".progress-bar").style.display = "none";
      clearInterval(timerInterval);
      document.getElementById("start-spelling-quiz").onclick = startSpellingQuiz;
    }

    // Spelling/definition matching Quiz with 10 choices
    function startSpellingQuiz() {
      let spellingScore = 0;
      let spellingIndex = 0;
      document.getElementById("question-container").innerHTML = '';
      document.getElementById("timer-container").style.display = "none";
      document.getElementById("score-container").style.display = "none";
      document.querySelector(".progress-bar").style.display = "none";

      // Gather all unique possible definitions
      let allDefs = [];
      questions.forEach(q => {
        q.translations.forEach(def => {
          if (!allDefs.includes(def)) allDefs.push(def);
        });
      });

      function getRandomItems(arr, n, avoid) {
        const arrCopy = arr.filter(item => item !== avoid);
        const res = [];
        for (let i = 0; i < n && arrCopy.length > 0; i++) {
          const idx = Math.floor(Math.random() * arrCopy.length);
          res.push(arrCopy.splice(idx, 1)[0]);
        }
        return res;
      }

      function showSpellingQuestion() {
        if (spellingIndex >= questions.length) {
          document.getElementById("question-container").innerHTML = `
            <h2>Spelling Quiz Over!</h2>
            <p>Score: ${spellingScore} out of ${questions.length}</p>
            <button onclick="location.reload()">Restart Entire Quiz</button>
          `;
          return;
        }
        const english = questions[spellingIndex].english;
        const correctDef = questions[spellingIndex].translations[0];

        // Get 9 random incorrect definitions (excluding the correct one)
        const randomIncorrect = getRandomItems(allDefs, 9, correctDef);

        // Combine and shuffle
        const choices = [correctDef, ...randomIncorrect];
        shuffleArray(choices);

        document.getElementById("question-container").innerHTML = `
          <h2>Choose the correct definition for: <span style="color:#ff6347">${english}</span></h2>
          <div class="mcq">
            ${choices.map((choice, idx) =>
              `<button data-index="${idx}" class="def-choice">${choice}</button>`
            ).join('')}
          </div>
          <div id="spelling-feedback" style="margin-top:14px;height:30px;"></div>
          <div>Progress: ${spellingIndex + 1} / ${questions.length}</div>
        `;

        document.querySelectorAll(".def-choice").forEach(btn => {
          btn.onclick = function() {
            const selected = btn.textContent;
            const feedback = document.getElementById("spelling-feedback");
            if (selected === correctDef) {
              spellingScore++;
              feedback.innerHTML = '<span style="color:green">✅ Correct!</span>';
            } else {
              feedback.innerHTML = `<span style="color:red">❌ Incorrect! The correct answer is: <b>${correctDef}</b></span>`;
            }
            spellingIndex++;
            setTimeout(showSpellingQuestion, 1200);
          };
        });
      }

      showSpellingQuestion();
    }
    // Expose for button
    window.startSpellingQuiz = startSpellingQuiz;

  </script>
</body>
</html>
